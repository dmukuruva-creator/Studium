function renderQuiz() {
  if (!S.docs.length) return empty(SVG_ICONS.book, 'Upload documents first', 'Add study material in the Library tab');

  var warn = !hasKey(getActiveModel().prov) ? noKeyWarn() : '';
  var ctx = studyContext();
  var planned = quizQuestionCount(ctx.text);
  var picker = sectionPicker();

  var isClozeMode = S.queue.length && S.queue[0].type === 'cloze';
  var header = '<div class="rowsb" style="margin-bottom:20px">'
    + '<div><p class="ph" style="margin:0">Quiz</p><div style="width:24px;height:2px;background:var(--gold);margin-top:7px;border-radius:1px"></div></div>'
    + '<div class="row">'
    + (S.queue.length ? '<span style="font-family:var(--sans);font-size:14px;color:var(--mut)">' + (S.qi+1) + ' / ' + S.queue.length + '</span>' : '')
    + (S.hist.filter(function(h){return (h.score||0)<2;}).length >= 2 ? '<button class="btn bg btn-sm" style="color:var(--warn)" onclick="redoMistakes()">Redo mistakes</button>' : '')
    + '<button class="btn bg btn-sm" onclick="genCloze()" title="Generate fill-in-the-blank questions graded instantly">' + (isClozeMode ? 'New Cloze' : 'Cloze') + '</button>'
    + '<button class="btn bg" onclick="genQuiz()">' + (S.queue.length && !isClozeMode ? 'New Set' : 'Free Recall') + '</button>'
    + '</div></div>'
    + (S.queue.length ? '<div class="prog" style="margin-bottom:18px"><div class="pf" style="width:' + Math.round((S.qi+1)/S.queue.length*100) + '%;background:var(--gold)"></div></div>' : '');

  var q = S.queue[S.qi];
  if (!q) {
    return warn + header + picker + '<p style="font-family:var(--sans);font-size:13px;color:var(--mut);margin:-6px 0 14px">Next session: ' + planned + ' questions · ' + esc(ctx.label) + '</p>'
      + empty(SVG_ICONS.check, 'Ready to quiz?', 'Click Generate to pull questions from your documents');
  }

  // Cloze: replace "___" with a styled blank in the displayed sentence
  var questionDisplay;
  if (q.type === 'cloze') {
    var clozeHtml = esc(q.question).replace(/___+/, '<span style="display:inline-block;min-width:80px;border-bottom:2px solid var(--gold);background:var(--acc-t);border-radius:2px;padding:0 6px;font-style:normal">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>');
    questionDisplay = '<p class="math-rich" style="font-family:var(--serif);font-size:18px;line-height:1.85;color:var(--tx)">' + clozeHtml + '</p>'
      + '<span class="bdg bdg-neutral" style="margin-top:8px;display:inline-block">Fill in the blank</span>';
  } else {
    questionDisplay = '<p class="math-rich" style="font-family:var(--serif);font-size:19px;font-style:italic;line-height:1.7;color:var(--tx)">' + esc(q.question) + '</p>';
  }

  var levelBadge = q.level && q.level !== 'recall' ? ' <span class="bdg bdg-neutral">' + esc(q.level) + '</span>' : '';
  var qCard = '<div class="card" style="margin-bottom:14px;border-left:3px solid var(--gold)">'
    + '<div class="rowsb" style="margin-bottom:' + (q.topic || q.sourceSection ? '10px' : '0') + '">'
    + '<div>' + (q.topic ? badge(q.topic, '#6b8ef5') : '') + (q.sourceSection ? _srcCiteLink(q.sourceSection) : '') + levelBadge + '</div>'
    + (!S.result && !_gradingStream ? '<button class="btn bg btn-sm" style="font-size:11px;color:var(--dim)" title="Remove this question" onclick="deleteQ()">Remove</button>' : '')
    + '</div>'
    + questionDisplay
    + (q.hint ? '<div style="margin-top:14px;border-top:1px solid var(--brd);padding-top:12px">'
      + '<button class="btn bg btn-sm" style="font-size:12px;color:var(--mut)" onclick="toggleHint()">' + (_hintShown ? 'Hide hint' : 'Show hint') + '</button>'
      + (_hintShown ? '<p class="math-rich" style="margin-top:10px;font-size:14px;color:var(--mut);font-style:italic;line-height:1.65">' + esc(q.hint) + '</p>' : '')
      + '</div>' : '')
    + '</div>';

  var ansCard;
  if (_gradingStream !== null) {
    var previewText = extractStreamFeedback(_gradingStream.text) || '';
    ansCard = '<div class="card fu" style="border-left:3px solid var(--gold)">'
      + '<div class="row" style="margin-bottom:12px;gap:8px">'
      + '<div style="width:7px;height:7px;border-radius:50%;background:var(--gold);animation:pulse 1s ease-in-out infinite;flex-shrink:0"></div>'
      + '<span style="font-family:var(--sans);font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.07em">Grading</span>'
      + '</div>'
      + '<p id="grade-stream" class="math-rich" aria-live="polite" aria-atomic="true" style="font-family:var(--serif);font-size:15px;line-height:1.7;color:var(--tx);min-height:52px">'
      + esc(previewText || '•••')
      + '</p>'
      + '</div>';
  } else if (S.result) {
    var sc = S.result.score;
    var col = scoreColor(sc);
    var pips = [1,2,3].map(function(i) {
      return '<div class="pip-fill" style="width:28px;height:5px;border-radius:2px;background:' + (i <= sc ? col : 'var(--brd)') + ';animation-delay:' + ((i-1)*0.12) + 's"></div>';
    }).join('');
    var scoreLabel = sc >= 3 ? 'Correct' : sc === 2 ? 'Mostly correct' : sc === 1 ? 'Partial' : 'Incorrect';
    ansCard = '<div class="card fu" style="border-left:3px solid ' + col + '">'
      + '<div class="row" style="margin-bottom:14px">' + pips
      + '<span style="font-family:var(--sans);font-size:12px;color:' + col + ';font-weight:600;margin-left:8px;text-transform:uppercase;letter-spacing:.06em">' + scoreLabel + '</span>'
      + '</div>'
      + '<p class="math-rich" style="font-family:var(--serif);font-size:15px;line-height:1.7;margin-bottom:14px;color:var(--tx)">' + esc(S.result.feedback) + '</p>'
      + '<div style="padding:12px 16px;background:var(--card);border-radius:7px;border:1px solid var(--brd);margin-bottom:14px">'
      + '<p style="font-family:var(--sans);font-size:10.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">Your answer</p>'
      + '<p class="math-rich" style="font-family:var(--serif);font-size:14px;color:var(--tx);line-height:1.65">' + esc(S.ans || '') + '</p>'
      + '</div>'
      + '<div style="padding:12px 16px;background:var(--card2);border-radius:7px;border:1px solid var(--brd)">'
      + '<p style="font-family:var(--sans);font-size:10.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">Reference answer</p>'
      + '<p class="math-rich" style="font-family:var(--serif);font-size:14px;color:var(--tx);line-height:1.65">' + esc(S.result.modelAnswer) + '</p>'
      + '</div>'
      + (S.result.keyIdea ? '<div style="margin-top:14px;padding:12px 16px;background:var(--acc-t);border-radius:7px;border-left:3px solid var(--gold)">'
        + '<p style="font-family:var(--sans);font-size:10.5px;color:var(--gold);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">Key idea</p>'
        + '<p class="math-rich" style="font-family:var(--serif);font-size:14.5px;color:var(--tx);line-height:1.7">' + esc(S.result.keyIdea) + '</p>'
        + '</div>' : '')
      + '<div class="row" style="margin-top:14px;gap:8px;flex-wrap:wrap">'
      + '<button class="btn bp" id="q-continue" onclick="nextQ()" title="Press Enter">Continue &rarr;</button>'
      + (S.result.score < 2 ? '<button class="btn bg btn-sm" style="color:var(--gold);border-color:var(--gold)" onclick="focusFollowUp()" title="Practice this same concept from a different angle, right now">Focused follow-up</button>' : '')
      + (S.missedQOffer ? '<button class="btn bg btn-sm" style="color:var(--acc);border-color:var(--acc-b)" onclick="addMissedToReview()" title="Add this question as a flashcard to review tomorrow">+ Add to review deck</button>' : '')
      + '<div style="flex:1"></div>'
      + '<span style="font-family:var(--sans);font-size:11px;color:var(--mut);align-self:center">Override:</span>'
      + [0,1,2,3].map(function(s) {
          var cols = ['#d05555','#c49a3a','#35b59b','#49c47e'];
          var lbls = ['0','1','2','3'];
          var isAct = S.result && S.result.score === s;
          return '<button class="btn btn-sm" style="padding:5px 10px;background:' + (isAct ? cols[s] : 'var(--card)') + ';color:' + (isAct ? '#fff' : cols[s]) + ';border:1.5px solid ' + cols[s] + '" onclick="overrideScore(' + s + ')" title="Override score to ' + s + '/3">' + lbls[s] + '</button>';
        }).join('')
      + '</div>'
      + '</div>';
  } else {
    var isCloze = q && q.type === 'cloze';
    ansCard = '<div class="card">'
      + (!isCloze ? _confidenceRow() : '')
      + '<div style="position:relative">'
      + (isCloze
        ? '<input class="inp" id="q-ans" placeholder="Type the missing term\u2026" style="height:42px" autocomplete="off" onkeydown="if(event.key===\'Enter\')submitQ()">'
        : '<textarea class="inp" id="q-ans" placeholder="Your answer\u2026 (Ctrl+Enter to submit)" style="height:110px;padding-bottom:28px"></textarea>'
            + '<span id="char-ct" style="position:absolute;bottom:10px;right:12px;font-family:var(--sans);font-size:12px;color:var(--dim)">0</span>')
      + '</div>'
      + '<div class="row" style="margin-top:12px;gap:8px">'
      + '<button class="btn bp" onclick="submitQ()">' + (isCloze ? 'Check' : 'Submit Answer') + '</button>'
      + (S.queue.length > 1 ? '<button class="btn bg btn-sm" onclick="skipQ()" title="Skip to next question">Skip</button>' : '')
      + '</div>'
      + '</div>';
  }

  // G5: misconception block below result
  var misconceptionHTML = '';
  if (S.result && S.result.misconception) {
    misconceptionHTML = '<div class="card fu" style="margin-top:12px;border-left:3px solid var(--warn)">'
      + '<p class="sh" style="margin-bottom:8px;color:var(--warn)">Misconception identified</p>'
      + '<p class="math-rich" style="font-family:var(--serif);font-size:14px;line-height:1.75;color:var(--tx);white-space:pre-wrap">' + esc(S.result.misconception) + '</p>'
      + '</div>';
  }

  var recent = '';
  if (S.hist.length) {
    var rows = S.hist.slice().reverse().slice(0,5).map(function(h, i) {
      var col = scoreColor(h.score);
      return '<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:' + (i<4?'1px solid var(--brd)':'none') + ';font-family:var(--sans);font-size:13px">'
           + '<div style="width:4px;height:28px;border-radius:2px;background:' + col + ';flex-shrink:0"></div>'
           + '<span class="math-rich" style="flex:1;color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(h.question) + '</span>'
           + badge(h.score+'/3', col)
           + '</div>';
    }).join('');
    recent = '<div class="card" style="margin-top:20px"><p class="sh">Recent</p>' + rows + '</div>';
  }

  return warn + header + picker + qCard + ansCard + misconceptionHTML + recent;
}

function renderCards() {
  if (!S.docs.length) return empty(SVG_ICONS.book, 'Upload documents first', 'Add study material in the Library tab');

  var warn = !hasKey(getActiveModel().prov) ? noKeyWarn() : '';
  var picker = sectionPicker();

  var filtered = S.fcFilt === 'active'   ? S.cards.filter(function(c) { return !fsrsIsMastered(c) && !isCardSuspended(c); })
               : S.fcFilt === 'mastered' ? S.cards.filter(function(c) { return  fsrsIsMastered(c); })
               : S.fcFilt === 'leeches'  ? S.cards.filter(function(c) { return isLeechCard(c); })
               : S.fcFilt === 'suspended'? S.cards.filter(function(c) { return isCardSuspended(c); })
               : S.cards;

  var mastered = S.cards.filter(function(c) { return fsrsIsMastered(c); }).length;
  var leeches = S.cards.filter(function(c) { return isLeechCard(c); }).length;
  var suspended = S.cards.filter(function(c) { return isCardSuspended(c); }).length;
  var pct = S.cards.length ? Math.round(mastered/S.cards.length*100) : 0;

  function fBtn(f, lbl, n) {
    var active = S.fcFilt === f;
    return '<button class="btn btn-sm ' + (active ? 'bp' : 'bg') + '" onclick="setFcFilt(\'' + f + '\')">' + lbl + ' ' + n + '</button>';

  var header = '<div class="rowsb" style="margin-bottom:20px">'

    + '<button class="btn bg" onclick="genCards()">' + (S.cards.length ? 'Regenerate' : 'Generate Cards') + '</button>'

  var filters = S.cards.length ? '<div class="row" style="margin-bottom:16px;flex-wrap:wrap;gap:8px">'
    + fBtn('all', 'All', S.cards.length)

    + '<span style="font-family:var(--sans);font-size:13px;color:var(--mut)">' + pct + '%</span></div>'
    + '</div>' : '';

  var fc = filtered[S.fcIdx];
  if (!fc) {
    return warn + header + picker + filters + empty(SVG_ICONS.cards, S.cards.length ? 'No cards in this filter' : 'Ready to generate?', S.cards.length ? '' : 'Click Generate Cards to create flashcards');
  }

  var card;
  if (S.editingCardId === fc.id) {
    card = '<div class="card" style="margin-bottom:14px">'
      + '<p class="sh" style="margin-bottom:10px">Edit card</p>'
      + '<p class="sh" style="margin-bottom:4px">Front</p>'
      + '<textarea class="inp" id="edit-front" style="height:80px;margin-bottom:10px">' + esc(fc.front) + '</textarea>'
      + '<p class="sh" style="margin-bottom:4px">Back</p>'

      + '<p style="color:var(--dim);font-family:var(--sans);font-size:12px;margin-top:18px;letter-spacing:.05em;text-transform:uppercase">click to reveal</p>'
      + '</div>'
      + '<div class="fc-back">'
      + (fc.sourceSection ? '<div style="margin-bottom:8px">' + _srcCiteLink(fc.sourceSection) + '</div>' : '')
      + '<p class="math-rich" style="font-family:var(--sans);font-size:17px;text-align:center;line-height:1.7;max-width:480px">' + esc(fc.back) + '</p>'
      + (fc.note ? '<p class="math-rich" style="margin-top:14px;font-size:13px;color:var(--mut);font-style:italic;line-height:1.6;text-align:center;max-width:440px;border-top:1px solid var(--brd);padding-top:12px">' + esc(fc.note) + '</p>' : '')

    + '</div>' : '')
    + (!S.editingCardId ? '<p style="text-align:center;color:var(--mut);font-family:var(--sans);font-size:13px;margin-bottom:6px">' + (S.fcIdx+1) + ' / ' + filtered.length + '</p>' : '')
    + (!S.editingCardId ? '<div class="kh"><span class="key">Space</span><span class="kh-sep">flip</span>'
    + '<span style="color:var(--brd2)">·</span>'

  return warn + header + picker + filters + card + controls;
}

var CAT_COL = { core:'#c49a3a', method:'#35b59b', example:'#4c79f2', theorem:'#8e6ef0' };

function renderMap() {
  if (!S.docs.length) return empty(SVG_ICONS.book, 'Upload documents first', 'Add study material in the Library tab');

  var warn = !hasKey(getActiveModel().prov) ? noKeyWarn() : '';

  var header = '<div class="rowsb" style="margin-bottom:16px">'
    + '<div><p class="ph" style="margin:0">Concept Map</p><div style="width:24px;height:2px;background:var(--gold);margin-top:7px;border-radius:1px"></div></div>'
    + '<div class="row" style="gap:8px">'
    + (S.cmap ? '<button class="btn bg btn-sm" id="lm-phys-btn" onclick="lmTogglePhysics()">&#x23F8; Pause</button>' : '')
    + '<button class="btn bg" onclick="S.cmapSel=null;LM.sel=null;lmStop();LM.canvas=null;genMap()">' + (S.cmap ? 'Regenerate' : 'Generate Map') + '</button>'
    + '</div></div>';

  var scope = sectionPicker();
  if (!S.cmap) {
    return warn + header + scope + empty(SVG_ICONS.network, 'Visualize your knowledge', 'Click Generate Map to build an interactive concept graph');
  }

  var legend = '<div class="row" style="flex-wrap:wrap;gap:10px;margin:8px 0 10px 2px">'
    + Object.keys(CAT_COL).map(function(name) {
        return '<span style="display:flex;align-items:center;gap:5px;font-family:var(--sans);font-size:12px;color:var(--mut)">'
             + '<span style="width:8px;height:8px;border-radius:50%;background:' + CAT_COL[name] + ';display:inline-block;flex-shrink:0"></span>'
             + name.charAt(0).toUpperCase() + name.slice(1) + '</span>';
      }).join('')
    + '<span style="margin-left:auto;font-family:var(--sans);font-size:11px;color:var(--dim)">'
    + S.cmap.nodes.length + ' nodes · ' + S.cmap.edges.length + ' edges</span>'
    + '<span style="font-family:var(--sans);font-size:11px;color:var(--dim)">drag to rearrange · click to focus</span>'
    + '</div>';

  var canvasWrap = '<div class="card" style="padding:0;overflow:hidden;margin-bottom:10px;border:1px solid var(--brd2);box-shadow:0 24px 70px rgba(0,0,0,.34);border-radius:10px">'
    + '<div id="cmap-live" style="width:100%;min-height:420px"></div>'
    + '</div>';

  var detail = '<div id="cmap-detail">' + renderMapDetail() + '</div>';

  return warn + header + scope + canvasWrap + legend + detail;
}

function renderMapDetail() {
  var selId = S.cmapSel || LM.sel;  // S.cmapSel is the authoritative source
  if (!selId || !S.cmap) return '';
  var nodeList = LM.nodes.length ? LM.nodes : S.cmap.nodes;
  var selNode = nodeList.find(function(n){ return n.id === selId; });
  if (!selNode) return '';
  var selCol = CAT_COL[selNode.category] || '#c49a3a';

  var connEdges = S.cmap.edges.filter(function(e){ return e.source===selId||e.target===selId; });
  var nbrs = connEdges.map(function(e) {
    var nid = e.source===selId ? e.target : e.source;
    var n = nodeList.find(function(x){return x.id===nid;});
    if (!n) return null;
    return { node:n, label:e.label||'', type:e.type||'', strength:e.strength||1, out: e.source===selId };
  }).filter(Boolean);

  var nbHtml = nbrs.length ? '<div style="margin-top:12px">'
    + '<p style="font-family:var(--sans);font-size:10.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Relations (' + nbrs.length + ')</p>'
    + '<div style="display:flex;flex-wrap:wrap;gap:6px">'
    + nbrs.map(function(nb) {
        var nc = CAT_COL[nb.node.category]||'#888';
        var arrow = nb.out ? '→' : '←';
        return '<button onclick="selectNode(\'' + esc(jsEsc(nb.node.id)) + '\')" '
             + 'style="display:inline-flex;align-items:center;gap:5px;padding:5px 10px 5px 8px;border-radius:20px;'
             + 'border:1px solid ' + nc + '30;background:' + nc + '0d;cursor:pointer;font-family:var(--sans);'
             + 'font-size:12px;color:var(--tx);transition:background .15s">'
             + '<span style="color:var(--mut);font-size:10px">' + esc(arrow) + ' ' + esc(nb.label) + '</span>'
             + '<span style="width:6px;height:6px;border-radius:50%;background:' + nc + ';flex-shrink:0"></span>'
             + '<span style="color:' + nc + ';font-weight:600">' + esc(nb.node.label) + '</span>'
             + '</button>';
      }).join('')
    + '</div></div>' : '';

  var desc = selNode.desc || selNode.description || '';
  var descHtml = desc ? '<p class="math-rich" style="font-family:var(--serif);font-size:14px;color:var(--mut);line-height:1.65;margin-top:8px;font-style:italic">' + esc(desc) + '</p>' : '';

  return '<div class="card math-rich" style="border-left:3px solid '+selCol+';box-shadow:0 12px 30px rgba(0,0,0,.18);margin-bottom:14px">'
    + '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">'
    + '<div style="flex:1;min-width:0">'
    + '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">'
    + '<strong style="font-family:var(--serif);font-size:17px;color:var(--tx)">' + esc(selNode.label) + '</strong>'
    + badge(selNode.category, selCol)
    + (nbrs.length ? '<span style="font-family:var(--sans);font-size:11px;color:var(--dim)">' + nbrs.length + ' connection' + (nbrs.length!==1?'s':'') + '</span>' : '')
    + '</div>'
    + descHtml + nbHtml
    + '</div>'
    + '<button onclick="selectNode(\'' + esc(jsEsc(selId)) + '\')" '
    + 'style="background:none;border:none;cursor:pointer;color:var(--mut);font-size:20px;line-height:1;flex-shrink:0;padding:2px 4px;border-radius:4px" title="Deselect">&times;</button>'
    + '</div></div>';
}

// ════════════════════════════════════════════
// CONCEPT MAP — LIVE CANVAS ENGINE
// ════════════════════════════════════════════
var LM = {
  raf: null, canvas: null, ctx: null,
  nodes: [], edges: [],
  sel: null, hover: null,
  zoom: {x:0,y:0,k:1}, zoomT: {x:0,y:0,k:1},
  drag: null, alpha: 0, paused: false,
  W: 680, H: 440, dpr: 1, time: 0
};

function lmStop() {
  if (LM.raf) { cancelAnimationFrame(LM.raf); LM.raf = null; }
}

function lmTogglePhysics() {
  LM.paused = !LM.paused;
  if (!LM.paused) LM.alpha = Math.max(LM.alpha, 0.15);
  var btn = document.getElementById('lm-phys-btn');
  if (btn) btn.innerHTML = LM.paused ? '&#x25B6; Resume' : '&#x23F8; Pause';
}

function lmInit() {
  var container = document.getElementById('cmap-live');
  if (!container || !S.cmap || !S.cmap.nodes.length) return;
  var dpr = LM.dpr = window.devicePixelRatio || 1;
  var W = LM.W = Math.max(container.clientWidth || 600, 320);
  var H = LM.H = Math.max(Math.round(W * 0.60), 380);

  // Create or reuse canvas
  if (!LM.canvas || LM.canvas.parentNode !== container) {
    lmStop();
    var c = document.createElement('canvas');
    c.style.cssText = 'display:block;width:100%;height:'+H+'px;border-radius:10px;cursor:default;touch-action:none;-webkit-user-select:none;user-select:none';
    container.innerHTML = '';
    container.appendChild(c);
    LM.canvas = c;
    c.addEventListener('mousemove', lmOnMove);
    c.addEventListener('mousedown', lmOnDown);
    c.addEventListener('mouseup', lmOnUp);
    c.addEventListener('mouseleave', lmOnLeave);
    c.addEventListener('click', lmOnClick);
    c.addEventListener('touchstart', lmOnTouchStart, {passive:false});
    c.addEventListener('touchmove', lmOnTouchMove, {passive:false});
    c.addEventListener('touchend', lmOnTouchEnd);
  }
  LM.canvas.width = Math.round(W * dpr);
  LM.canvas.height = Math.round(H * dpr);
  LM.canvas.style.height = H + 'px';
  LM.ctx = LM.canvas.getContext('2d');
  LM.ctx.scale(dpr, dpr);

  // Compute weighted degrees for node sizing
  var deg = {};
  S.cmap.edges.forEach(function(e) {
    var str = Number(e.strength)||1;
    deg[e.source] = (deg[e.source]||0) + str;
    deg[e.target] = (deg[e.target]||0) + str;
  });

  var catBase = {core:20, theorem:18, method:16, example:14};
  var placed = forceLayout(S.cmap.nodes, S.cmap.edges, W, H);

  LM.nodes = placed.map(function(n) {
    var base = (catBase[n.category]||15) + Math.min(deg[n.id]||0, 10) * 1.5;
    return {
      id: n.id, label: n.label||n.id,
      category: n.category||'core',
      desc: n.description || n.desc || '',
      x: n.x, y: n.y,
      vx: (Math.random()-.5)*.4, vy: (Math.random()-.5)*.4,
      r: Math.round(base),
      col: CAT_COL[n.category]||'#dbd3c4'
    };
  });
  LM.edges = S.cmap.edges.map(function(e){ return Object.assign({strength:1,type:'uses'}, e); });
  LM.sel = S.cmapSel || null;
  LM.hover = null; LM.drag = null;
  LM.alpha = 0.7; LM.paused = false; LM.time = 0;
  LM.zoom = {x:0,y:0,k:1}; LM.zoomT = {x:0,y:0,k:1};

  if (LM.sel) lmZoomTo(LM.sel);

  lmStop();
  (function tick() {
    LM.time++;
    if (!LM.paused) lmPhysics();
    LM.zoom.x += (LM.zoomT.x - LM.zoom.x) * 0.09;
    LM.zoom.y += (LM.zoomT.y - LM.zoom.y) * 0.09;
    LM.zoom.k += (LM.zoomT.k - LM.zoom.k) * 0.09;
    lmDraw();
    LM.raf = requestAnimationFrame(tick);
  })();
}

function lmPhysics() {
  var alpha = LM.alpha;
  var N = LM.nodes, E = LM.edges, W = LM.W, H = LM.H;

  if (alpha < 0.003 && !LM.drag) {
    N.forEach(function(n) { n.x += (Math.random()-.5)*.12; n.y += (Math.random()-.5)*.12; });
    return;
  }

  var k = Math.sqrt(W * H / Math.max(N.length,1)) * 0.56;
  var fx = N.map(function(){return 0;}), fy = N.map(function(){return 0;});

  for (var i=0; i<N.length; i++) {
    for (var j=i+1; j<N.length; j++) {
      var dx = N[j].x - N[i].x || 0.01, dy = N[j].y - N[i].y || 0.01;
      var d2 = dx*dx+dy*dy, d = Math.sqrt(d2)||0.01;
      var minD = N[i].r + N[j].r + 18;
      var f = d < minD ? k*k/d2 + (minD-d)*0.5 : k*k/d2;
      fx[i]-=f*dx/d; fy[i]-=f*dy/d; fx[j]+=f*dx/d; fy[j]+=f*dy/d;
    }
  }

  E.forEach(function(e) {
    var si=N.findIndex(function(n){return n.id===e.source;}), ti=N.findIndex(function(n){return n.id===e.target;});
    if (si<0||ti<0) return;
    var dx=N[ti].x-N[si].x, dy=N[ti].y-N[si].y;
    var d=Math.sqrt(dx*dx+dy*dy)||1, str=Number(e.strength)||1;
    var f=d/k*0.26*str;
    fx[si]+=f*dx/d; fy[si]+=f*dy/d; fx[ti]-=f*dx/d; fy[ti]-=f*dy/d;
  });

  N.forEach(function(n,i) {
    fx[i]+=(W/2-n.x)*0.016; fy[i]+=(H/2-n.y)*0.016;
  });

  N.forEach(function(n,i) {
    if (LM.drag && LM.drag.node===n) return;
    n.vx=(n.vx+fx[i]*alpha)*0.82; n.vy=(n.vy+fy[i]*alpha)*0.82;
    n.x=Math.max(n.r+6, Math.min(W-n.r-6, n.x+n.vx));
    n.y=Math.max(n.r+6, Math.min(H-n.r-6, n.y+n.vy));
  });
  LM.alpha *= 0.974;
}

function lmDraw() {
  var ctx=LM.ctx; if (!ctx) return;
  var W=LM.W, H=LM.H, N=LM.nodes, E=LM.edges;
  var sel=LM.sel, hov=LM.hover, t=LM.time;
  var zx=LM.zoom.x, zy=LM.zoom.y, zk=LM.zoom.k;

  ctx.clearRect(0,0,W,H);
  var bg=ctx.createRadialGradient(W*.28,H*.2,0,W*.5,H*.5,W*.75);
  bg.addColorStop(0,'#182040'); bg.addColorStop(1,'#0b0e1a');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Dot grid
  ctx.fillStyle='rgba(59,69,100,0.18)';
  for (var gi=0;gi<Math.ceil(W/58)+1;gi++) for (var gj=0;gj<Math.ceil(H/50)+1;gj++) {
    ctx.beginPath(); ctx.arc(gi*58+10,gj*50+14,1.1,0,Math.PI*2); ctx.fill();
  }

  var nbIds = {};
  if (sel) E.forEach(function(e){
    if(e.source===sel) nbIds[e.target]=true;
    if(e.target===sel) nbIds[e.source]=true;
  });

  ctx.save();
  ctx.translate(zx,zy); ctx.scale(zk,zk);

  // Draw edges
  E.forEach(function(e,ei) {
    var src=N.find(function(n){return n.id===e.source;}), tgt=N.find(function(n){return n.id===e.target;});
    if (!src||!tgt) return;
    var isHi=sel&&(e.source===sel||e.target===sel), isDim=sel&&!isHi;
    ctx.globalAlpha = isDim ? 0.12 : (isHi ? 1 : 0.72);

    var dx=tgt.x-src.x, dy=tgt.y-src.y, len=Math.sqrt(dx*dx+dy*dy)||1;
    var side=(ei%2===0)?1:-1;
    var cpx=(src.x+tgt.x)/2-(dy/len)*30*side, cpy=(src.y+tgt.y)/2+(dx/len)*30*side;
    var a0=Math.atan2(cpy-src.y,cpx-src.x), a1=Math.atan2(cpy-tgt.y,cpx-tgt.x);
    var sx=src.x+Math.cos(a0)*src.r, sy=src.y+Math.sin(a0)*src.r;
    var ex=tgt.x+Math.cos(a1)*tgt.r, ey=tgt.y+Math.sin(a1)*tgt.r;
    var str=Number(e.strength)||1;

    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.quadraticCurveTo(cpx,cpy,ex,ey);
    ctx.strokeStyle=isHi?'#c49a3a':'rgba(101,114,143,0.7)';
    ctx.lineWidth=isHi?1.4+str*.5:0.7+str*.25;
    ctx.setLineDash(isHi?[]:[5,4]); ctx.stroke(); ctx.setLineDash([]);

    // Arrowhead
    var aa=Math.atan2(ey-cpy,ex-cpx), al=7+(isHi?2:0);
    ctx.beginPath(); ctx.moveTo(ex,ey);
    ctx.lineTo(ex-al*Math.cos(aa-.45),ey-al*Math.sin(aa-.45));
    ctx.lineTo(ex-al*Math.cos(aa+.45),ey-al*Math.sin(aa+.45));
    ctx.closePath(); ctx.fillStyle=isHi?'#c49a3a':'rgba(101,114,143,0.7)'; ctx.fill();

    // Edge label on highlighted
    if (e.label && isHi) {
      var lx=(src.x+tgt.x)/2, ly=(src.y+tgt.y)/2;
      ctx.font='600 10px Outfit,Inter,sans-serif';
      var lab=e.label.length>16?e.label.slice(0,14)+'…':e.label;
      var tw=ctx.measureText(lab).width, pad=7, rH=17;
      ctx.fillStyle='rgba(9,12,26,0.94)';
      lmRRect(ctx,lx-tw/2-pad,ly-rH/2,tw+pad*2,rH,3); ctx.fill();
      ctx.strokeStyle='rgba(196,154,58,0.45)'; ctx.lineWidth=0.7; ctx.stroke();
      ctx.fillStyle='#c49a3a'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(lab,lx,ly);
    }
    ctx.globalAlpha=1;
  });

  // Draw nodes
  N.forEach(function(n) {
    var isSel=n.id===sel, isHov=n.id===hov, isNbr=nbIds[n.id];
    var isDim=sel&&!isSel&&!isNbr;
    var pulse=Math.sin(t*.055+N.indexOf(n)*.75)*2.2;
    ctx.globalAlpha=isDim?0.2:1;

    if (isSel||isHov) { ctx.shadowBlur=isSel?24+pulse:13; ctx.shadowColor=n.col+(isSel?'bb':'77'); }

    if (isSel) {
      ctx.beginPath(); ctx.arc(n.x,n.y,n.r+8+pulse,0,Math.PI*2);
      ctx.strokeStyle=n.col+'44'; ctx.lineWidth=2.5; ctx.stroke();
    }
    if (isNbr&&sel) {
      ctx.beginPath(); ctx.arc(n.x,n.y,n.r+4,0,Math.PI*2);
      ctx.strokeStyle=n.col+'30'; ctx.lineWidth=2; ctx.stroke();
    }

    ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
    var rg=ctx.createRadialGradient(n.x-n.r*.3,n.y-n.r*.3,0,n.x,n.y,n.r);
    rg.addColorStop(0,'#1e2744'); rg.addColorStop(1,'#0d1020');
    ctx.fillStyle=rg; ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle=n.col+(isSel?'ff':isNbr?'cc':'99');
    ctx.lineWidth=isSel?2.8:isNbr?2:1.6; ctx.stroke();

    ctx.fillStyle=isSel?n.col:isDim?n.col+'55':isNbr?n.col+'ee':n.col+'bb';
    ctx.font=(isSel?'700':'600')+' '+(n.r>22?'11':'10')+'px Outfit,Inter,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    lmDrawLabel(ctx, n.label, n.x, n.y, n.r*1.7);
    ctx.globalAlpha=1;
  });

  ctx.restore();

  // Overlays
  if (zk>1.12) {
    ctx.fillStyle='rgba(196,154,58,0.55)'; ctx.font='11px Outfit,sans-serif';
    ctx.textAlign='right'; ctx.textBaseline='top';
    ctx.fillText('click background to zoom out', W-10, 10);
  }
  if (LM.alpha>0.06&&!LM.paused) {
    ctx.fillStyle='rgba(101,114,143,0.45)'; ctx.font='10px Outfit,sans-serif';
    ctx.textAlign='left'; ctx.textBaseline='top';
    ctx.fillText('• settling…', 10, 10);
  }
}

function lmDrawLabel(ctx, text, x, y, maxW) {
  text = String(text||'');
  if (ctx.measureText(text).width <= maxW) { ctx.fillText(text,x,y); return; }
  var words=text.split(' '), lines=[], cur='';
  for (var i=0;i<words.length;i++) {
    var test=cur?cur+' '+words[i]:words[i];
    if (ctx.measureText(test).width>maxW&&cur) { lines.push(cur); cur=words[i]; } else { cur=test; }
  }
  if (cur) lines.push(cur);
  if (lines.length>2) lines=[lines[0],lines.slice(1).join(' ')];
  var lh=12, sy=y-(lines.length-1)*lh/2;
  lines.forEach(function(l,li) {
    while(ctx.measureText(l).width>maxW&&l.length>3) l=l.slice(0,-1);
    if(!l.endsWith('…')&&ctx.measureText(l+'…').width<=maxW) l=l+'…';
    ctx.fillText(l,x,sy+li*lh);
  });
}

function lmRRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function lmZoomTo(nodeId) {
  if (!nodeId) { LM.zoomT={x:0,y:0,k:1}; return; }
  var node=LM.nodes.find(function(n){return n.id===nodeId;});
  if (!node) { LM.zoomT={x:0,y:0,k:1}; return; }
  var nbrs=[node];
  LM.edges.forEach(function(e){
    if(e.source===nodeId){var n=LM.nodes.find(function(x){return x.id===e.target;});if(n)nbrs.push(n);}
    if(e.target===nodeId){var n=LM.nodes.find(function(x){return x.id===e.source;});if(n)nbrs.push(n);}
  });
  var pad=60, mnX=Infinity,mxX=-Infinity,mnY=Infinity,mxY=-Infinity;
  nbrs.forEach(function(n){
    mnX=Math.min(mnX,n.x-n.r-pad); mxX=Math.max(mxX,n.x+n.r+pad);
    mnY=Math.min(mnY,n.y-n.r-pad); mxY=Math.max(mxY,n.y+n.r+pad);
  });
  var k=Math.min(LM.W/(mxX-mnX),LM.H/(mxY-mnY),3.2);
  var cx=(mnX+mxX)/2, cy=(mnY+mxY)/2;
  LM.zoomT={x:LM.W/2-cx*k, y:LM.H/2-cy*k, k:k};
}

function lmMousePos(e) {
  var rect=LM.canvas.getBoundingClientRect();
  return {x:(e.clientX-rect.left-LM.zoom.x)/LM.zoom.k, y:(e.clientY-rect.top-LM.zoom.y)/LM.zoom.k};
}

function lmHitNode(gx, gy) {
  for (var i=LM.nodes.length-1;i>=0;i--) {
    var n=LM.nodes[i], dx=gx-n.x, dy=gy-n.y;
    if (dx*dx+dy*dy<=(n.r+8)*(n.r+8)) return n;
  }
  return null;
}

var _lmDragMoved=false;
function lmOnMove(e) {
  if (LM.drag) {
    var p=lmMousePos(e);
    LM.drag.node.x=Math.max(LM.drag.node.r+6,Math.min(LM.W-LM.drag.node.r-6,p.x));
    LM.drag.node.y=Math.max(LM.drag.node.r+6,Math.min(LM.H-LM.drag.node.r-6,p.y));
    LM.drag.node.vx=LM.drag.node.vy=0;
    LM.alpha=Math.max(LM.alpha,0.35); _lmDragMoved=true; return;
  }
  var p=lmMousePos(e), hit=lmHitNode(p.x,p.y), nH=hit?hit.id:null;
  if (nH!==LM.hover) { LM.hover=nH; LM.canvas.style.cursor=nH?'pointer':'default'; }
}
function lmOnDown(e) {
  var p=lmMousePos(e), hit=lmHitNode(p.x,p.y);
  if (hit) { LM.drag={node:hit}; _lmDragMoved=false; e.preventDefault(); }
}
function lmOnUp()  { LM.drag=null; }
function lmOnLeave(){ LM.hover=null; LM.drag=null; }
function lmOnClick(e) {
  if (_lmDragMoved) { _lmDragMoved=false; return; }
  var p=lmMousePos(e), hit=lmHitNode(p.x,p.y);
  if (hit) { selectNode(hit.id); }
  else if (LM.sel) { selectNode(LM.sel); }
}
function lmOnTouchStart(e) {
  if(e.touches.length===1){var t=e.touches[0];lmOnDown({clientX:t.clientX,clientY:t.clientY,preventDefault:function(){e.preventDefault();}});}
}
function lmOnTouchMove(e) {
  if(e.touches.length===1){lmOnMove({clientX:e.touches[0].clientX,clientY:e.touches[0].clientY});e.preventDefault();}
}
function lmOnTouchEnd(){ lmOnUp(); }

      + '<p style="font-family:var(--sans);font-size:13px;color:var(--mut)">Generating targeted questions for your weak topics</p>'

    var retLabel = retention !== null ? retention + '%' : '—';
    var retSub = retention !== null ? 'Retention' : 'Retention (need ≥5)';
    var readiness = (plan.days !== null) ? computeReadiness() : null;
    var readinessHTML = readiness
      ? (function() {
          var col = readiness.pct >= 80 ? '#49c47e' : readiness.pct >= 55 ? '#c49a3a' : '#d05555';

            : '';
          var weakText = readiness.weakTopics.length
            ? '<p style="font-family:var(--sans);font-size:11.5px;color:var(--warn);margin-top:4px">Weak: ' + readiness.weakTopics.map(function(t) { return esc(t); }).join(' · ') + '</p>'

          return '<div class="card" style="margin-bottom:14px">'
            + '<div class="rowsb" style="margin-bottom:8px"><p style="font-family:var(--sans);font-size:12px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.07em">Exam Readiness</p>'
            + '<span style="font-family:var(--sans);font-size:22px;font-weight:700;color:' + col + '">' + readiness.pct + '%</span></div>'
            + '<div class="prog" style="margin-bottom:6px"><div class="pf" style="width:' + readiness.pct + '%;background:' + col + '"></div></div>'
            + '<p style="font-family:var(--sans);font-size:11.5px;color:var(--mut)">'
            + 'Coverage ' + readiness.coveragePct + '% × Retention ' + readiness.retentionPct + '%'
            + '</p>'
            + gapText + weakText
            + '</div>';
        })()
      : '';
    var countdown = plan.days !== null
      ? '<div class="card" style="margin-bottom:14px;border-left:3px solid var(--warn)">'
        + '<div class="rowsb"><div>'

    } else if (total > 0 || insights.weakTopics.length) {
      var sessionDesc = (dueCount + newCount > 0 ? dueCount + ' due + ' + newCount + ' new' : '')
        + (insights.weakTopics.length ? (dueCount + newCount > 0 ? ' · ' : '') + insights.weakTopics.length + ' weak-topic Q' + (insights.weakTopics.length > 1 ? 's' : '') : '');

    return header + streakBar + countdown + readinessHTML + statsGrid + weakStr + noCards + startArea;
  }

  // ── Session active ─────────────────────────────────────────────────────
  var todayItem = S.todayQ[S.todayIdx];

    return header + renderSessionSummary();

  var progress = Math.round((S.todayIdx / S.todayQ.length) * 100);
  var phase = _todayPhaseLabel();
  var phaseCol = phase === 'Warm-up' ? '#4c79f2' : phase === 'Consolidate' ? '#d05555' : 'var(--acc)';
  var progressBar = '<div class="rowsb" style="margin-bottom:8px">'
    + '<span style="font-family:var(--sans);font-size:11px;font-weight:700;color:' + phaseCol + ';text-transform:uppercase;letter-spacing:.07em">' + phase + '</span>'
    + '<span style="font-family:var(--sans);font-size:11px;color:var(--mut)">⏱ ' + _todayElapsedLabel() + '</span>'

  }

  // ── Flashcard item ────────────────────────────────────────────────────────
  var fc = S.cards.find(function(c) { return c.id === todayItem.id; });
  if (!fc) { S.todayIdx++; render(); return ''; }
  var leechHTML = isLeechCard(fc) ? '<div class="card" style="border-left:3px solid var(--warn);margin-bottom:14px">'
    + '<div class="rowsb"><div><p style="font-family:var(--sans);font-size:13px;font-weight:700;color:var(--warn)">Leech card</p>'
    + '<p style="font-family:var(--sans);font-size:12px;color:var(--mut);margin-top:2px">' + fsrsLapses(fc) + ' lapses — it keeps slipping. Rephrase it, edit it, or suspend it.</p></div>'

    + '<button class="btn bg btn-sm" style="color:var(--acc)" onclick="rephraseLeechCard(' + fc.id + ')">Rephrase</button>'

  var cardHTML;

function renderStats() {
  var insights = getAnalyticsInsights();
  var attempts = getAnalyticsAttempts();
  var mastered = S.cards.filter(function(c) { return fsrsIsMastered(c); }).length;
  var header = '<div class="rowsb" style="margin-bottom:20px">'
    + '<div><p class="ph" style="margin:0">Analytics</p><div style="width:24px;height:2px;background:var(--gold);margin-top:7px;border-radius:1px"></div></div>'
    + '<div class="row" style="gap:8px">'
    + (S.hist.length ? '<button class="btn bg btn-sm" onclick="if(confirm(\'Clear all quiz history and analytics?\')){S.hist=[];_dbClear(\'hist\');clearAnalyticsData();render()}">Clear History</button>' : '')
    + (insights.sessionCount || S.analytics.currentSession ? '<button class="btn bg btn-sm" onclick="if(confirm(\'Reset all saved analytics?\')){clearAnalyticsData();render()}">Reset Analytics</button>' : '')
    + '</div>'
    + '</div>';

  function scard(val, lbl, col) {
    return '<div class="sc"><p class="sv" style="color:' + col + '">' + esc(String(val)) + '</p><p class="sl">' + lbl + '</p></div>';
  }

  var streakDisplay = S.streak.count >= 1 ? S.streak.count + (S.streak.count === 1 ? ' day' : ' days') : '—';
  var accCol = insights.accuracy >= 70 ? '#49c47e' : insights.accuracy >= 40 ? '#c49a3a' : '#d05555';
  var trendHTML = '';
  if (insights.trend) {
    var td = insights.trend.delta;
    var tCol = td > 0 ? '#49c47e' : td < 0 ? '#d05555' : 'var(--mut)';
    var tArrow = td > 0 ? '&#x25B2; +' : td < 0 ? '&#x25BC; ' : '= ';
    trendHTML = '<p style="font-family:var(--sans);font-size:11px;color:' + tCol + ';margin-top:3px">'
      + tArrow + td + '% vs prior</p>';
  }
  var accCard = '<div class="sc"><p class="sv" style="color:' + accCol + '">' + insights.accuracy + '%</p><p class="sl">Accuracy</p>' + trendHTML + '</div>';
  var grid = '<div class="sg">'
    + scard(insights.attempts, 'Attempts', '#4c79f2')
    + accCard
    + scard(insights.avgScore.toFixed(1) + '/3', 'Avg Score', '#c49a3a')
    + scard(S.cards.length ? mastered + '/' + S.cards.length : '—', 'Cards Mastered', '#8e6ef0')
    + scard(streakDisplay, 'Streak', '#f4a24a')
    + '</div>';

  var mistakeCount = S.hist.filter(function(h) { return (h.score||0) < 2; }).length;
  var redoBtn = mistakeCount >= 2 ? '<div class="card" style="margin-bottom:16px;border-left:3px solid var(--warn)">'
    + '<div class="rowsb"><div>'
    + '<p style="font-family:var(--sans);font-weight:600;font-size:14px;color:var(--warn)">Mistakes to review</p>'
    + '<p style="font-family:var(--sans);font-size:12px;color:var(--mut);margin-top:2px">' + mistakeCount + ' low-score answers in history</p>'
    + '</div><button class="btn bno btn-sm" onclick="redoMistakes()">Redo mistakes</button></div></div>' : '';

  if (!insights.attempts) return header + grid + redoBtn + empty(SVG_ICONS.chart, 'No data yet', 'Complete some quiz questions to start tracking progress and weaknesses');

  var tl = attempts.slice(-20);
  var tlHTML = '<div class="tl">' + tl.map(function(h) {
    var c = h.score >= 3 ? '#49c47e' : h.score >= 2 ? '#35b59b' : h.score >= 1 ? '#c49a3a' : '#d05555';
    var ht = Math.max(4, Math.round((h.score || 0) / 3 * 60));
    return '<div class="tl-b" style="height:' + ht + 'px;background:' + c + '"></div>';
  }).join('') + '</div>';

  var byTopic = {};
  attempts.forEach(function(h) {
    if (!h.topic) return;
    var topic = _canonicalSection(h.topic) || h.topic;
    var t = byTopic[topic] = byTopic[topic] || { ok: 0, n: 0 };
    t.n++; if (h.correct) t.ok++;
  });
  var topicData = Object.keys(byTopic).map(function(topic) {
    var t = byTopic[topic];
    return { topic: topic.length > 24 ? topic.slice(0, 22) + '…' : topic, acc: Math.round(t.ok / t.n * 100), n: t.n };
  }).sort(function(a, b) { return a.acc - b.acc; });

  var topicHTML = '';
  if (topicData.length) {
    topicHTML = '<div class="card" style="margin-bottom:16px">'
      + '<p class="sh">Accuracy by topic &middot; weakest first</p>'
      + topicData.map(function(d) {
          var c = d.acc >= 70 ? '#49c47e' : d.acc >= 40 ? '#c49a3a' : '#d05555';
          return '<div class="cbar">'
               + '<span class="cbar-label">' + esc(d.topic) + '</span>'
               + '<div class="cbar-track"><div class="cbar-fill" style="width:' + d.acc + '%;background:' + c + '"></div></div>'
               + '<span class="cbar-pct" style="color:' + c + '">' + d.acc + '%</span>'
               + '<span style="color:var(--dim)">&times;' + d.n + '</span>'
               + '</div>';
        }).join('')
      + (topicData[0] ? '<p style="margin-top:10px;font-family:var(--sans);font-size:14px;color:var(--mut)">Focus: <strong style="color:#d05555">' + esc(topicData[0].topic) + '</strong> &mdash; ' + topicData[0].acc + '% over ' + topicData[0].n + ' attempt' + (topicData[0].n !== 1 ? 's' : '') + '</p>' : '')
      + '</div>';
  }

  var weakHTML = insights.weakTopics.length ? '<div class="card" style="margin-bottom:16px">'
    + '<p class="sh">Weakness signals</p>'
    + insights.weakTopics.map(function(item) {
      return '<div style="display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--brd);font-family:var(--sans);font-size:14px">'
        + '<div><p style="color:var(--tx);font-weight:600;margin-bottom:2px">' + esc(item.topic) + '</p><p style="color:var(--mut)">' + item.attempts + ' attempts</p></div>'
        + '<div style="text-align:right"><p style="color:#d05555;font-weight:700">' + item.accuracy + '%</p><p style="color:var(--mut)">' + item.wrong + ' incorrect</p></div>'
        + '</div>';
    }).join('')
    + '</div>' : '';

  var studyPlanHTML = '';
  if (insights.weakTopics.length && S.docs.length) {
    studyPlanHTML = '<div class="card" style="margin-bottom:16px">'
      + '<p class="sh">Study plan</p>'
      + '<p style="font-family:var(--sans);font-size:13px;color:var(--mut);margin-bottom:10px">Targeted practice for your weak areas</p>'
      + insights.weakTopics.slice(0, 3).map(function(item) {
          return '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--brd)">'
            + '<div style="font-family:var(--sans);font-size:14px;min-width:0">'
            + '<span style="color:var(--tx);font-weight:500">' + esc(item.topic) + '</span>'
            + '<span style="color:#d05555;margin-left:10px;font-size:12px">' + item.accuracy + '%</span>'
            + '</div>'
            + '<button class="btn bp btn-sm" style="flex-shrink:0" onclick="practiceWeakTopic(\'' + esc(jsEsc(item.topic)) + '\')">Practice</button>'
            + '</div>';
        }).join('')
      + '</div>';
  }

  var inconsistencyHTML = insights.recurrentQuestions.length ? '<div class="card" style="margin-bottom:16px">'
    + '<p class="sh">Recurrent inconsistencies</p>'
    + insights.recurrentQuestions.map(function(item) {
      return '<div style="padding:10px 0;border-bottom:1px solid var(--brd);font-family:var(--sans);font-size:14px">'
        + '<p style="color:var(--tx);font-weight:600;margin-bottom:4px">' + esc(item.question) + '</p>'
        + '<p style="color:var(--mut)">' + item.attempts + ' attempts &middot; ' + item.correct + ' correct, ' + item.wrong + ' incorrect</p>'
        + '</div>';
    }).join('')
    + '</div>' : '';

  var sessionHTML = S.analytics.sessions.length ? '<div class="card">'
    + '<p class="sh">Recent sessions</p>'
    + S.analytics.sessions.slice().reverse().slice(0, 5).map(function(session) {
      var duration = session.durationMs ? Math.round(session.durationMs / 1000) + 's' : 'open';
      return '<div style="padding:10px 0;border-bottom:1px solid var(--brd);font-family:var(--sans);font-size:14px">'
        + '<p style="color:var(--tx);font-weight:600;margin-bottom:4px">' + esc(session.scopeLabel) + '</p>'
        + '<p style="color:var(--mut)">' + session.attempts.length + ' attempts &middot; ' + session.accuracy + '% accuracy &middot; ' + duration + '</p>'
        + '</div>';
    }).join('')
    + '</div>' : '';

  return header + grid + redoBtn
    + '<div class="card" style="margin-bottom:16px"><p class="sh">Score timeline &middot; last 20</p>' + tlHTML + '</div>'
    + topicHTML
    + studyPlanHTML
    + weakHTML
    + inconsistencyHTML
    + sessionHTML;
}

    var steps = (r.steps || []).map(function(s, i) {
      return '<div style="display:flex;gap:11px;margin-bottom:12px">'
        + '<span style="flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--acc);color:#fff;font-family:var(--sans);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center">' + (i + 1) + '</span>'

      + '<div class="rowsb" style="margin-bottom:10px"><p style="font-family:var(--sans);font-size:14px;font-weight:700;color:var(--tx)">Worked solution</p>'
      + '<button class="btn bg btn-sm" onclick="S.solveResult=null;render()">New problem</button></div>'
      + '<p style="font-family:var(--sans);font-size:12px;color:var(--mut);margin-bottom:14px;white-space:pre-wrap">' + esc(r.problem || '') + '</p>'
      + steps
      + '<div style="padding:12px 14px;background:var(--card2);border:1px solid var(--brd);border-radius:8px;margin:8px 0 10px">'
      + '<p style="font-family:var(--sans);font-size:10.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Answer</p>'
      + '<p class="math-rich" style="font-family:var(--serif);font-size:15px;line-height:1.6;color:var(--tx)">' + esc(r.answer || '') + '</p></div>'
      + (r.verification ? '<div style="padding:10px 14px;border-left:3px solid var(--acc);background:var(--card)">'
          + '<p style="font-family:var(--sans);font-size:10.5px;color:var(--acc);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-weight:700">Self-check</p>'
          + '<p class="math-rich" style="font-family:var(--serif);font-size:13.5px;line-height:1.6;color:var(--mut)">' + esc(r.verification) + '</p></div>' : '')
      + '<button class="btn bg btn-sm" style="margin-top:14px" onclick="addSolveToReview()">+ Add to review deck</button>'
      + '</div>';
    return back + header + card;
  }

  var scopeNote = S.docs.length
    ? '<p style="font-family:var(--sans);font-size:12px;color:var(--dim);margin-top:10px">Your current scope notes are used as context when relevant.</p>'
    : '<p style="font-family:var(--sans);font-size:12px;color:var(--dim);margin-top:10px">Tip: upload notes in Library to ground solutions in your course’s methods.</p>';
  var form = '<div class="card"><p class="sh" style="margin-bottom:10px">Enter a problem</p>'
    + '<textarea class="inp" id="solve-in" placeholder="Paste or type a problem to solve step by step…" style="height:150px;margin-bottom:12px">' + esc(S.solveInput || '') + '</textarea>'
    + '<button class="btn bp" onclick="startSolve()">Solve step by step</button>'
    + scopeNote + '</div>';
  return back + header + form;
}

async function startSolve() {
  var el = document.getElementById('solve-in');
  var problem = el ? el.value.trim() : (S.solveInput || '');
  if (!problem) { toast('Enter a problem to solve.'); return; }
  if (!hasKey(getActiveModel().prov)) { toast('Add an API key in Settings first.'); setTab('settings'); return; }
  S.solveInput = problem; S.solveBusy = true; S.solveResult = null; render();
  var notes = '';
  if (S.docs.length) { try { var ctx = studyContext(); if (ctx && ctx.text) notes = contextText(ctx.text).slice(0, 6000); } catch (e) {} }
  var srcBlock = notes ? '\n\nRelevant course notes (apply these methods; do not contradict them):\n"""\n' + notes + '\n"""' : '';
  var sys = _personaSys() + 'You are a careful problem-solving tutor. Solve the problem step by step, showing the reasoning behind each step. Then VERIFY your own work: re-check each step and the final answer, fixing any error you find BEFORE you answer. Use LaTeX delimiters for math, such as \\(...\\) inline and $$...$$ for display. Reply ONLY with valid JSON — no prose outside it:\n{"steps":["step 1 with reasoning","step 2", "..."],"answer":"the final answer","verification":"what you re-checked and whether it holds"}';
  try {
    var raw = await callAI(sys, 'Problem:\n' + problem + srcBlock, 2600, 0.2);
    var r = pj(raw);
    if (!r || !Array.isArray(r.steps)) throw new Error('Could not produce a structured solution');
    r.problem = problem;
    S.solveResult = r;
  } catch (e) {
    toast('Solve failed: ' + e.message);
  } finally {
    S.solveBusy = false; render();
  }
}

function addSolveToReview() {
  var r = S.solveResult; if (!r) return;
  _upsertReviewCard({
    front: r.problem || '',
    back: r.answer || ((r.steps || []).slice(-1)[0] || ''),
    note: r.verification || '',
    topic: 'Solved problems',
    sourceSection: '',
  });
}

    if (state === 'ok')   return '<span style="color:#49c47e;font-weight:700">✓</span>';
    if (state === 'warn') return '<span style="color:#c49a3a;font-weight:700">!</span>';

  };
  var rows = (d.checks || []).map(function (c) {
    return '<div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--brd);font-family:var(--sans);font-size:13px;align-items:baseline">'

  }).join('');

  var nWarn = (d.checks || []).filter(function (c) { return c.state === 'warn'; }).length;
  var summaryCol = nBad ? '#d05555' : nWarn ? '#c49a3a' : '#49c47e';

    + (nBad ? nBad + ' problem' + (nBad === 1 ? '' : 's') + ' found' : nWarn ? 'All systems go (' + nWarn + ' note' + (nWarn === 1 ? '' : 's') + ')' : 'All systems green') + '</p>';
  return '<div>' + rows + '</div>' + summary;
}

async function runDiagnostics() {
  S.diag = { running: true, checks: null }; render();
  var checks = [];
  function add(label, state, detail) { checks.push({ label: label, state: state, detail: detail || '' }); }

  // 1) Local helper / server reachable
  try {
    var r = await fetch('/keychain/status', { method: 'GET' });
    add('Local helper (server)', r.ok ? 'ok' : 'bad', r.ok ? 'reachable' : 'HTTP ' + r.status);
  } catch (e) { add('Local helper (server)', 'bad', 'unreachable — launch via Studium.command'); }

  // 2) API keys configured
  var provs = [['anthropic', 'Anthropic'], ['openai', 'OpenAI'], ['google', 'Google'], ['openai-compatible', 'OpenAI-compatible']];
  var keyed = provs.filter(function (p) { return hasKey(p[0]); });
  add('API keys configured', keyed.length ? 'ok' : 'warn',
      keyed.length ? keyed.map(function (p) { return p[1]; }).join(', ') : 'none — add one to generate/grade');

  // 3) Model IDs validated against the live provider lists
  try {
    await validateModels();
    var active = getActiveModel();
    var dead = isModelDead(active);
    add('Active model', dead ? 'warn' : 'ok', (active ? active.name : '—') + (dead ? ' — not in live list' : ''));
  } catch (e) { add('Active model', 'warn', 'could not validate (offline?)'); }

  // 4) Storage headroom
  try {
    if (navigator.storage && navigator.storage.estimate) {
      var est = await navigator.storage.estimate();
      var usedMB = (est.usage || 0) / 1048576, quotaMB = (est.quota || 0) / 1048576;
      var pct = quotaMB ? Math.round(usedMB / quotaMB * 100) : 0;
      add('Storage', pct > 90 ? 'warn' : 'ok', usedMB.toFixed(1) + ' MB used (' + pct + '% of quota)');
    } else { add('Storage', 'ok', 'usage API unavailable'); }
  } catch (e) { add('Storage', 'warn', 'estimate failed'); }

  // 5) Your data
  var due = S.cards.filter(function (c) { return !isCardSuspended(c) && c.fsrs && fsrsIsDue(c.fsrs); }).length;
  var bankQs = S.quantBanks.reduce(function (n, b) { return n + b.items.length; }, 0);
  add('Library', 'ok', S.docs.length + ' docs · ' + S.cards.length + ' cards (' + due + ' due) · ' + S.hist.length + ' history');
  add('Quant banks', 'ok', S.quantBanks.length + ' bank' + (S.quantBanks.length === 1 ? '' : 's') + ' · ' + bankQs + ' questions');

  // 6) Offline graders self-test (deterministic — the instant-feedback core)
  var gp = 0, gt = 0;
  function gtest(c) { gt++; if (c) gp++; }
  try {
    gtest(gradeCloze({ blank: 'x' }, ' X ').score === 3);
    gtest(_tryNumericGrade({ answer: '42' }, '42').score === 3);
    gtest(_tryNumericGrade({ answer: 'word' }, 'x') === null);
    gtest(gradeQuantAnswer({ a: '2491' }, '2491').correct === true);
    gtest(gradeQuantAnswer({ a: '1/6' }, '0.1667').correct === true);
    gtest(parseQuantBank('a | 1\nb | 2').length === 2);
    gtest(_interleaveByTopic([{ t: 'a' }, { t: 'a' }, { t: 'b' }], function (x) { return x.t; }).length === 3);
  } catch (e) { /* counted as failures below */ }
  add('Offline graders self-test', gp === gt ? 'ok' : 'bad', gp + '/' + gt + ' passing');

  S.diag = { running: false, ts: Date.now(), checks: checks };
  render();
}

// Pick the highest-impact session for the user's current state, with a plain
// reason grounded in learning science. Goal: comprehension, grades, and skill.
function recommendSession() {
  if (!S.docs.length) return null;
  var plan = examSchedulePlan();
  var due = S.cards.filter(function(c) { return !isCardSuspended(c) && c.fsrs && fsrsIsDue(c.fsrs); }).length;
  var insights = getAnalyticsInsights();
  var weak = insights.weakTopics || [];
  var readiness = (plan.days !== null) ? computeReadiness() : null;
  var secs = []; try { secs = studySections(); } catch (e) {}
  var cov = S.coverage || {};
  var untested = secs.filter(function(s) { var c = cov[s.title]; return !c || ((c.quizzed || 0) === 0 && (c.carded || 0) === 0); }).length;
  var dayWord = function(n) { return n + ' day' + (n === 1 ? '' : 's'); };

  // 1 — Exam imminent: test under real conditions, but clear a big spaced backlog first.
  if (plan.days !== null && plan.days <= 7) {
    if (due >= 15) return { id: 'review', reason: 'Your exam is in ' + dayWord(Math.max(0, plan.days)) + ' and ' + due + ' cards are due. Clear the spaced-review backlog first so nothing you already learned slips before the test.', cta: 'Start review' };
    return { id: 'exam', reason: 'Your exam is in ' + dayWord(Math.max(0, plan.days)) + (readiness ? ' and readiness is ' + readiness.pct + '%' : '') + '. A timed mock under real conditions is the most effective way to find and fix what will cost you marks — testing yourself beats re-reading (the testing effect).', cta: 'Start mock exam' };
  }
  // 2 — Due backlog: spaced retrieval is the highest-yield daily action.
  if (due >= 5) {
    return { id: 'review', reason: due + ' cards are due. Reviewing them right as you’re about to forget locks them in for the least effort — the spacing effect is the backbone of durable memory.', cta: 'Start review' };
  }
  // 3 — Un-studied material: comprehension must precede retrieval.
  if (untested >= 1 && due < 5) {
    return { id: 'learn', reason: 'You have ' + untested + ' section' + (untested === 1 ? '' : 's') + ' you haven’t worked through yet. Build understanding first with a grounded study guide — you can’t recall what you never encoded.', cta: 'Start learning' };
  }
  // 4 — One stubborn weak topic: self-explanation repairs deep gaps.
  if (weak.length && (weak.length === 1 || weak[0].accuracy < 40)) {
    return { id: 'explain', reason: 'You’re weakest on ' + esc(weak[0].topic) + ' (' + weak[0].accuracy + '%). Explaining it in your own words is the fastest way to expose and patch the gap — the Feynman technique.', cta: 'Explain it back' };
  }
  // 5 — Several weak topics: targeted retrieval practice builds breadth.
  if (weak.length >= 2) {
    return { id: 'drill', reason: 'You’re shaky on ' + weak.slice(0, 3).map(function(w) { return esc(w.topic); }).join(', ') + '. Pulling answers from memory (retrieval practice) turns weak topics solid far faster than re-reading.', cta: 'Start drilling' };
  }
  // 6 — Caught up: extend coverage, else keep retrieval sharp.
  if (untested >= 1) return { id: 'learn', reason: 'You’re caught up on review. Extend your coverage by working through new material while it’s fresh.', cta: 'Learn something new' };
  if (S.cards.length) return { id: 'exam', reason: 'You’re caught up. A quick timed test keeps retrieval sharp and proves you can perform under pressure, not just recognize the material.', cta: 'Test yourself' };
  return { id: 'review', reason: 'Generate a few flashcards in Library, then come back — daily spaced review is what makes it stick.', cta: 'Start review' };
}

// ════════════════════════════════════════════
// QUANT DRILL — rapid-fire practice over your own question banks
// True to Studium: grounded in YOUR bank, instant deterministic grading
// (no LLM, so it feels instant), bounded sessions, and weak items resurface
// in the FSRS review deck — the spaced-repetition edge over tradermath et al.
// ════════════════════════════════════════════
var _quantTimer = null;

function saveQuantBanks() { lsSet('sd_quantbanks', S.quantBanks); }

// Parse "answer-like" text to a number: integers, decimals, fractions (a/b),
// and percents (50% -> 0.5). Returns null for non-numeric input.
function _quantToNumber(s) {
  s = String(s == null ? '' : s).trim().replace(/,/g, '').replace(/\s+/g, '');
  if (!s) return null;
  var pct = false;
  if (s.charAt(s.length - 1) === '%') { pct = true; s = s.slice(0, -1); }
  var frac = s.match(/^([-+]?\d*\.?\d+)\/([-+]?\d*\.?\d+)$/);
  var n;
  if (frac) { var d = parseFloat(frac[2]); if (!d) return null; n = parseFloat(frac[1]) / d; }
  else if (/^[-+]?\d*\.?\d+$/.test(s)) { n = parseFloat(s); }
  else return null;
  if (isNaN(n)) return null;
  return pct ? n / 100 : n;
}

// Grade a quant answer. Integers require an exact match (arithmetic); answers
// written with a decimal, fraction, or percent allow a small relative tolerance
// (rounding). Falls back to normalized string match for word answers.
function gradeQuantAnswer(item, answer) {
  var expected = item && item.a != null ? String(item.a) : '';
  var sn = _quantToNumber(answer), en = _quantToNumber(expected);
  if (sn != null && en != null) {
    var tolerant = /[.\/%]/.test(expected) || /[.\/%]/.test(String(answer));
    var ok = Math.abs(en) < 1e-9
      ? Math.abs(sn) < 1e-6
      : (tolerant ? Math.abs(sn - en) / Math.abs(en) < 0.005 : Math.abs(sn - en) < 1e-9);
    return { correct: ok, expected: expected };
  }
  return { correct: _normalizeCloze(answer) === _normalizeCloze(expected), expected: expected };
}

// Parse a pasted bank into [{q,a}]. Accepts JSON, "Q:/A:" blocks, or lines
// delimited by tab, |, ::, =>, or →. (Comma is intentionally NOT a delimiter —
// questions often contain commas.)
function parseQuantBank(text) {
  text = String(text || '').trim();
  if (!text) return [];
  if (text[0] === '[' || text[0] === '{') {
    try {
      var arr = JSON.parse(text);
      if (!Array.isArray(arr)) arr = [arr];
      var out = arr.map(function(o) {
        if (o == null || typeof o !== 'object') return null;
        var q = o.q != null ? o.q : (o.question != null ? o.question : o.prompt);
        var a = o.a != null ? o.a : (o.answer != null ? o.answer : o.solution);
        if (q == null || a == null) return null;
        return { q: String(q).trim(), a: String(a).trim() };
      }).filter(function(x) { return x && x.q && x.a !== ''; });
      if (out.length) return out;
    } catch (e) { /* fall through */ }
  }
  if (/(^|\n)\s*Q[:.\)]/i.test(text) && /(^|\n)\s*A[:.\)]/i.test(text)) {
    var pairs = [], curQ = null;
    text.split(/\r?\n/).forEach(function(line) {
      var mq = line.match(/^\s*Q[:.\)]\s*(.*)$/i);
      var ma = line.match(/^\s*A[:.\)]\s*(.*)$/i);
      if (mq) curQ = mq[1].trim();
      else if (ma && curQ != null) { pairs.push({ q: curQ, a: ma[1].trim() }); curQ = null; }
    });
    pairs = pairs.filter(function(p) { return p.q && p.a !== ''; });
    if (pairs.length) return pairs;
  }
  var DELIMS = ['\t', '|', '::', '=>', '→'];
  var rows = [];
  text.split(/\r?\n/).forEach(function(line) {
    line = line.trim();
    if (!line) return;
    for (var i = 0; i < DELIMS.length; i++) {
      var idx = line.indexOf(DELIMS[i]);
      if (idx > 0) {
        var q = line.slice(0, idx).trim().replace(/^["']|["']$/g, '');
        var a = line.slice(idx + DELIMS[i].length).trim().replace(/^["']|["']$/g, '');
        if (q && a) rows.push({ q: q, a: a });
        return;
      }
    }
  });
  return rows;
}

// Weighted next-item pick: unseen first, missed resurface more, mastered (2+
// correct in a row) fade out; never repeat the immediately-previous item.
function _quantPickNext(sess) {
  var items = sess.items, n = items.length;
  if (n <= 1) return 0;
  var weights = items.map(function(_, i) {
    var st = sess.stats[i] || { seen: 0, wrong: 0, streak: 0 };
    var w;
    if (st.seen === 0) w = 2.0;
    else if (st.streak >= 2) w = 0.25;
    else w = 1 + st.wrong * 1.5;
    if (i === sess.idx) w = 0;
    return w;
  });
  var total = weights.reduce(function(a, b) { return a + b; }, 0);
  if (total <= 0) { return (sess.idx + 1) % n; }
  var r = Math.random() * total;
  for (var i = 0; i < n; i++) { r -= weights[i]; if (r <= 0) return i; }
  return n - 1;
}

function _fmtMMSS(sec) {
  sec = Math.max(0, Math.floor(sec));
  return Math.floor(sec / 60) + ':' + ('0' + (sec % 60)).slice(-2);
}

// ── Bank management ─────────────────────────────────────────────────────────
function setQuantImport(v) { S.quantImport = v; }

function importQuantBank() {
  var nameEl = document.getElementById('quant-bank-name');
  var name = (nameEl && nameEl.value.trim()) || 'Bank ' + (S.quantBanks.length + 1);
  var items = parseQuantBank(S.quantImport);
  if (!items.length) { toast('No question/answer pairs found. Use JSON, "Q:/A:", or "question | answer" per line.'); return; }
  S.quantBanks.push({ id: Date.now(), name: name, items: items, createdAt: Date.now() });
  S.quantImport = '';
  saveQuantBanks();
  toast('Added "' + name + '" — ' + items.length + ' question' + (items.length === 1 ? '' : 's') + '.');
  render();
}

function deleteQuantBank(id) {
  if (!confirm('Delete this bank?')) return;
  S.quantBanks = S.quantBanks.filter(function(b) { return b.id !== id; });
  saveQuantBanks();
  render();
}

// ── Session ───────────────────────────────────────────────────────────────
function startQuantDrill(bankId, mode, durationSec) {
  var bank = S.quantBanks.find(function(b) { return b.id === bankId; });
  if (!bank || !bank.items.length) { toast('That bank is empty.'); return; }
  if (_quantTimer) { clearInterval(_quantTimer); _quantTimer = null; }
  S.quant = {
    active: true, finished: false,
    bankId: bankId, bankName: bank.name,
    items: bank.items.slice(),
    idx: 0, stats: {}, answered: 0, correct: 0, streakCur: 0, streakBest: 0,
    missed: {}, showResult: false, lastResult: null, lastGiven: '',
    mode: mode === 'timed' ? 'timed' : 'practice',
    startTime: Date.now(),
    endTime: mode === 'timed' ? Date.now() + (durationSec || 120) * 1000 : null,
  };
  if (S.quant.mode === 'timed') _quantTimer = setInterval(_quantTick, 250);
  render();
}

function _quantTick() {
  var sess = S.quant;
  if (!sess || !sess.active || sess.mode !== 'timed') { clearInterval(_quantTimer); _quantTimer = null; return; }
  var rem = sess.endTime - Date.now();
  var el = document.getElementById('quant-timeleft');
  if (el) el.textContent = _fmtMMSS(rem / 1000);
  if (rem <= 0) { clearInterval(_quantTimer); _quantTimer = null; endQuantDrill(); }
}

function quantSubmit() {
  var sess = S.quant; if (!sess || !sess.active) return;
  var inp = document.getElementById('quant-input');
  var val = inp ? inp.value.trim() : '';
  if (!val) return;
  var item = sess.items[sess.idx];
  var res = gradeQuantAnswer(item, val);
  var st = sess.stats[sess.idx] || (sess.stats[sess.idx] = { seen: 0, wrong: 0, streak: 0 });
  st.seen++;
  sess.answered++;
  if (res.correct) {
    sess.correct++; st.streak++; sess.streakCur++;
    if (sess.streakCur > sess.streakBest) sess.streakBest = sess.streakCur;
    // Rapid flow: a correct answer advances immediately.
    sess.idx = _quantPickNext(sess);
    sess.showResult = false; sess.lastResult = null; sess.lastGiven = '';
  } else {
    st.wrong++; st.streak = 0; sess.streakCur = 0;
    sess.missed[item.q] = item;
    sess.showResult = true; sess.lastResult = res; sess.lastGiven = val;
  }
  render();
}

function quantNext() {
  var sess = S.quant; if (!sess || !sess.active) return;
  sess.idx = _quantPickNext(sess);
  sess.showResult = false; sess.lastResult = null; sess.lastGiven = '';
  render();
}

function quantSkip() {
  var sess = S.quant; if (!sess || !sess.active) return;
  var st = sess.stats[sess.idx] || (sess.stats[sess.idx] = { seen: 0, wrong: 0, streak: 0 });
  st.seen++; // count as seen so it rotates
  sess.idx = _quantPickNext(sess);
  sess.showResult = false; sess.lastResult = null; sess.lastGiven = '';
  render();
}

function endQuantDrill() {
  var sess = S.quant; if (!sess) return;
  if (_quantTimer) { clearInterval(_quantTimer); _quantTimer = null; }
  sess.active = false; sess.finished = true;
  sess.elapsedSec = Math.max(1, Math.round((Date.now() - sess.startTime) / 1000));
  if (sess.answered > 0) { try { recordStreak(); } catch (e) {} }
  render();
}

function exitQuant() {
  if (_quantTimer) { clearInterval(_quantTimer); _quantTimer = null; }
  S.quant = null;
  render();
}

function quantAddMissedToReview() {
  var sess = S.quant; if (!sess) return;
  var keys = Object.keys(sess.missed || {});
  if (!keys.length) { toast('No missed items to add.'); return; }
  keys.forEach(function(k) {
    var it = sess.missed[k];
    _upsertReviewCard({ front: it.q, back: it.a, note: 'From quant drill: ' + (sess.bankName || ''), topic: sess.bankName || 'Quant', sourceSection: '' });
  });
  toast('Added ' + keys.length + ' card' + (keys.length === 1 ? '' : 's') + ' to your review deck.');
  sess.missed = {};
  render();
}

function renderQuantActive() {
  var sess = S.quant;
  var item = sess.items[sess.idx];
  if (!item) { return '<div class="card">Bank is empty.</div>'; }
  var acc = sess.answered ? Math.round(sess.correct / sess.answered * 100) : null;
  var accCol = acc === null ? 'var(--mut)' : acc >= 80 ? '#49c47e' : acc >= 50 ? '#c49a3a' : '#d05555';
  var elapsed = Math.max(1, (Date.now() - sess.startTime) / 1000);
  var qpm = Math.round(sess.answered / (elapsed / 60));

  // Stats bar
  var stat = function(val, lbl, col) {
    return '<div style="text-align:center;min-width:54px"><p style="font-family:var(--sans);font-size:18px;font-weight:700;color:' + col + ';line-height:1;font-variant-numeric:tabular-nums">' + val + '</p>'
      + '<p style="font-family:var(--sans);font-size:9.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin-top:3px">' + lbl + '</p></div>';
  };
  var timeChip = sess.mode === 'timed'
    ? stat('<span id="quant-timeleft">' + _fmtMMSS((sess.endTime - Date.now()) / 1000) + '</span>', 'Left', 'var(--gold)')
    : stat(_fmtMMSS(elapsed), 'Time', 'var(--mut)');
  var statsBar = '<div class="rowsb" style="margin-bottom:18px;gap:8px">'
    + '<div class="row" style="gap:16px">'
    + stat(sess.correct + '/' + sess.answered, 'Score', 'var(--tx)')
    + stat(acc === null ? '—' : acc + '%', 'Accuracy', accCol)
    + stat(String(sess.streakCur), 'Streak', sess.streakCur >= 3 ? '#f4a24a' : 'var(--mut)')
    + stat(sess.answered ? String(qpm) : '—', 'Q/min', 'var(--mut)')
    + timeChip
    + '</div>'
    + '<button class="btn bg btn-sm" onclick="endQuantDrill()">End</button>'
    + '</div>';

  var prompt = '<div class="card" style="margin-bottom:14px;border-left:3px solid var(--gold)">'
    + '<p class="math-rich" style="font-family:var(--serif);font-size:22px;line-height:1.6;color:var(--tx)">' + esc(item.q) + '</p></div>';

  var body;
  if (sess.showResult && sess.lastResult) {
    // Only shown after a miss.
    body = '<div class="card fu" style="border-left:3px solid #d05555">'
      + '<div class="row" style="margin-bottom:12px;gap:8px"><span style="font-family:var(--sans);font-size:12px;color:#d05555;font-weight:700;text-transform:uppercase;letter-spacing:.06em">Incorrect</span></div>'
      + '<div style="padding:10px 14px;background:var(--card);border-radius:7px;border:1px solid var(--brd);margin-bottom:10px">'
      + '<p style="font-family:var(--sans);font-size:10.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">You answered</p>'
      + '<p class="math-rich" style="font-family:var(--serif);font-size:15px;color:var(--tx)">' + esc(sess.lastGiven || '') + '</p></div>'
      + '<div style="padding:10px 14px;background:var(--card2);border-radius:7px;border:1px solid var(--brd)">'
      + '<p style="font-family:var(--sans);font-size:10.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Answer</p>'
      + '<p class="math-rich" style="font-family:var(--serif);font-size:15px;color:var(--tx)">' + esc(sess.lastResult.expected || '') + '</p></div>'
      + '<button class="btn bp" id="quant-next" style="margin-top:14px" onclick="quantNext()" title="Press Enter">Next &rarr;</button>'
      + '</div>';
  } else {
    body = '<div class="card">'
      + '<input class="inp" id="quant-input" placeholder="Answer… (Enter)" autocomplete="off" inputmode="decimal" style="height:46px;font-size:16px" onkeydown="if(event.key===\'Enter\'){event.preventDefault();quantSubmit();}">'
      + '<div class="row" style="margin-top:12px;gap:8px">'
      + '<button class="btn bp" onclick="quantSubmit()">Submit</button>'
      + '<button class="btn bg btn-sm" onclick="quantSkip()">Skip</button>'
      + '</div></div>';
  }
  return statsBar + prompt + body;
}

function renderQuantSummary() {
  var sess = S.quant;
  var acc = sess.answered ? Math.round(sess.correct / sess.answered * 100) : 0;
  var accCol = acc >= 80 ? '#49c47e' : acc >= 50 ? '#c49a3a' : '#d05555';
  var qpm = sess.elapsedSec ? (sess.answered / (sess.elapsedSec / 60)).toFixed(1) : '0';
  var missedKeys = Object.keys(sess.missed || {});

  var bigStat = function(val, lbl, col) {
    return '<div style="text-align:center;flex:1"><p style="font-family:var(--sans);font-size:30px;font-weight:700;color:' + col + ';line-height:1">' + val + '</p>'
      + '<p style="font-family:var(--sans);font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-top:5px">' + lbl + '</p></div>';
  };
  var head = '<div class="card" style="margin-bottom:14px">'
    + '<p class="sh" style="margin-bottom:14px">' + esc(sess.bankName || 'Quant Drill') + ' · ' + (sess.mode === 'timed' ? 'sprint' : 'practice') + '</p>'
    + '<div class="row" style="gap:8px">'
    + bigStat(sess.correct + '/' + sess.answered, 'Correct', 'var(--tx)')
    + bigStat(acc + '%', 'Accuracy', accCol)
    + bigStat(qpm, 'Q/min', 'var(--mut)')
    + bigStat(String(sess.streakBest), 'Best streak', '#f4a24a')
    + '</div></div>';

  var missed = '';
  if (missedKeys.length) {
    var rows = missedKeys.slice(0, 20).map(function(k) {
      var it = sess.missed[k];
      return '<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--brd);font-family:var(--sans);font-size:13px">'
        + '<span class="math-rich" style="flex:1;color:var(--mut)">' + esc(it.q) + '</span>'
        + '<span class="math-rich" style="color:var(--tx);font-weight:600">' + esc(it.a) + '</span></div>';
    }).join('');
    missed = '<div class="card" style="margin-bottom:14px">'
      + '<div class="rowsb" style="margin-bottom:8px"><p class="sh" style="margin:0">Missed (' + missedKeys.length + ')</p>'
      + '<button class="btn bg btn-sm" style="color:var(--acc);border-color:var(--acc-b)" onclick="quantAddMissedToReview()" title="Create spaced-review flashcards from these">+ Add to review deck</button></div>'
      + rows + '</div>';
  } else if (sess.answered) {
    missed = '<div class="card" style="margin-bottom:14px"><p style="font-family:var(--sans);font-size:13px;color:#49c47e">Clean sweep — no misses.</p></div>';
  }

  var actions = '<div class="row" style="gap:8px;flex-wrap:wrap">'
    + '<button class="btn bp" onclick="startQuantDrill(' + sess.bankId + ',\'' + sess.mode + '\',' + (sess.mode === 'timed' ? Math.round((sess.endTime - sess.startTime) / 1000) : 0) + ')">Drill again</button>'
    + '<button class="btn bg" onclick="exitQuant()">Choose another bank</button>'
    + '</div>';
  return head + missed + actions;
}

function renderLibrary() {
  function sectionTab(id, label) {
    var act = S.librarySection === id;
    return '<button class="btn ' + (act ? 'bp' : 'bg') + ' btn-sm" onclick="setLibrarySection(\'' + id + '\')">' + label + '</button>';
  }
  var tabs = '<div class="row" style="gap:8px;margin-bottom:22px;flex-wrap:wrap">'
    + sectionTab('docs', 'Documents')
    + sectionTab('cards', 'Flashcards' + (S.cards.length ? ' ' + S.cards.length : ''))

  if (S.librarySection === 'docs') body = renderUpload();
  else if (S.librarySection === 'cards') body = renderCards();

}

// ════════════════════════════════════════════
// RENDER — PROGRESS (stats + readiness + planner)
// ════════════════════════════════════════════
function renderProgress() {
  var plan = examSchedulePlan();
  var readiness = (plan.days !== null) ? computeReadiness() : null;

  var readinessSection = '';
  if (readiness) {
    var col = readiness.pct >= 80 ? '#49c47e' : readiness.pct >= 55 ? '#c49a3a' : '#d05555';
    var gapText = readiness.gaps.length
      ? '<p style="font-family:var(--sans);font-size:12px;color:var(--mut);margin-top:6px">Untested: ' + readiness.gaps.map(function(g) { return esc(g); }).join(' · ') + '</p>' : '';
    var weakText = readiness.weakTopics.length
      ? '<p style="font-family:var(--sans);font-size:12px;color:var(--warn);margin-top:4px">Weak: ' + readiness.weakTopics.map(function(t) { return esc(t); }).join(' · ') + '</p>' : '';
    readinessSection = '<div class="card" style="margin-bottom:14px;border-left:3px solid ' + col + '">'
      + '<div class="rowsb" style="margin-bottom:8px">'
      + '<p style="font-family:var(--sans);font-size:12px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.07em">Exam Readiness</p>'
      + '<span style="font-family:var(--sans);font-size:22px;font-weight:700;color:' + col + '">' + readiness.pct + '%</span></div>'
      + '<div class="prog" style="margin-bottom:6px"><div class="pf" style="width:' + readiness.pct + '%;background:' + col + '"></div></div>'
      + '<p style="font-family:var(--sans);font-size:12px;color:var(--mut)">Coverage ' + readiness.coveragePct + '% × Retention ' + readiness.retentionPct + '%</p>'
      + gapText + weakText + '</div>';
  }

  // G6: Calibration card
  var calibration = S.meta.calibration || { total: 0, overconfident: 0 };
  var calibCard = calibration.total >= 5
    ? (function() {
        var pct = Math.round(calibration.overconfident / calibration.total * 100);
        var col = pct >= 30 ? '#d05555' : pct >= 15 ? '#c49a3a' : '#49c47e';
        return '<div class="card" style="margin-bottom:14px">'
          + '<div class="rowsb"><p class="sh" style="margin:0">Confidence calibration</p>'
          + '<span style="font-family:var(--sans);font-size:18px;font-weight:700;color:' + col + '">' + pct + '% overconfident</span></div>'
          + '<p style="font-family:var(--sans);font-size:12px;color:var(--mut);margin-top:6px">Of ' + calibration.total + ' graded answers where you felt sure, ' + pct + '% were wrong. '
          + (pct >= 30 ? 'Study the material more carefully before answering.' : pct >= 15 ? 'Good calibration — review weak areas.' : 'Well calibrated!') + '</p></div>';
      })()
    : '';

  // G7: Term-scale study planner
  var plannerSection = '';
  if (plan.days !== null && S.docs.length) {
    var planBtn = S.studyPlan && S.studyPlan.loading
      ? '<p style="font-family:var(--sans);font-size:13px;color:var(--mut)">Generating plan…</p>'
      : S.studyPlan && S.studyPlan.plan
        ? '<div>' + S.studyPlan.plan.split('\n').filter(Boolean).slice(0, 14).map(function(line) {
            return '<p style="font-family:var(--sans);font-size:13px;color:var(--tx);padding:4px 0;border-bottom:1px solid var(--brd)">' + esc(line) + '</p>';
          }).join('') + '</div>'
          + '<button class="btn bg btn-sm" style="margin-top:10px" onclick="genStudyPlan()">Regenerate</button>'
        : '<button class="btn bg btn-sm" onclick="genStudyPlan()">Generate daily study plan</button>';
    plannerSection = '<div class="card" style="margin-bottom:14px">'
      + '<p class="sh" style="margin-bottom:10px">Study plan &middot; ' + plan.days + ' days until exam</p>'
      + planBtn + '</div>';
  }

  return readinessSection + calibCard + plannerSection + renderStats();
}
