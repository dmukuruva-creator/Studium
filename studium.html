function modelRole(model) {
  if (!model) return 'other';
  if (model.prov === 'openai-compatible') return 'local';
  if (model.prov === 'anthropic' || model.prov === 'openai' || model.prov === 'google') return 'frontier';
  return 'other';
}

function getModelPriority(model, task) {
  var role = modelRole(model);
  var mode = S.cfg.routingMode || 'hybrid';
  var score;
  if (mode === 'offline') {
    // Prefer local only; frontier models get deprioritized
    score = role === 'local' ? 0 : 2;
  } else if (mode === 'quality') {
    // Everything goes to frontier
    score = role === 'frontier' ? 0 : 2;
  } else {
    // Hybrid: local for bulk generation, frontier for grading/insight
    if (task === 'grading' || task === 'analysis' || task === 'insight') {
      score = role === 'frontier' ? 0 : 1;
    } else {
      score = role === 'local' ? 0 : 1;
    }
  }
  if (model.id === S.cfg.activeModel) score -= 0.1;
  return score;
}

function getModelTryList(task) {
  if (!S.cfg.autoFallback) return [S.cfg.activeModel];
  return MODELS.slice().filter(function(m) { return m.id === S.cfg.activeModel || hasKey(m.prov); }).sort(function(a, b) {
    var pa = getModelPriority(a, task);
    var pb = getModelPriority(b, task);
    if (pa !== pb) return pa - pb;
    if (a.id === S.cfg.activeModel) return -1;
    if (b.id === S.cfg.activeModel) return 1;
    return 0;
  }).map(function(m) { return m.id; });
}

function getPreferredModel(task) {
  var tryList = getModelTryList(task);
  for (var i = 0; i < tryList.length; i++) {
    var m = MODELS.find(function(x) { return x.id === tryList[i]; });
    if (m && hasKey(m.prov) && !isModelDead(m)) return m;
  }
  return getActiveModel();
}

async function callAI(sys, user, max, temperature, schema, task) {
  max = max || 900;
  const tryList = getModelTryList(task);

  let lastErr;
  for (const mid of tryList) {
    const model = MODELS.find(function(m) { return m.id === mid; });
    if (!model || !hasKey(model.prov)) continue;
    try {
      const res = await withRetry(function() {
        if (model.prov === 'anthropic') return apiAnthropic(mid, sys, user, max, temperature, schema);
        if (model.prov === 'openai')    return apiOpenAI(mid, sys, user, max, temperature, schema);
        if (model.prov === 'google')    return apiGoogle(mid, sys, user, max, temperature, schema);
        return apiOpenAICompatible(model.apiModel || mid, sys, user, max, temperature, schema);
      }, 3);
      if (res.tok) { S.cfg.usage[mid] = (S.cfg.usage[mid] || 0) + res.tok; saveCfg(); }
      if (mid !== S.cfg.activeModel) {
        const orig = MODELS.find(function(m) { return m.id === S.cfg.activeModel; });
        toast((orig ? orig.name : 'Active model') + ' unavailable \u2014 fell back to ' + model.name);
      }
      return res.text;
    } catch(e) {
      lastErr = e;
      if (e.name === 'AbortError') throw e;
      if (isFatal(e.message)) { throw new Error(model.name + ': ' + e.message); }
      if (!S.cfg.autoFallback) throw e;
    }
  }
  throw lastErr || new Error('All models failed or no API key configured');
}

// Robust structured generation: try schema-constrained output first, then fall
// back to a plain (no-schema) call if the response can't be parsed into the
// expected shape. Many models — especially local/compatible ones — return a
// single object or echo the schema under constrained decoding; the plain-prompt
// path (which worked before N8) is the safety net. parse(rawText) must return
// the finished result or throw on a bad shape.
async function genStructured(opts) {
  var attempts = [];
  if (opts.schema) attempts.push({ schema: opts.schema, label: 'schema' });
  attempts.push({ schema: null, label: 'plain' });
  var lastErr;
  for (var i = 0; i < attempts.length; i++) {
    var a = attempts[i];
    try {
      var raw;
      if (opts.stream) {
        raw = await streamGenerate(opts.sys, opts.user, opts.max, opts.onChunk || function() {}, a.schema);
      } else {
        raw = await callAI(opts.sys, opts.user, opts.max, opts.temp, a.schema, opts.task);
      }
      try {
        return opts.parse(raw);
      } catch (perr) {
        console.warn('[genStructured] ' + a.label + ' parse failed:', perr.message, '\nRaw response:', String(raw).slice(0, 800));
        lastErr = perr;
        // try next attempt (plain) on a shape/parse error
      }
    } catch (callErr) {
      if (callErr.name === 'AbortError') throw callErr;
      if (isFatal(callErr.message)) throw callErr;
      console.warn('[genStructured] ' + a.label + ' call failed:', callErr.message);
      lastErr = callErr;
    }
  }
  throw lastErr || new Error('Generation failed');
}

// ════════════════════════════════════════════
// STREAMING GRADING
// ════════════════════════════════════════════
async function _readSSE(response, extractDelta, onChunk) {
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let text = '', buffer = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim();
      if (data === '[DONE]') return text;
      try {
        const delta = extractDelta(JSON.parse(data));
        if (delta) { text += delta; onChunk(text); }
      } catch {}
    }
  }
  return text;
}

function extractStreamFeedback(partial) {
  const m = partial.match(/"feedback"\s*:\s*"((?:[^"\\]|\\.)*)"/);
  return m ? m[1].replace(/\\n/g, '\n').replace(/\\"/g, '"').replace(/\\\\/g, '\\') : '';
}

// Try exact/numeric match in JS before calling the LLM grader.
// Returns a grade result object if it can decide, otherwise null.
function _tryNumericGrade(q, answer) {
  if (!q.answer) return null;
  function normalizeNum(s) {
    s = String(s).trim().toLowerCase().replace(/,/g, '').replace(/\s+/g, '');
    var n = parseFloat(s);
    return isNaN(n) ? null : n;
  }
  var modelNum = normalizeNum(q.answer);
  var studentNum = normalizeNum(answer);
  if (modelNum === null || studentNum === null) return null;
  // Only auto-grade if question answer is a short numeric token
  if (String(q.answer).trim().split(/\s+/).length > 4) return null;
  // When model answer is zero, use absolute tolerance; otherwise relative.
  var correct = Math.abs(modelNum) < 1e-9
    ? Math.abs(studentNum) < 0.001
    : Math.abs(modelNum - studentNum) / Math.abs(modelNum) < 0.001;
  return {
    correct: correct,
    score: correct ? 3 : 0,
    feedback: correct ? 'Correct.' : 'Expected ' + q.answer + ', got ' + answer + '.',
    modelAnswer: q.answer,
    _autoGraded: true,
  };
}

// Look up the source section text for a question to ground the grader.
function _sourceTextForQuestion(q) {
  if (!q || !q.sourceSection) return '';
  var secs = studySections();
  var sec = secs.find(function(s) { return s.title === q.sourceSection || s.path === q.sourceSection; });
  if (!sec) return '';
  var txt = sec.content || '';
  return txt.slice(0, 2000); // keep it short to fit in grading context
}

function gradePayload(q, answer) {
  var srcText = _sourceTextForQuestion(q);
  var srcBlock = srcText
    ? '\n\nSource notes (authoritative — evaluate against these, not the model answer alone):\n"""\n' + srcText + '\n"""'
    : '';
  var rubric = '\nEvaluate each criterion independently:\n- Correctness: is the core claim right?\n- Completeness: are key points covered?\n- Accuracy: no false statements?\nSum to a score 0-3.';
  const sys = _personaSys() + 'You are an expert academic evaluator whose goal is to build the student\'s understanding and intuition, not just mark right/wrong.' + rubric + ' Reply ONLY with valid JSON — no prose:\n{"correct":true/false,"score":0-3,"feedback":"1-2 concise sentences on what was right or wrong, naming the specific error or the precise gap","keyIdea":"the single underlying principle or intuition that makes the correct answer correct, phrased so it transfers to similar problems (1-2 sentences, plain and memorable)","modelAnswer":"brief answer"}\nScoring: 3=fully correct, 2=mostly right, 1=partial, 0=wrong. Always fill keyIdea, even when the answer is correct, to deepen the mental model.';
  const user = 'Question: ' + q.question + '\nModel answer: ' + q.answer + '\nStudent answer: ' + answer + srcBlock;
  const max = 800;
  return { sys, user, max };
}

async function streamGrade(q, answer, onChunk) {
  const payload = gradePayload(q, answer);
  const sys = payload.sys;
  const user = payload.user;
  const max = payload.max;
  const model = getPreferredModel('grading');

  if (!hasKey(model.prov)) throw new Error('No API key configured for ' + model.name + '. Add one in Settings.');

  if (model.prov === 'google') {
    var raw = await callAI(sys, user, max, 0, undefined, 'grading');
    if (onChunk) onChunk(raw);
    return raw;
  }

  async function fallbackToCallAI(originalError) {
    if (originalError.name === 'AbortError') throw originalError;
    if (isFatal(originalError.message)) throw originalError;
    if (!S.cfg.autoFallback) throw originalError;
    var raw = await callAI(sys, user, max, 0, undefined, 'grading');
    if (onChunk) onChunk(raw);
    return raw;
  }

  try {
    let r;
    if (model.prov === 'anthropic') {
      r = await fetch('/proxy/anthropic', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: model.id, max_tokens: max, temperature: 0, stream: true,
          system: [{ type: 'text', text: sys, cache_control: { type: 'ephemeral' } }],
          messages: [{ role: 'user', content: [{ type: 'text', text: user, cache_control: { type: 'ephemeral' } }] }],
        }),
        signal: _sig(),
      });
      if (!r.ok) { const e = await r.json().catch(function() { return {}; }); throw new Error(extractErrMsg(e, r.status)); }
      return _readSSE(r, function(evt) { return evt.type === 'content_block_delta' && evt.delta?.text ? evt.delta.text : null; }, onChunk);
    }

    if (model.prov === 'openai') {
      r = await fetch('/proxy/openai', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: model.id, max_tokens: max, temperature: 0, stream: true, messages: [{ role: 'system', content: sys }, { role: 'user', content: user }] }),
        signal: _sig(),
      });
    } else {
      var base = String(S.cfg.openaiCompatibleBaseUrl || '').replace(/\/+$/, '');
      r = await fetch('/proxy/openai-compatible', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ _base_url: base, model: model.apiModel || model.id, max_tokens: max, temperature: 0, stream: true, messages: [{ role: 'system', content: sys }, { role: 'user', content: user }] }),
        signal: _sig(),
      });
    }
    if (!r.ok) { const e = await r.json().catch(function() { return {}; }); throw new Error(extractErrMsg(e, r.status)); }
    return _readSSE(r, function(evt) { return evt.choices?.[0]?.delta?.content ?? null; }, onChunk);
  } catch (e) {
    return fallbackToCallAI(e);
  }
}

// ── Streaming generation (like streamGrade but for quiz/card creation) ─────
async function streamGenerate(sys, user, max, onChunk, schema) {
  if (schema) return callAI(sys, user, max, 0.7, schema, 'generation');
  const model = getPreferredModel('generation');
  if (!hasKey(model.prov)) throw new Error('No API key configured. Add one in Settings.');
  if (model.prov === 'google') return callAI(sys, user, max, 0.7, undefined, 'generation');

  try {
    let r;
    if (model.prov === 'anthropic') {
      r = await fetch('/proxy/anthropic', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: model.id, max_tokens: max, temperature: 0.7, stream: true,
          system: [{ type: 'text', text: sys, cache_control: { type: 'ephemeral' } }],
          messages: [{ role: 'user', content: [{ type: 'text', text: user, cache_control: { type: 'ephemeral' } }] }] }),
        signal: _sig(),
      });
      if (!r.ok) { const e = await r.json().catch(function() { return {}; }); throw new Error(extractErrMsg(e, r.status)); }
      return _readSSE(r, function(evt) { return evt.type === 'content_block_delta' && evt.delta?.text ? evt.delta.text : null; }, onChunk);
    }

    if (model.prov === 'openai') {
      r = await fetch('/proxy/openai', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: model.id, max_tokens: max, temperature: 0.7, stream: true, messages: [{ role: 'system', content: sys }, { role: 'user', content: user }] }),
        signal: _sig(),
      });
    } else {
      var base = String(S.cfg.openaiCompatibleBaseUrl || '').replace(/\/+$/, '');
      r = await fetch('/proxy/openai-compatible', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ _base_url: base, model: model.apiModel || model.id, max_tokens: max, temperature: 0.7, stream: true, messages: [{ role: 'system', content: sys }, { role: 'user', content: user }] }),
        signal: _sig(),
      });
    }

    if (!r.ok) { const e = await r.json().catch(function() { return {}; }); throw new Error(extractErrMsg(e, r.status)); }
    return _readSSE(r, function(evt) { return evt.choices?.[0]?.delta?.content ?? null; }, onChunk);
  } catch (e) {
    if (e.name === 'AbortError') throw e;
    if (isFatal(e.message)) throw e;
    if (!S.cfg.autoFallback) throw e;
    var raw = await callAI(sys, user, max, 0.7, undefined, 'generation');
    if (onChunk) onChunk(raw);
    return raw;
  }
}

// ════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function jsEsc(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function pj(t) {
  if (t && typeof t !== 'string') return t;
  function clean(s) { return s.trim().replace(/^```(?:json)?[\r\n]*/i, '').replace(/[\r\n]*```\s*$/i, '').trim(); }
  function repair(s) {
    return s.replace(/,\s*([}\]])/g, '$1').replace(/}\s*{/g, '},{').replace(/]\s*\[/g, '],[');
  }
  function balanced(s) {
    var start = s.search(/[\[{]/);
    if (start < 0) return '';
    var open = s[start], close = open === '[' ? ']' : '}';
    var depth = 0, inStr = false, escd = false;
    for (var i = start; i < s.length; i++) {
      var ch = s[i];
      if (inStr) {
        if (escd) escd = false;
        else if (ch === '\\') escd = true;
        else if (ch === '"') inStr = false;
      } else if (ch === '"') inStr = true;
      else if (ch === open) depth++;
      else if (ch === close && --depth === 0) return s.slice(start, i + 1);
    }
    return s.slice(start);
  }

  var s = clean(t), variants = [s];
  var m = s.match(/```(?:json)?\s*([\s\S]*?)\s*```/i);
  if (m) variants.push(clean(m[1]));
  var b = balanced(s);
  if (b) variants.push(b);
  var tries = variants.concat(variants.map(repair));
  for (var i=0; i<tries.length; i++) {
    try { return JSON.parse(tries[i]); } catch {}
  }
  var objText = repair(b || s);
  var objs = objText.match(/\{[\s\S]*?\}(?=\s*,|\s*\]|\s*$)/g);
  if (objs && objs.length) {
    var parsed = objs.map(function(o) { try { return JSON.parse(repair(o)); } catch { return null; } }).filter(Boolean);
    if (parsed.length) return parsed;
  }
  throw new Error('Could not parse model response as JSON');
}

function unwrapStructuredOutput(obj) {
  if (Array.isArray(obj)) return obj;
  if (!obj || typeof obj !== 'object') return obj;
  // Concept-map shape: keep the {nodes,edges} object intact (checked before generic array unwrap)
  if (Array.isArray(obj.nodes) && Array.isArray(obj.edges)) return obj;
  if (Array.isArray(obj.items)) return obj.items;
  var keys = Object.keys(obj);
  // Any array-valued property → use the longest array (handles {questions:[...]}, {cards:[...]}, {data:[...]}, etc.)
  var arrKeys = keys.filter(function(k) { return Array.isArray(obj[k]); });
  if (arrKeys.length) {
    arrKeys.sort(function(a, b) { return obj[b].length - obj[a].length; });
    return obj[arrKeys[0]];
  }
  if (keys.length === 1) return unwrapStructuredOutput(obj[keys[0]]);
  for (var k = 0; k < keys.length; k++) {
    var child = obj[keys[k]];
    if (child && typeof child === 'object') {
      var unwrapped = unwrapStructuredOutput(child);
      if (Array.isArray(unwrapped)) return unwrapped;
      if (unwrapped && typeof unwrapped === 'object' && Array.isArray(unwrapped.nodes) && Array.isArray(unwrapped.edges)) return unwrapped;
    }
  }
  // A single record object (all values primitive) — wrap as a one-item array so generation still yields something
  if (keys.length && keys.every(function(k) { return obj[k] == null || typeof obj[k] !== 'object'; })) return [obj];
  return obj;
}

function validItems(items, fields, optFields) {
  items = unwrapStructuredOutput(items);
  if (!Array.isArray(items)) throw new Error('Model response was not a JSON array');
  var cleaned = items
    .filter(function(x) { return x && typeof x === 'object'; })
    .map(function(x) {
      var out = {};
      fields.forEach(function(f) { out[f] = String(x[f] || '').trim(); });
      (optFields || []).forEach(function(f) { var v = String(x[f] || '').trim(); if (v) out[f] = v; });
      return out;
    })
    .filter(function(x) { return fields.every(function(f) { return !!x[f]; }); });
  if (!cleaned.length) throw new Error('Model response did not contain usable items');
  return cleaned;
}

// Phase 3: send the whole scoped section to a long-context model;
// only truncate when the content genuinely exceeds the token budget.
const TOKEN_BUDGET = 24000; // ~96k chars at chars/4 ≈ tokens
function contextText(text) {
  var est = Math.round(text.length / 4);
  if (est <= TOKEN_BUDGET) return text;
  var limit = TOKEN_BUDGET * 4;
  // STU-4 — never truncate silently: surface a visible warning to the user with
  // an estimate of how much was dropped (~1800 chars ≈ one page).
  var omittedPages = Math.max(1, Math.round((text.length - limit) / 1800));
  if (typeof toast === 'function') {
    toast('Context truncated — ~' + omittedPages + ' page' + (omittedPages === 1 ? '' : 's')
      + ' omitted (exceeds the ' + TOKEN_BUDGET.toLocaleString()
      + '-token budget). Scope to a section for full coverage.');
  }
  return text.slice(0, limit)
    + '\n\n[Content truncated: ~' + est.toLocaleString() + ' estimated tokens exceeds '
    + TOKEN_BUDGET.toLocaleString() + '-token budget. Select a specific section scope for full coverage.]';
}

// ── Model validation ────────────────────────────────────────────────────────
var _liveModelIds = {};   // provider → Set of valid model IDs from live API
var _deadModels   = new Set(); // model IDs that are not in the live list

function isModelDead(m) { return _deadModels.has(m.id); }

async function validateModels() {
  var providers = ['anthropic', 'openai', 'google'];
  var changed = false;
  await Promise.all(providers.map(async function(prov) {
    if (!hasKey(prov)) return;
    try {
      var res = await fetch('/models/' + prov);
      if (!res.ok) return;
      var data = await res.json();
      if (Array.isArray(data.models) && data.models.length > 0) {
        _liveModelIds[prov] = new Set(data.models);
        changed = true;
      }
    } catch (e) {}
  }));
  if (!changed) return;
  _deadModels = new Set();
  MODELS.forEach(function(m) {
    var live = _liveModelIds[m.prov];
    if (live && !live.has(m.id)) _deadModels.add(m.id);
  });
  // Auto-switch away from a dead active model
  if (_deadModels.has(S.cfg.activeModel)) {
    var fallback = MODELS.find(function(m) { return hasKey(m.prov) && !_deadModels.has(m.id); });
    if (fallback) {
      S.cfg.activeModel = fallback.id;
      saveCfg();
      toast('Active model unavailable on provider — switched to ' + fallback.name);
    }
  }
  render();
}

// ════════════════════════════════════════════
// FSRS — scheduling engine
// ════════════════════════════════════════════
function fsrsLib() { return window._fsrsLib || null; }

function fsrsRetentionPct(fsrsCard) {
  if (!fsrsCard || !fsrsCard.stability || !fsrsCard.last_review) return null;
  var t = Math.max(0, (Date.now() - new Date(fsrsCard.last_review).getTime()) / 86400000);
  // FSRS power forgetting curve: R = (1 + 19/81 * t/S)^(-0.5); at t=S, R=0.9
  var R = Math.pow(1 + (19 / 81) * t / fsrsCard.stability, -0.5);
  return Math.round(Math.max(0, Math.min(1, R)) * 100);
}

function fsrsIsDue(fsrsCard) {
  return !!fsrsCard && new Date(fsrsCard.due) <= new Date();
}

function fsrsIsMastered(card) {
  if (!card.fsrs) return card.mastered || false;
  var ret = fsrsRetentionPct(card.fsrs);
  return card.fsrs.state === 2 && ret !== null && ret >= 90;
}

function fsrsAvgRetention() {
  var total = 0, n = 0;
  S.cards.forEach(function(c) {
    if (c.fsrs && c.fsrs.stability && c.fsrs.last_review) {
      var r = fsrsRetentionPct(c.fsrs);
      if (r !== null) { total += r; n++; }
    }
  });
  return n >= 5 ? Math.round(total / n) : null; // hide until sample ≥5
}

function fsrsNextDueLabel(fsrsCard) {
  if (!fsrsCard || !fsrsCard.due) return '';
  var diffMs = new Date(fsrsCard.due) - Date.now();
  if (diffMs < 0) return 'now';
  var mins = Math.round(diffMs / 60000);
  if (mins < 60) return mins + 'm';
  var hrs = Math.round(diffMs / 3600000);
  if (hrs < 24) return hrs + 'h';
  return Math.round(diffMs / 86400000) + 'd';
}

// Interleaved practice (Rohrer/Kornell): spread topics so consecutive items
// rarely share a topic. Stable round-robin across topic buckets — preserves the
// original (due-date) order within each topic. Pure function.
function _interleaveByTopic(list, keyFn) {
  var buckets = [], index = {};
  list.forEach(function(item) {
    var k = keyFn(item) || '';
    if (index[k] == null) { index[k] = buckets.length; buckets.push([]); }
    buckets[index[k]].push(item);
  });
  if (buckets.length <= 1) return list.slice();
  var out = [], remaining = list.length;
  while (remaining > 0) {
    for (var b = 0; b < buckets.length; b++) {
      if (buckets[b].length) { out.push(buckets[b].shift()); remaining--; }
    }
  }
  return out;
}

function fsrsComputeTodayQueue() {
  var plan = examSchedulePlan();
  var due = S.cards.filter(function(c) { return !isCardSuspended(c) && c.fsrs && fsrsIsDue(c.fsrs); });
  due.sort(function(a, b) { return new Date(a.fsrs.due) - new Date(b.fsrs.due); });
  // Interleave the due set by topic (research-backed); new/leech tail stays appended.
  due = _interleaveByTopic(due, function(c) { return (c.topic || '').toLowerCase(); });
  var neverReviewed = S.cards.filter(function(c) { return !isCardSuspended(c) && (!c.fsrs || !c.fsrs.reps); });
  // Deprioritize new cards that are flagged as leeches (they should be handled explicitly)
  var normalNew = neverReviewed.filter(function(c) { return !c.leech; });
  var leechNew = neverReviewed.filter(function(c) { return !!c.leech; });
  var cap = plan.cram && due.length ? 0 : plan.cap;
  return due.concat(normalNew.slice(0, cap)).concat(leechNew).map(function(c) { return c.id; });
}

async function rateCard(cardId, ratingNum) {
  var lib = fsrsLib();
  if (!lib) { toast('FSRS library not loaded yet — reload the page'); return; }
  var card = S.cards.find(function(c) { return c.id === cardId; });
  if (!card) return;
  try {
    var f = lib.fsrs(lib.generatorParameters());
    var fsrsCard = card.fsrs || lib.createEmptyCard();
    var ratingMap = [null, lib.Rating.Again, lib.Rating.Hard, lib.Rating.Good, lib.Rating.Easy];
    var out = f.next(fsrsCard, new Date(), ratingMap[ratingNum]);
    S.cards = S.cards.map(function(c) {
      var updated = c.id === cardId ? Object.assign({}, c, { fsrs: out.card }) : c;
      if (updated.id === cardId && fsrsLapses(updated) >= 4) updated.leech = true;
      return updated;
    });
    var review = {
      id: String(Date.now()) + String(Math.random()).slice(2),
      cardId: cardId, rating: ratingNum,
      ts: new Date().toISOString(), state: out.card.state,
    };
    await _dbAddReview(review);
    recordStreak();
    saveCards();
    if (S.todayActive && S.todayStats) {
      S.todayStats.cards++;
      var curItem = S.todayQ[S.todayIdx];
      if (ratingNum === 1 && curItem && !curItem.consolidation) {
        S.todayStats.again++;
        S.todayStats.missed.push({ type: 'card', consolidation: true, id: cardId });
      }
    }
    if (S.todayActive) { S.todayIdx++; S.todayFlipped = false; _todayMaybeConsolidate(); }
    render();
  } catch(e) {
    toast('Rating error: ' + e.message);
  }
}

async function rephraseLeechCard(cardId) {
  var card = S.cards.find(function(c) { return c.id === cardId; });
  if (!card) return;
  if (!hasKey(getActiveModel().prov)) { toast('Add an API key in Settings to rephrase.'); return; }
  showSpin('Rephrasing card…');
  try {
    var srcText = card.sourceSection ? _sourceTextForQuestion({ sourceSection: card.sourceSection }) : '';
    var srcBlock = srcText ? '\n\nSource notes:\n"""\n' + srcText + '\n"""' : '';
    var sys = 'You are a study-card editor. The student struggles with this flashcard (it is a "leech"). Rephrase both the front (question) and back (answer) to be clearer, more memorable, and more specific. Keep the same knowledge being tested. Reply ONLY with valid JSON:\n{"front":"rephrased question","back":"rephrased answer","note":"brief mnemonic or insight"}' + srcBlock;
    var user = 'Current front: ' + card.front + '\nCurrent back: ' + card.back + '\n' + (card.note ? 'Current note: ' + card.note : '');
    var raw = await callAI(sys, user, 400, 0.7, undefined, 'generation');
    var result = pj(raw);
    if (!result || !result.front || !result.back) throw new Error('No valid rephrase returned');
    S.cards = S.cards.map(function(c) {
      if (c.id !== cardId) return c;
      return Object.assign({}, c, { front: result.front, back: result.back, note: result.note || c.note, leech: false });
    });
    saveCards();
    toast('Card rephrased. Review the new wording.');
    render();
  } catch(e) {
    toast('Rephrase failed: ' + e.message);
  } finally { hideSpin(); }
}

function submitTypedCard(cardId) {
  var inp = document.getElementById('typed-card-ans');
  var answer = inp ? inp.value.trim() : '';
  if (!answer) return;
  var card = S.cards.find(function(c) { return c.id === cardId; });
  if (!card) return;
  var correct = _normalizeCloze(answer) === _normalizeCloze(card.back);
  if (correct) {
    toast('Correct!');
    rateCard(cardId, 3); // auto-rate Good
  } else {
    toast('Expected: ' + card.back);
    S.todayFlipped = true; // show answer for manual rating
    render();
  }
}

function suspendCard(cardId) {
  S.cards = S.cards.map(function(c) { return c.id === cardId ? Object.assign({}, c, { suspended: true }) : c; });
  S.meta.suspendedCards = Array.from(new Set((S.meta.suspendedCards || []).concat([cardId])));
  saveCards();
  saveMeta();
  if (S.todayActive) { S.todayIdx++; S.todayFlipped = false; }
  render();
}

function unsuspendCard(cardId) {
  S.cards = S.cards.map(function(c) { return c.id === cardId ? Object.assign({}, c, { suspended: false }) : c; });
  S.meta.suspendedCards = (S.meta.suspendedCards || []).filter(function(id) { return id !== cardId; });
  saveCards();
  saveMeta();
  render();
}

function _todayBuildMixedQueue(cardItems, quizItems) {
  if (!quizItems.length) return cardItems;
  if (!cardItems.length) return quizItems;
  var result = [];
  var step = Math.max(2, Math.ceil(cardItems.length / (quizItems.length + 1)));
  var qi = 0;
  cardItems.forEach(function(item, i) {
    result.push(item);
    if ((i + 1) % step === 0 && qi < quizItems.length) result.push(quizItems[qi++]);
  });
  while (qi < quizItems.length) result.push(quizItems[qi++]);
  return result;
}

async function _generateWeakTopicQs(N) {
  var insights = getAnalyticsInsights();
  var ctx = studyContext();
  var topics = insights.weakTopics.slice(0, N);
  if (!topics.length) return [];
  var topicStr = topics.map(function(w) { return w.topic; }).join(', ');
  var sectionTitles = ctx.sections ? ctx.sections.map(function(s) { return s.title; }).filter(function(t, i, a) { return a.indexOf(t) === i; }) : [];
  var topicConstraint = sectionTitles.length
    ? '\n\nFor the "topic" field, use ONLY one of these section headings (exact text): ' + sectionTitles.slice(0, 20).map(function(t) { return '"' + t + '"'; }).join(', ') + '.'
    : '';
  var count = N + 1;
  var items = _validateAndFixSections(await genStructured({
    sys: 'Generate exactly ' + count + ' quiz questions specifically targeting these weak topics: ' + topicStr + '. Reply ONLY with a valid JSON array:\n[{"question":"...","hint":"short nudge","answer":"model answer","topic":"one of the given topics","sourceSection":"exact section heading"}]' + topicConstraint,
    user: 'Study scope: ' + ctx.label + '\n\nStudy material:\n' + contextText(ctx.text),
    max: Math.min(16000, Math.max(2000, count * 640)), temp: 0.7, schema: JSON_SCHEMAS.quizList, task: 'generation', stream: false,
    parse: function(raw) { return validItems(unwrapStructuredOutput(pj(raw)), ['question','answer'], ['hint','topic','sourceSection']); },
  })).slice(0, N);
  return items.map(function(q, i) {
    return { type: 'quiz', q: Object.assign({ id: Date.now() + i }, q) };
  });
}

// Focus-session sizes (total item cap). A bounded session prevents endless
// grinding and supports planning — both improve adherence and retention.
var FOCUS_SIZES = { quick: 8, standard: 16, deep: 30 };

async function startTodaySession(size) {
  size = FOCUS_SIZES[size] ? size : 'standard';
  var cap = FOCUS_SIZES[size];
  S.todayQ = []; S.todayIdx = 0; S.todayFlipped = false; S.todayActive = false;
  S.todayAns = ''; S.todayResult = null; S.todayGrading = null; S.todayBuilding = true;
  render();

  // Reserve ~1/3 of the budget for active-recall questions, the rest for spaced review.
  var qBudget = Math.max(1, Math.min(4, Math.round(cap / 5)));
  var cardItems = fsrsComputeTodayQueue().slice(0, cap).map(function(id) { return { type: 'card', id: id }; });
  var quizItems = [];
  var insights = getAnalyticsInsights();
  if (S.docs.length && hasKey(getActiveModel().prov)) {
    var N = insights.weakTopics.length ? Math.min(qBudget, insights.weakTopics.length) : 0;
    if (N) { try { quizItems = await _generateWeakTopicQs(N); } catch(e) {} }
  }
  // Keep the whole session within the chosen size.
  var room = Math.max(0, cap - quizItems.length);
  cardItems = cardItems.slice(0, room);
  var queue = quizItems.length ? _todayBuildMixedQueue(cardItems, quizItems) : cardItems;

  S.todayStats = {
    start: Date.now(), size: size, mainLen: queue.length,
    quiz: [], cards: 0, again: 0, missed: [], byTopic: {}, consolidationAdded: false,
  };
  S.todayQ = queue;
  S.todayBuilding = false;
  S.todayActive = true;
  render();
}

function endTodaySession() {
  S.todayActive = false; S.todayQ = []; S.todayIdx = 0; S.todayFlipped = false;
  S.todayAns = ''; S.todayResult = null; S.todayGrading = null; S.todayStats = null;
  render();
}

function _todayPhaseLabel() {

function _todayElapsedLabel() {

function _recordTodaySessionQuiz(q, result) {

  };

  var html = '<div class="card" style="text-align:center;padding:34px 24px 26px">'
    + '<p style="font-family:var(--sans);font-size:24px;font-weight:700;color:var(--acc);margin-bottom:4px">Session complete</p>'
    + '<p style="font-family:var(--sans);font-size:13px;color:var(--mut)">' + durMin + ' min · ' + S.streak.count + '-day streak' + (st.consolidationAdded ? ' · consolidation done' : '') + '</p>'
    + '</div>';

  html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:14px 0">'
    + statCell(st.cards, 'Cards reviewed', '#4c79f2')
    + statCell(nQuiz, 'Questions', 'var(--gold)')
    + statCell(acc === null ? '—' : acc + '%', 'Accuracy', accCol)
    + '</div>';

  if (improved.length || stillWeak.length) {

      + (improved.length ? '<p style="font-family:var(--sans);font-size:12px;font-weight:700;color:#49c47e;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px">Solid this session</p>' + chips(improved, '#49c47e') : '')
      + (improved.length && stillWeak.length ? '<div style="height:12px"></div>' : '')
      + (stillWeak.length ? '<p style="font-family:var(--sans);font-size:12px;font-weight:700;color:#d05555;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px">Still shaky</p>' + chips(stillWeak, '#d05555') : '')
      + '</div>';
  }

  html += '<div class="card" style="border-left:3px solid var(--acc);margin-bottom:16px">'
    + '<p style="font-family:var(--sans);font-size:12px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Recommended next</p>'
    + recs.map(function(r) { return '<p style="font-family:var(--sans);font-size:13.5px;line-height:1.6;color:var(--tx);margin-bottom:6px">• ' + r + '</p>'; }).join('')
    + '</div>';

  html += '<div class="row" style="gap:10px">'
    + '<button class="btn bp" onclick="endTodaySession()">Done</button>'
    + (stillWeak.length ? '<button class="btn bg" onclick="endTodaySession();goStudyIntent(\'drill\')">Practice weak topics</button>' : '')
    + '</div>';
  return html;
}

// When the main queue is exhausted, append a corrective re-test of everything
// missed this session (immediate retrieval of errors is high-yield for retention).
function _todayMaybeConsolidate() {
  var st = S.todayStats; if (!st) return;
  if (S.todayIdx < S.todayQ.length) return;
  if (st.consolidationAdded || !st.missed.length) return;
  st.consolidationAdded = true;
  S.todayQ = S.todayQ.concat(st.missed);
  S.todayAns = ''; S.todayResult = null; S.todayGrading = null; S.missedQOffer = null;
  toast('Consolidation round — retrying ' + st.missed.length + ' missed item' + (st.missed.length > 1 ? 's' : ''));
}

async function todaySubmitQ() {
  var ta = document.getElementById('today-q-ans');
  var a = ta ? ta.value.trim() : '';
  if (!a) return;
  S.todayAns = a;
  var item = S.todayQ[S.todayIdx];
  if (!item || item.type !== 'quiz') return;
  var q = item.q;
  // Fast JS path for cloze questions (no LLM needed)
  if (q.type === 'cloze') {
    var clozeResult = gradeCloze(q, a);
    S.todayGrading = null;
    S.todayResult = clozeResult;
    _recordQuizAttempt(q, a, clozeResult);
    _recordTodaySessionQuiz(q, clozeResult);
    var csc = clozeResult.score;
    if (csc === 0) { S.missedQOffer = null; _autoAddMissedCard(q, clozeResult); }
    else if (csc === 1) { S.missedQOffer = _buildMissedCardData(q, clozeResult); }
    else { S.missedQOffer = null; }
    render(); return;
  }
  // Fast JS path for numeric answers
  var autoResult = _tryNumericGrade(q, a);
  if (autoResult) {
    S.todayGrading = null;
    S.todayResult = autoResult;
    _recordQuizAttempt(q, a, autoResult);
    _recordTodaySessionQuiz(q, autoResult);
    var sc2 = autoResult.score;
    if (sc2 === 0) { S.missedQOffer = null; _autoAddMissedCard(q, autoResult); }
    else if (sc2 === 1) { S.missedQOffer = _buildMissedCardData(q, autoResult); }
    else { S.missedQOffer = null; }
    render(); return;
  }
  S.todayGrading = { text: '' };
  render();
  showSpin('Evaluating answer…');
  try {
    var raw = await streamGrade(q, a, function(full) {
      S.todayGrading.text = full;
      var el = document.getElementById('today-grade-stream');
      if (el) {
        el.innerHTML = _mathNormalize(extractStreamFeedback(full) || '•••');
        clearTimeout(_mathStreamTimer);
        _mathStreamTimer = setTimeout(function() {
          if (window.renderMathInElement && el.parentNode) { try { renderMathInElement(el, _katexOpts); } catch(e) {} }
        }, 120);
      }
    });
    S.todayGrading = null;
    S.todayResult = pj(raw);
    _recordQuizAttempt(q, a, S.todayResult);
    _recordTodaySessionQuiz(q, S.todayResult);
    var sc = S.todayResult.score;
    if (sc === 0) { S.missedQOffer = null; _autoAddMissedCard(q, S.todayResult); }
    else if (sc === 1) { S.missedQOffer = _buildMissedCardData(q, S.todayResult); }
    else { S.missedQOffer = null; }
  } catch(e) {
    S.todayGrading = null;
    if (e.name === 'AbortError') {
      toast('Evaluation cancelled.');
      S.todayResult = null;
    } else {
      S.todayResult = { correct: false, score: 0, feedback: 'Evaluation error: ' + e.message, modelAnswer: q.answer };
    }
  } finally {
    hideSpin();
    render();
  }
}

function todayNextQ() {
  S.todayAns = ''; S.todayResult = null; S.todayGrading = null; S.missedQOffer = null;
  S.todayIdx++;
  _todayMaybeConsolidate();
  render();
}

// Does a candidate string actually read like a section heading? PDF text
// extraction routinely emits several classes of pseudo-heading that must be
// rejected, or a single book explodes into hundreds of bogus "sections":
//   1. printed table-of-contents entries — "Foo . . . . . 12" (dot leaders);
//   2. pure numeric data / table rows — "500", "0 1500 3000", "0.1 0.12 …";
//   3. lines of code / pseudocode — "signal = pd.DataFrame(...)", "import numpy",
//      "if buy_size > 0: orders . append ( ... )", "class Trader :";
//   4. column / hyphenation fragments — "nance", "erence", "ing Ladder",
//      "perity 4)" — where extraction split a word across a line or column break.
// A genuine heading is a short, capitalised prose title, so it must contain real
// words, start with a capital, and carry none of those signatures. We rely on
// STRUCTURAL signals (operators, block colons, snake_case, tokenised call
// punctuation) rather than programming keywords, because keywords like "for",
// "in", "and", "is" are also ordinary heading words ("Calls and Puts").
function _looksLikeHeading(title) {
  var t = String(title || '').trim();
  if (t.length < 3 || t.length > 90) return false;
  if (!/[A-Za-z]{2,}/.test(t)) return false;                              // no word → numeric/data row
  if (/\.{3,}|(?:\.\s){2,}|…/.test(t)) return false;                      // ToC dot-leaders
  // First letter of a real heading is capitalised. Column/hyphenation
  // fragments start mid-word, lower-case ("nance", "ing Ladder", "perity 4)").
  var firstAlpha = t.match(/[A-Za-z]/);
  if (firstAlpha && firstAlpha[0] !== firstAlpha[0].toUpperCase()) return false;
  if (/[=~{}<>≤≥]|;\s|\b(import|def|return|lambda|print)\b/.test(t)) return false; // code: operators / obvious keywords
  if (/:\s*$/.test(t)) return false;                                      // Python block colon: "class Trader :"
  if (/\b\w+_\w+\b/.test(t)) return false;                                // snake_case identifier: "best_bid", "Z_ENTRY"
  if (/\s\.\s|\(\s|\s\)/.test(t)) return false;                           // tokenised call punctuation: " . ", "( ", " )"
  return true;
}

function headingMatches(text) {
  var cand = [], offset = 0, freq = {};
  text.split('\n').forEach(function(raw) {
    var s = raw.trim(), m, level = 0, title = '';
    if ((m = s.match(/^(#{1,6})\s+(.+?)\s*#*$/))) { level = m[1].length; title = m[2]; }
    else if ((m = s.match(/^((?:\d+\.)+\d*|\d+)[.)]?\s+(.{3,100})$/))) { level = Math.min(4, m[1].split('.').filter(Boolean).length + 1); title = m[2]; }
    else if ((m = s.match(/^(chapter|section|unit|part)\s+\w+[:.)-]?\s+(.{3,100})$/i))) { level = /chapter|unit|part/i.test(m[1]) ? 1 : 2; title = m[0]; }
    else if (/^[A-Z][A-Z0-9 ,:;()/-]{4,80}$/.test(s) && s.split(/\s+/).length >= 2 && s.split(/\s+/).length <= 10) { level = 2; title = s; }
    var t = (title || '').trim();
    if (level && t && _looksLikeHeading(t)) {
      var key = t.toLowerCase();
      cand.push({ index:offset, rawLen:raw.length, level:level, title:t, key:key });
      freq[key] = (freq[key] || 0) + 1;
    }
    offset += raw.length + 1;
  });
  // Collapse running page-headers: PDF extraction repeats a chapter/running
  // header on every page, so the same title recurs many times. A real heading
  // is near-unique; anything appearing >3× is a page-header — keep its first
  // occurrence only. (Trade-off: a heading legitimately reused >3× in one doc,
  // e.g. a per-chapter "Exercises", collapses to one entry — acceptable for a
  // navigation list, and far better than a wall of duplicates.)
  var seen = {};
  return cand.filter(function(c) {
    if (freq[c.key] > 3) { if (seen[c.key]) return false; seen[c.key] = 1; }
    return true;
  }).map(function(c) { return { index:c.index, rawLen:c.rawLen, level:c.level, title:c.title }; });
}

  var math = (text.match(/\$\$|\\\(|\\\[|\\begin\{|[∫∑√≈≤≥∞]/g) || []).length;

// Normalize document-level LaTeX (textbook / Green-Book-style exports) into HTML
// + inline-math that KaTeX auto-render can pick up. renderMathInElement only
// typesets text inside $…$ / \(…\) delimiters, so bank content authored in full
// LaTeX (\textbf{}, \par, \url, \$, bare \frac…) otherwise leaks as raw
// backslash text. Run this on any untrusted/exported text before it goes into a
// .math-rich node — it returns HTML-safe markup. Shared by the Quant Drill and
// any other .math-rich consumer that may receive full LaTeX.
function _mathNormalize(raw) {
  if (raw == null) return '';
  var s = String(raw);
  var MO = String.fromCharCode(1), DOL = String.fromCharCode(2);   // collision-proof sentinels

  // 1) Escaped dollar -> sentinel, so it is never mistaken for a math delimiter.
  s = s.replace(/\\\$/g, DOL);

  // 2) Protect already-delimited math so the HTML transforms below don't touch it.
  var math = [];
  s = s.replace(/\$\$[\s\S]*?\$\$|\\\[[\s\S]*?\\\]|\\\([\s\S]*?\\\)|\$[^$\n]+?\$/g, function(m) {
    return MO + (math.push(m) - 1) + MO;
  });

  // 3) Escape HTML in the remaining (non-math) text.
  s = esc(s);

  // 4) Document-level LaTeX -> HTML.
  s = s.replace(/\\textbf\{([^{}]*)\}/g, '<strong>$1</strong>')
       .replace(/\\(?:textit|emph)\{([^{}]*)\}/g, '<em>$1</em>')
       .replace(/\\url[\{(]([^){}]+)[)\}]/g, function(_, u) {
         var safe = u.trim();
         return /^https?:\/\//i.test(safe)                       // scheme guard - no javascript:
           ? '<a href="' + safe + '" target="_blank" rel="noopener" style="color:var(--acc)">' + safe + '</a>'
           : safe;
       })
       .replace(/\\(?:small|large|normalsize|footnotesize|textnormal|textrm)\b/g, '')
       .replace(/\\par\b\s*/g, '<br><br>')
       .replace(/\\\\\s*/g, '<br>')          // LaTeX explicit line break
       .replace(/\\%/g, '%')
       .replace(/\\&amp;/g, '&amp;')          // \& (esc already turned & into &amp;)
       .replace(/~/g, ' ');                   // LaTeX hard space

  // 5) Wrap bare math (outside delimiters) so KaTeX picks it up. Negative
  //    lookahead (not \b) so a digit right after the macro still counts
  //    (e.g. \frac23) while a longer command name (\fraction) does not.
  s = s.replace(/\\(?:frac|sqrt|sum|prod|int|binom|cdot|times|div|leq|geq|neq|approx|alpha|beta|gamma|delta|theta|lambda|mu|sigma|pi|infty)(?![a-zA-Z])(?:\{[^{}]*\}|\^\S|_\S|[0-9])*/g, function(m) {
    return '\\(' + m + '\\)';
  });

  // 6) Restore protected math with its <, >, & entity-escaped. renderMathInElement
  //    typesets from the DOM text node (entities already decoded back to literals),
  //    so escaping here keeps inline math like $P(a<b)$ from injecting a stray tag
  //    into the innerHTML while still rendering as a<b. The delimiters ($, \(, \[)
  //    contain none of these chars, so they survive intact.
  s = s.replace(new RegExp(MO + '(\\d+)' + MO, 'g'), function(_, i) {
    return math[+i].replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  });
  return s.split(DOL).join('<span class="tex-literal">$</span>');
}

// ════════════════════════════════════════════
// FORCE LAYOUT
// ════════════════════════════════════════════
function forceLayout(nodes, edges, W, H) {
  W = W || 680; H = H || 460;
  nodes = nodes.map(function(n, i) {
    return Object.assign({}, n, {
      x: W/2 + 210 * Math.cos(2*Math.PI*i/nodes.length - Math.PI/2),
      y: H/2 + 155 * Math.sin(2*Math.PI*i/nodes.length - Math.PI/2),
    });
  });
  var k = Math.sqrt(W * H / Math.max(nodes.length, 1)) * 0.82;  // airier spacing
  for (var it = 0; it < 90; it++) {
    var fx = nodes.map(function() { return 0; });
    var fy = nodes.map(function() { return 0; });
    for (var i = 0; i < nodes.length; i++) {
      for (var j = i+1; j < nodes.length; j++) {
        var dx = nodes[j].x - nodes[i].x || 0.1;
        var dy = nodes[j].y - nodes[i].y || 0.1;
        var d = Math.hypot(dx, dy);
        var f = k*k / (d*d);
        fx[i] -= f*dx; fy[i] -= f*dy;
        fx[j] += f*dx; fy[j] += f*dy;
      }
    }
    edges.forEach(function(e) {
      var si = nodes.findIndex(function(n) { return n.id === e.source; });
      var ti = nodes.findIndex(function(n) { return n.id === e.target; });
      if (si < 0 || ti < 0) return;
      var dx = nodes[ti].x - nodes[si].x;
      var dy = nodes[ti].y - nodes[si].y;
      var d = Math.hypot(dx, dy) || 1;
      var f = d / k * 0.25;
      fx[si] += f*dx/d; fy[si] += f*dy/d;
      fx[ti] -= f*dx/d; fy[ti] -= f*dy/d;
    });
    nodes.forEach(function(n, i) {
      n.x = Math.max(82, Math.min(W-82, n.x + fx[i]*0.55));
      n.y = Math.max(52, Math.min(H-52, n.y + fy[i]*0.55));
    });
  }
  return nodes;
}
