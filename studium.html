  var missed = '';
  if (missedKeys.length) {
    var rows = missedKeys.slice(0, 20).map(function(k) {
      var it = sess.missed[k];
      return '<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--brd);font-family:var(--sans);font-size:13px">'
        + '<span class="math-rich" style="flex:1;color:var(--mut)">' + _mathNormalize(it.q) + '</span>'
        + '<span class="math-rich" style="color:var(--tx);font-weight:600">' + _mathNormalize(it.a) + '</span></div>';
    }).join('');
    missed = '<div class="card" style="margin-bottom:14px">'
      + '<div class="rowsb" style="margin-bottom:8px"><p class="sh" style="margin:0">Missed (' + missedKeys.length + ')</p>'
      + '<button class="btn bg btn-sm" style="color:var(--acc);border-color:var(--acc-b)" onclick="quantAddMissedToReview()" title="Create spaced-review flashcards from these">+ Add to review deck</button></div>'
      + rows + '</div>';
  } else if (sess.answered) {
    missed = '<div class="card" style="margin-bottom:14px"><p style="font-family:var(--sans);font-size:13px;color:#49c47e">Clean sweep — no misses.</p></div>';
  }

  var actions = '<div class="row" style="gap:8px;flex-wrap:wrap">'
    + '<button class="btn bp" onclick="startQuantDrill(' + sess.bankId + ',\'' + sess.mode + '\',' + (sess.mode === 'timed' ? Math.round((sess.endTime - sess.startTime) / 1000) : 0) + ')">Drill again</button>'
    + '<button class="btn bg" style="color:var(--acc);border-color:var(--acc-b)" onclick="exitQuant();startQuantRecommended()">Recommended next</button>'
    + '<button class="btn bg" onclick="exitQuant()">Choose another bank</button>'
    + '</div>';
  return head + calib + breakdown + missed + actions;
}

// ════════════════════════════════════════════
// RENDER — LIBRARY (docs + cards + map merged)
// ════════════════════════════════════════════
function renderLibrary() {
  function sectionTab(id, label) {
    var act = S.librarySection === id;
    return '<button class="btn ' + (act ? 'bp' : 'bg') + ' btn-sm" onclick="setLibrarySection(\'' + id + '\')">' + label + '</button>';
  }
  var tabs = '<div class="row" style="gap:8px;margin-bottom:22px;flex-wrap:wrap">'
    + sectionTab('docs', 'Documents')
    + sectionTab('cards', 'Flashcards' + (S.cards.length ? ' ' + S.cards.length : ''))
    + sectionTab('map', 'Concept Map')
    + '</div>';

  var body = '';
  if (S.librarySection === 'docs') body = renderUpload();
  else if (S.librarySection === 'cards') body = renderCards();
  else if (S.librarySection === 'map') body = renderMap();

  return tabs + body;
}

// ════════════════════════════════════════════
// RENDER — PROGRESS (stats + readiness + planner)
// ════════════════════════════════════════════
function renderProgress() {
  var plan = examSchedulePlan();
  var readiness = (plan.days !== null) ? computeReadiness() : null;

  var readinessSection = '';
  if (readiness) {
    var col = readiness.pct >= 80 ? '#49c47e' : readiness.pct >= 55 ? '#c49a3a' : '#d05555';
    var gapText = readiness.gaps.length
      ? '<p style="font-family:var(--sans);font-size:12px;color:var(--mut);margin-top:6px">Untested: ' + readiness.gaps.map(function(g) { return esc(g); }).join(' · ') + '</p>' : '';
    var weakText = readiness.weakTopics.length
      ? '<p style="font-family:var(--sans);font-size:12px;color:var(--warn);margin-top:4px">Weak: ' + readiness.weakTopics.map(function(t) { return esc(t); }).join(' · ') + '</p>' : '';
    readinessSection = '<div class="card" style="margin-bottom:14px;border-left:3px solid ' + col + '">'
      + '<div class="rowsb" style="margin-bottom:8px">'
      + '<p style="font-family:var(--sans);font-size:12px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.07em">Exam Readiness</p>'
      + '<span style="font-family:var(--sans);font-size:22px;font-weight:700;color:' + col + '">' + readiness.pct + '%</span></div>'
      + '<div class="prog" style="margin-bottom:6px"><div class="pf" style="width:' + readiness.pct + '%;background:' + col + '"></div></div>'
      + '<p style="font-family:var(--sans);font-size:12px;color:var(--mut)">Coverage ' + readiness.coveragePct + '% × Retention ' + readiness.retentionPct + '%</p>'
      + gapText + weakText + '</div>';
  }

  // G6: Calibration card
  var calibration = S.meta.calibration || { total: 0, overconfident: 0 };
  var calibCard = calibration.total >= 5
    ? (function() {
        var pct = Math.round(calibration.overconfident / calibration.total * 100);
        var col = pct >= 30 ? '#d05555' : pct >= 15 ? '#c49a3a' : '#49c47e';
        return '<div class="card" style="margin-bottom:14px">'
          + '<div class="rowsb"><p class="sh" style="margin:0">Confidence calibration</p>'
          + '<span style="font-family:var(--sans);font-size:18px;font-weight:700;color:' + col + '">' + pct + '% overconfident</span></div>'
          + '<p style="font-family:var(--sans);font-size:12px;color:var(--mut);margin-top:6px">Of ' + calibration.total + ' graded answers where you felt sure, ' + pct + '% were wrong. '
          + (pct >= 30 ? 'Study the material more carefully before answering.' : pct >= 15 ? 'Good calibration — review weak areas.' : 'Well calibrated!') + '</p></div>';
      })()
    : '';

  // G7: Term-scale study planner
  var plannerSection = '';
  if (plan.days !== null && S.docs.length) {
    var planBtn = S.studyPlan && S.studyPlan.loading
      ? '<p style="font-family:var(--sans);font-size:13px;color:var(--mut)">Generating plan…</p>'
      : S.studyPlan && S.studyPlan.plan
        ? '<div>' + S.studyPlan.plan.split('\n').filter(Boolean).slice(0, 14).map(function(line) {
            return '<p style="font-family:var(--sans);font-size:13px;color:var(--tx);padding:4px 0;border-bottom:1px solid var(--brd)">' + esc(line) + '</p>';
          }).join('') + '</div>'
          + '<button class="btn bg btn-sm" style="margin-top:10px" onclick="genStudyPlan()">Regenerate</button>'
        : '<button class="btn bg btn-sm" onclick="genStudyPlan()">Generate daily study plan</button>';
    plannerSection = '<div class="card" style="margin-bottom:14px">'
      + '<p class="sh" style="margin-bottom:10px">Study plan &middot; ' + plan.days + ' days until exam</p>'
      + planBtn + '</div>';
  }

  // Focus time (Pomodoro) analytics
  var _ps = _pomoStats(S.pomoLog, Date.now());
  var focusCard = '';
  if (_ps.totalSessions > 0 || _ps.todayMin > 0) {
    var _tile = function (val, lbl) {
      return '<div style="flex:1;text-align:center"><div style="font-family:var(--sans);font-size:22px;font-weight:700;color:var(--acc)">' + val + '</div>'
        + '<div style="font-family:var(--sans);font-size:11px;color:var(--mut);margin-top:2px">' + lbl + '</div></div>';
    };
    focusCard = '<div class="card" style="margin-bottom:14px;border-left:3px solid var(--acc)">'
      + '<p class="sh" style="margin-bottom:12px">Focus time · Pomodoro</p>'
      + '<div class="row" style="gap:10px;align-items:stretch">'
      + _tile(_ps.todayMin + '<span style="font-size:13px;color:var(--mut)"> min</span>', 'Today')
      + _tile(_ps.todaySessions, 'Sessions today')
      + _tile(_ps.totalSessions, 'All-time sessions')
      + _tile(_ps.totalMin >= 60 ? (_ps.totalMin / 60).toFixed(1) + '<span style="font-size:13px;color:var(--mut)"> h</span>' : _ps.totalMin + '<span style="font-size:13px;color:var(--mut)"> min</span>', 'All-time focus')
      + '</div></div>';
  }
  return readinessSection + focusCard + calibCard + plannerSection + renderStats();
}

// ════════════════════════════════════════════
// G1 — MOCK EXAM
// ════════════════════════════════════════════
function setExamConfig(key, val) {
  if (!S.examConfig) S.examConfig = { docName: null, sectionId: null, size: 10 };
  S.examConfig[key] = val || null;
  if (key === 'docName') S.examConfig.sectionId = null;
  render();
}

function renderExamConfig() {
  var back = '<button class="btn bg btn-sm" onclick="goStudyIntent(null)" style="margin-bottom:20px">&#x2190; Home</button>';
  var header = '<p class="ph" style="margin:0 0 16px">Mock Exam</p>';
  if (!S.docs.length) return back + header + empty(SVG_ICONS.book, 'Upload documents first', 'Add study material in Library');

  var cfg = S.examConfig || {};
  var docName = cfg.docName || '';
  var sectionId = cfg.sectionId || '';
  var size = cfg.size || 10;
  var secs = studySections();

  var docOpts = '<option value=""' + (!docName ? ' selected' : '') + '>All documents</option>'
    + S.docs.map(function(d) {
        return '<option value="' + esc(d.name) + '"' + (docName === d.name ? ' selected' : '') + '>' + esc(d.name.length > 60 ? d.name.slice(0,58)+'…' : d.name) + '</option>';
      }).join('');

  var sectionPicker = '';
  if (docName) {
    var docSecs = secs.filter(function(s) { return s.doc === docName; });
    if (docSecs.length > 1) {
      var secOpts = '<option value=""' + (!sectionId ? ' selected' : '') + '>All of this document</option>'
        + docSecs.map(function(s) {
            return '<option value="' + esc(s.id) + '"' + (sectionId === s.id ? ' selected' : '') + '>' + esc(s.title.length > 60 ? s.title.slice(0,58)+'…' : s.title) + '</option>';
          }).join('');
      sectionPicker = '<div style="margin-top:12px">'
        + '<p style="font-family:var(--sans);font-size:12px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">Narrow to section (optional)</p>'
        + '<select class="inp" onchange="setExamConfig(\'sectionId\',this.value)">' + secOpts + '</select>'
        + '</div>';
    }
  }

  var scopeCard = '<div class="card" style="margin-bottom:12px">'
    + '<p class="sh" style="margin-bottom:10px">Scope</p>'
    + '<select class="inp" onchange="setExamConfig(\'docName\',this.value)">' + docOpts + '</select>'
    + sectionPicker
    + '</div>';

  function sizeBtn(n) {
    var active = size === n;
    return '<button class="btn ' + (active ? 'bp' : 'bg') + ' btn-sm" onclick="setExamConfig(\'size\',' + n + ')" style="min-width:52px">' + n + '</button>';
  }
  var sizeCard = '<div class="card" style="margin-bottom:16px">'
    + '<p class="sh" style="margin-bottom:10px">Questions</p>'
    + '<div class="row" style="gap:8px">' + sizeBtn(5) + sizeBtn(10) + sizeBtn(15) + sizeBtn(20) + '</div>'
    + '</div>';

  return back + header + scopeCard + sizeCard
    + '<button class="btn bp" onclick="startMockExam()">Start Exam &rarr;</button>';
}

async function startMockExam() {
  if (!S.docs.length) { toast('Upload study material first.'); return; }
  if (!hasKey(getActiveModel().prov)) { toast('Add an API key in Settings first.'); setTab('settings'); return; }
  var cfg = S.examConfig || {};
  var size = cfg.size || 10;
  var secs = studySections();
  var scopeText, scopeLabel;
  if (cfg.sectionId) {
    var sec = secs.find(function(s) { return s.id === cfg.sectionId; });
    if (sec) { scopeText = '### ' + sec.doc + ' / ' + sec.path + '\n' + sec.content; scopeLabel = sec.doc + ' / ' + sec.title; }
  }
  if (!scopeText && cfg.docName) {
    var doc = S.docs.find(function(d) { return d.name === cfg.docName; });
    if (doc) { scopeText = '### ' + doc.name + '\n' + doc.content; scopeLabel = doc.name; }
  }
  if (!scopeText) { var ctx = studyContext(); scopeText = ctx.text; scopeLabel = ctx.label; }
  showSpin('Building exam (' + size + ' questions)…');
  try {
    var bloomInstr = '\n\nInclude a mix of question levels: ~40% recall, ~35% apply (use the concept in context), ~25% analyze (multi-step or compare). Tag each with "level":"recall|apply|analyze".';
    var items = await genStructured({
      sys: 'You are a rigorous exam writer. Generate exactly ' + size + ' exam questions drawn from the material. Vary difficulty — include multi-step problems with full worked solutions in the answer. No hints. Reply ONLY with a valid JSON array:\n[{"question":"...","answer":"full model answer with steps","topic":"subject area","sourceSection":"section heading","level":"recall|apply|analyze"}]' + bloomInstr,
      user: 'Study scope: ' + scopeLabel + '\n\nStudy material:\n' + contextText(scopeText),
      max: Math.min(16000, Math.max(3000, size * 640)), temp: 0.7, schema: JSON_SCHEMAS.quizList, task: 'generation',
      parse: function(raw) { return validItems(unwrapStructuredOutput(pj(raw)), ['question','answer'], ['topic','sourceSection','level']); },
    });
    S.mockExam = {
      active: true, finished: false,
      questions: _validateAndFixSections(items).map(function(q, i) { return Object.assign({ id: Date.now() + i }, q); }),
      answers: [],   // sparse array indexed by question position
      viewIdx: 0,    // which question is currently on screen
      startTime: Date.now(),
      size: size,
      topic: scopeLabel,
      config: { docName: cfg.docName || null, sectionId: cfg.sectionId || null, size: size },
    };
    S.tab = 'study';
  } catch(e) { toast('Exam generation failed: ' + e.message); }
  finally { hideSpin(); render(); }
}

function retakeExam() {
  var me = S.mockExam;
  if (!me) return;
  S.examConfig = Object.assign({}, me.config || {}, { size: me.questions.length });
  S.mockExam = null;
  startMockExam();
}

function renderMockExam() {
  if (!S.mockExam) return '';
  var me = S.mockExam;
  var qi = me.viewIdx || 0;
  var q = me.questions[qi];
  var n = me.questions.length;
  var elapsed = Math.round((Date.now() - me.startTime) / 1000);
  var mm = String(Math.floor(elapsed / 60)).padStart(2,'0');
  var ss = String(elapsed % 60).padStart(2,'0');

  var answeredCount = me.questions.filter(function(_, i) { return !!me.answers[i] && !me.answers[i].skipped; }).length;
  var skippedCount  = me.questions.filter(function(_, i) { return !!me.answers[i] &&  me.answers[i].skipped; }).length;
  var touchedCount  = answeredCount + skippedCount;

  var existingAns = me.answers[qi];
  var isLocked     = !!(existingAns && !existingAns.skipped); // answered — cannot change
  var wasSkipped   = !!(existingAns &&  existingAns.skipped); // skipped — can retry

  // Status chips under timer
  var chips = '';
  if (answeredCount) chips += '<span style="font-family:var(--sans);font-size:11px;color:#49c47e">' + answeredCount + ' answered</span>';
  if (skippedCount)  chips += (chips ? ' · ' : '') + '<span style="font-family:var(--sans);font-size:11px;color:var(--warn)">' + skippedCount + ' skipped</span>';

  var header = '<div class="rowsb" style="margin-bottom:14px">'
    + '<div>'
    + '<p class="ph" style="margin:0">Mock Exam</p>'
    + '<p style="font-family:var(--sans);font-size:12px;color:var(--mut);margin-top:4px">' + esc(me.topic) + '</p>'
    + '</div>'
    + '<div style="text-align:right">'
    + '<p style="font-family:var(--sans);font-size:18px;font-weight:700;color:var(--tx);font-variant-numeric:tabular-nums">' + mm + ':' + ss + '</p>'
    + '<p style="font-family:var(--sans);font-size:11px;color:var(--mut)">' + (qi + 1) + ' / ' + n + '</p>'
    + (chips ? '<p style="margin-top:2px">' + chips + '</p>' : '')
    + '</div></div>'
    + '<div class="prog" style="margin-bottom:20px"><div class="pf" style="width:' + Math.round(touchedCount / n * 100) + '%;background:var(--gold)"></div></div>';

  var bloom = q.level ? '<span class="bdg bdg-neutral" style="margin-bottom:12px;display:inline-block">' + esc(q.level) + '</span><br>' : '';
  var skippedBadge = wasSkipped ? '<span class="bdg" style="background:var(--warn-t,#fff3cd);color:var(--warn);margin-bottom:10px;display:inline-block">Previously skipped</span><br>' : '';

  var qCard = '<div class="card" style="margin-bottom:14px;border-left:3px solid var(--gold)">'
    + bloom + skippedBadge
    + (q.topic ? badge(q.topic, '#6b8ef5') + ' ' : '')
    + '<p class="math-rich" style="font-family:var(--serif);font-size:19px;font-style:italic;line-height:1.7;margin-top:10px;color:var(--tx)">' + _mathNormalize(q.question) + '</p>'
    + '</div>';

  var ansCard;
  if (isLocked) {
    // Already answered — show read-only view, allow navigating away
    ansCard = '<div class="card">'
      + '<p style="font-family:var(--sans);font-size:11px;color:var(--mut);margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.06em">Your answer · locked</p>'
      + '<div style="padding:12px 16px;background:var(--bg);border-radius:7px;border:1px solid var(--brd);margin-bottom:14px">'
      + '<p class="math-rich" style="font-family:var(--serif);font-size:14px;color:var(--tx);line-height:1.65">' + _mathNormalize(existingAns.answer || '—') + '</p>'
      + '</div>'
      + '<div class="row" style="gap:8px">'
      + (qi > 0 ? '<button class="btn bg btn-sm" onclick="navMockExam(' + (qi - 1) + ')">&#x2190; Back</button>' : '')
      + '<button class="btn bp" onclick="navMockExam(' + Math.min(qi + 1, n - 1) + ')">Next &rarr;</button>'
      + '<button class="btn bg btn-sm" style="margin-left:auto;color:var(--mut)" onclick="if(confirm(\'Abandon this exam?\')){S.mockExam=null;goStudyIntent(null)}">Abandon</button>'
      + '</div></div>';
  } else {
    // Unanswered or skipped — show input
    var allTouched = touchedCount === n;
    ansCard = '<div class="card">'
      + '<p style="font-family:var(--sans);font-size:11px;color:var(--mut);margin-bottom:8px;font-weight:700">YOUR ANSWER — no feedback until end</p>'
      + '<textarea class="inp" id="exam-ans" placeholder="Write your answer here…" style="height:120px;margin-bottom:12px"></textarea>'
      + '<div class="row" style="gap:8px;flex-wrap:wrap">'
      + (qi > 0 ? '<button class="btn bg btn-sm" onclick="navMockExam(' + (qi - 1) + ')">&#x2190; Back</button>' : '')
      + '<button class="btn bp" onclick="submitMockAnswer()">Submit &rarr;</button>'
      + '<button class="btn bg btn-sm" style="color:var(--warn)" onclick="submitMockAnswer(true)">' + (wasSkipped ? 'Keep skip' : 'Skip') + '</button>'
      + (allTouched ? '<button class="btn bg btn-sm" style="color:var(--acc);border-color:var(--acc-b)" onclick="finishMockExam()">Finish exam</button>' : '')
      + '<button class="btn bg btn-sm" style="margin-left:auto;color:var(--mut)" onclick="if(confirm(\'Abandon this exam?\')){S.mockExam=null;goStudyIntent(null)}">Abandon</button>'
      + '</div></div>';
  }

  return header + qCard + ansCard;
}

function navMockExam(qi) {
  var me = S.mockExam;
  if (!me) return;
  me.viewIdx = Math.max(0, Math.min(qi, me.questions.length - 1));
  render();
}

function submitMockAnswer(skip) {
  var me = S.mockExam;
  if (!me || !me.active) return;
  var qi = me.viewIdx || 0;
  var ta = document.getElementById('exam-ans');
  var ans = skip ? '' : (ta ? ta.value.trim() : '');
  if (!skip && !ans) { toast('Write an answer, or tap Skip.'); return; }
  me.answers[qi] = { q: me.questions[qi], answer: ans, skipped: !!skip };

  // Advance to the next unanswered question (forward first, then wrap)
  var n = me.questions.length;
  var next = -1;
  for (var d = 1; d <= n; d++) {
    var i = (qi + d) % n;
    if (!me.answers[i]) { next = i; break; }
  }

  if (next === -1) {
    // All questions touched — finish
    finishMockExam();
  } else {
    me.viewIdx = next;
    render();
  }
}

function finishMockExam() {
  var me = S.mockExam;
  if (!me) return;
  me.active = false;
  me.finished = true;
  me.endTime = Date.now();
  _scoreExam(me).catch(function(e) {
    me.report = { items: [], byTopic: {}, score: 0, max: me.questions.length * 3, loading: false };
    toast('Grading failed: ' + (e.message || 'unknown error'));
    render();
  });
  render();
}

async function _scoreExam(me) {
  var elapsed = Math.round((me.endTime - me.startTime) / 1000);
  me.elapsed = elapsed;
  me.report = { items: [], byTopic: {}, score: 0, total: 0, loading: true };
  render();

  var gradingItems = me.answers.filter(function(a) { return a && !a.skipped && a.answer; });
  var results = await Promise.all(gradingItems.map(async function(a) {
    try {
      var r = _tryNumericGrade(a.q, a.answer);
      if (!r && a.q.type === 'cloze') r = gradeCloze(a.q, a.answer);
      if (!r) {
        var raw = await streamGrade(a.q, a.answer, function() {});
        r = pj(raw);
      }
      return { q: a.q, answer: a.answer, result: r };
    } catch(e) {
      return { q: a.q, answer: a.answer, result: { score: 0, feedback: 'Error grading', modelAnswer: a.q.answer } };
    }
  }));

  var byTopic = {};
  var totalScore = 0, maxScore = me.questions.length * 3;
  results.forEach(function(r) {
    totalScore += r.result.score || 0;
    var t = r.q.topic || 'General';
    if (!byTopic[t]) byTopic[t] = { ok: 0, n: 0 };
    byTopic[t].n++;
    if ((r.result.score || 0) >= 2) byTopic[t].ok++;
    _recordQuizAttempt(r.q, r.answer, r.result);
    if ((r.result.score || 0) === 0) _autoAddMissedCard(r.q, r.result);
  });
  me.answers.filter(function(a) { return a && (a.skipped || !a.answer); }).forEach(function(a) {
    var t = a.q.topic || 'General';
    if (!byTopic[t]) byTopic[t] = { ok: 0, n: 0 };
    byTopic[t].n++;
    _recordQuizAttempt(a.q, '', { score: 0, correct: false, feedback: 'Skipped', modelAnswer: a.q.answer });
    _autoAddMissedCard(a.q, { score: 0 });
  });
  me.report = { items: results, byTopic: byTopic, score: totalScore, max: maxScore, loading: false };
  render();
}

function renderExamReport() {
  var me = S.mockExam;
  if (!me || !me.report) return '<p style="font-family:var(--sans);color:var(--mut);text-align:center;padding:40px">Scoring…</p>';
  var rpt = me.report;
  if (rpt.loading) return '<div class="card" style="text-align:center;padding:44px"><div class="spin"></div><p style="font-family:var(--sans);font-size:14px;color:var(--mut);margin-top:16px">Grading your answers…</p></div>';

  var elapsed = me.elapsed || 0;
  var mm = Math.floor(elapsed / 60), ss = elapsed % 60;
  var pct = rpt.max > 0 ? Math.round(rpt.score / rpt.max * 100) : 0;
  var col = pct >= 80 ? '#49c47e' : pct >= 55 ? '#c49a3a' : '#d05555';

  var header = '<div style="margin-bottom:24px">'
    + '<p class="ph" style="margin:0">Exam Report</p>'
    + '<p style="font-family:var(--sans);font-size:13px;color:var(--mut);margin-top:4px">' + esc(me.topic) + ' · ' + mm + 'm ' + ss + 's</p></div>';

  var scoreSummary = '<div class="card" style="margin-bottom:16px;text-align:center">'
    + '<p style="font-family:var(--sans);font-size:44px;font-weight:700;color:' + col + '">' + pct + '%</p>'
    + '<p style="font-family:var(--sans);font-size:14px;color:var(--mut);margin-top:4px">' + rpt.score + ' / ' + rpt.max + ' points &middot; ' + me.questions.length + ' questions</p>'
    + '</div>';

  var topicBreakdown = '<div class="card" style="margin-bottom:16px"><p class="sh">By topic</p>'
    + Object.keys(rpt.byTopic).map(function(t) {
        var d = rpt.byTopic[t];
        var tc = d.n > 0 ? Math.round(d.ok / d.n * 100) : 0;
        var tCol = tc >= 70 ? '#49c47e' : tc >= 40 ? '#c49a3a' : '#d05555';
        return '<div class="cbar"><span class="cbar-label">' + esc(t) + '</span>'
          + '<div class="cbar-track"><div class="cbar-fill" style="width:' + tc + '%;background:' + tCol + '"></div></div>'
          + '<span class="cbar-pct" style="color:' + tCol + '">' + tc + '%</span></div>';
      }).join('')
    + '</div>';

  // Build ordered list covering all questions (graded + skipped/empty)
  var gradedMap = {};
  rpt.items.forEach(function(item) { gradedMap[item.q.id] = item; });
  var allItems = me.questions.map(function(q, qi) {
    if (gradedMap[q.id]) return gradedMap[q.id];
    var ans = me.answers[qi] || {};
    return { q: q, answer: ans.answer || '', skipped: true, result: null };
  });

  var itemList = allItems.length ? '<div class="card"><p class="sh">Question review</p>'
    + allItems.map(function(item, i) {
        var expanded = S.examExpandedIdx === i;
        var sc = item.result ? (item.result.score || 0) : null;
        var isSkipped = item.skipped && !item.result;
        var col = isSkipped ? 'var(--mut)' : scoreColor(sc);
        var badgeLabel = isSkipped ? 'skipped' : sc + '/3';
        var chevron = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;color:var(--mut)">'
          + (expanded ? '<polyline points="18 15 12 9 6 15"/>' : '<polyline points="6 9 12 15 18 9"/>') + '</svg>';

        var row = '<div style="padding:12px 0;border-bottom:1px solid var(--brd)">'
          + '<div class="rowsb" style="cursor:pointer;gap:10px" onclick="toggleExamItem(' + i + ')">'
          + '<div style="display:flex;gap:8px;flex:1;overflow:hidden;align-items:' + (expanded ? 'flex-start' : 'center') + '">'
          + '<div style="width:3px;flex-shrink:0;align-self:stretch;border-radius:2px;background:' + col + ';margin-top:1px"></div>'
          + '<p class="math-rich" style="font-family:var(--serif);font-size:13px;color:var(--tx);flex:1;margin:0;overflow:hidden;text-overflow:ellipsis;' + (expanded ? '' : 'white-space:nowrap') + '">' + _mathNormalize(item.q.question) + '</p>'
          + '</div>'
          + '<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">' + badge(badgeLabel, col) + chevron + '</div>'
          + '</div>';

        if (expanded) {
          row += '<div style="margin-top:12px;padding-left:11px">';

          // Score row + feedback
          if (item.result) {
            var sc2 = item.result.score || 0, c2 = scoreColor(sc2);
            var pips = [1,2,3].map(function(p) {
              return '<div style="width:22px;height:4px;border-radius:2px;background:' + (p <= sc2 ? c2 : 'var(--brd)') + '"></div>';
            }).join('');
            var scoreLabel = sc2 >= 3 ? 'Correct' : sc2 === 2 ? 'Mostly correct' : sc2 === 1 ? 'Partial' : 'Incorrect';
            row += '<div class="row" style="margin-bottom:10px;gap:6px">' + pips
              + '<span style="font-family:var(--sans);font-size:11px;color:' + c2 + ';font-weight:600;text-transform:uppercase;letter-spacing:.06em">' + scoreLabel + '</span></div>';
            if (item.result.feedback) {
              row += '<p class="math-rich" style="font-family:var(--serif);font-size:13px;color:var(--tx);line-height:1.65;margin-bottom:10px">' + _mathNormalize(item.result.feedback) + '</p>';
            }
          } else {
            row += '<p style="font-family:var(--sans);font-size:12px;color:var(--mut);margin-bottom:10px">Skipped — no answer recorded</p>';
          }

          // Your answer
          if (item.answer) {
            row += '<div style="padding:10px 14px;background:var(--card);border-radius:6px;border:1px solid var(--brd);margin-bottom:8px">'
              + '<p style="font-family:var(--sans);font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px">Your answer</p>'
              + '<p class="math-rich" style="font-family:var(--serif);font-size:13px;color:var(--tx);line-height:1.6">' + _mathNormalize(item.answer) + '</p>'
              + '</div>';
          }

          // Model answer (result.modelAnswer takes priority, falls back to q.answer)
          var modelAns = (item.result && item.result.modelAnswer) || item.q.answer || '';
          if (modelAns) {
            row += '<div style="padding:10px 14px;background:var(--card2);border-radius:6px;border:1px solid var(--brd);margin-bottom:8px">'
              + '<p style="font-family:var(--sans);font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px">Model answer</p>'
              + '<p class="math-rich" style="font-family:var(--serif);font-size:13px;color:var(--tx);line-height:1.6">' + _mathNormalize(modelAns) + '</p>'
              + '</div>';
          }

          // Library source excerpt (collapsible)
          var srcText = _sourceTextForQuestion(item.q);
          if (srcText) {
            var excerpt = srcText.slice(0, 600) + (srcText.length > 600 ? '…' : '');
            row += '<details style="margin-top:4px">'
              + '<summary style="font-family:var(--sans);font-size:11px;color:var(--acc);cursor:pointer;letter-spacing:.03em">Library source'
              + (item.q.sourceSection ? ' · ' + esc(item.q.sourceSection) : '') + '</summary>'
              + '<div style="margin-top:8px;padding:10px 14px;background:var(--bg);border-radius:6px;border:1px solid var(--brd)">'
              + '<p class="math-rich" style="font-family:var(--serif);font-size:12px;color:var(--mut);line-height:1.7;white-space:pre-wrap">' + _mathNormalize(excerpt) + '</p>'
              + (item.q.sourceSection ? '<div style="margin-top:8px">' + _srcCiteLink(item.q.sourceSection) + '</div>' : '')
              + '</div></details>';
          }

          row += '</div>';
        }

        return row + '</div>';
      }).join('')
    + '</div>' : '';

  var actions = '<div class="row" style="margin-top:20px;gap:10px;flex-wrap:wrap">'
    + '<button class="btn bp" onclick="S.mockExam=null;goStudyIntent(null)">Done</button>'
    + '<button class="btn bg" onclick="retakeExam()">Retake</button>'
    + (rpt.items.filter(function(i) { return (i.result.score||0)<2; }).length ? '<button class="btn bg btn-sm" style="color:var(--warn)" onclick="S.mockExam=null;redoMistakes()">Drill weak answers</button>' : '')
    + '</div>';

  return header + scoreSummary + topicBreakdown + itemList + actions;
}

function toggleExamItem(idx) {
  S.examExpandedIdx = S.examExpandedIdx === idx ? null : idx;

}

async function genStudyGuide(sectionTitle) {
  if (!sectionTitle) return;
  var secs = studySections();
  var sec = secs.find(function(s) { return s.title === sectionTitle; });
  var text = sec ? sec.content : '';
  if (!text) { toast('Section content not found.'); return; }
  S.studyGuide = { sectionTitle: sectionTitle, content: '', loading: true };
  render();
  try {
    var raw = await callAI(
      'You are a tutor. Write a structured study guide for the student based ONLY on the provided notes. Format:\n1. Key Concepts (bullet points with short definitions)\n2. Important Relationships / Patterns\n3. Common Pitfalls\n4. 2-3 worked examples if the material is quantitative.\nCite the source notes directly. Be concise but complete. Use plain text only (no markdown headers).',
      'Section: ' + sectionTitle + '\n\nNotes:\n' + text.slice(0, 6000),
      1600, 0.4
    );
    S.studyGuide = { sectionTitle: sectionTitle, content: raw.trim(), loading: false };
  } catch(e) {
    S.studyGuide = null;
    toast('Study guide failed: ' + e.message);
  }
  render();
}

async function explainSection() {
  var g = S.studyGuide;
  if (!g || !g.sectionTitle) return;
  var secs = studySections();
  var sec = secs.find(function(s) { return s.title === g.sectionTitle; });
  var text = sec ? sec.content : '';
  g.explaining = true; render();
  try {
    var raw = await callAI(
      'Explain this section clearly. Include: (1) the core idea in one plain-language sentence, (2) a concrete analogy, (3) a worked example grounded in the notes, (4) one likely misconception and correction. Cite the source notes. Be concise.',
      'Section: ' + g.sectionTitle + '\n\nNotes:\n' + text.slice(0, 5000),
      900, 0.5
    );
    g.explainResult = raw.trim();
    g.explaining = false;
  } catch(e) { g.explaining = false; toast('Explanation failed: ' + e.message); }
  render();
}

async function analyzeExplanation() {
  var topicSel = document.getElementById('eb-section');
  var textEl = document.getElementById('eb-text');
  var topic = topicSel ? topicSel.value : '';
  var userText = textEl ? textEl.value.trim() : '';
  if (!topic || !userText || userText.length < 30) { toast('Write at least a few sentences about the topic.'); return; }
  var secs = studySections();
  var sec = secs.find(function(s) { return s.title === topic; });
  var sourceText = sec ? sec.content.slice(0, 5000) : '';
  S.explainBack = { topic: topic, userText: userText, loading: true, result: null };
  render();
  try {
    var raw = await callAI(
      _personaSys() + 'The student is explaining a topic from their notes. Your job: compare their explanation against the source notes and give structured feedback.\nFormat your response as:\nSTRENGTHS: what they got right (1-3 bullets)\nGAPS: concepts from the notes they missed or got wrong (1-5 bullets, be specific)\nMISCONCEPTIONS: if any errors, name and correct them\nSUGGESTION: one sentence on what to review next\nBe concise, factual, grounded in the source notes. Do not invent content not in the notes.',
      'Topic: ' + topic + '\n\nSource notes:\n' + sourceText + '\n\nStudent\'s explanation:\n' + userText,
      800, 0.3
    );
    var gaps = [];
    var lines = raw.split('\n');
    var inGaps = false;
    lines.forEach(function(line) {
      if (/^GAPS:/i.test(line)) {
        var inline = line.replace(/^GAPS:\s*/i, '').trim();
        if (inline) gaps.push(inline);
        inGaps = true; return;
      }
      if (/^(STRENGTHS|MISCONCEPTIONS|SUGGESTION):/i.test(line)) { inGaps = false; return; }
      if (inGaps && line.trim()) {
        var m = line.trim().match(/^(?:[•\-*]|\d+[.)]) ?(.*)/);
        if (m && m[1].trim()) gaps.push(m[1].trim());
      }
    });
    // Auto-add gap cards to review deck
    gaps.slice(0, 4).forEach(function(gap, i) {
      var card = { id: Date.now() + i, front: 'Explain: ' + gap, back: gap, note: 'Gap identified during explain-back', topic: topic, sourceSection: topic, fsrs: null };
      _upsertReviewCard(card);
    });
    S.explainBack = { topic: topic, userText: userText, loading: false, result: raw.trim(), gaps: gaps };
  } catch(e) {
    S.explainBack = { topic: topic, userText: userText, loading: false, result: null };
    toast('Analysis failed: ' + e.message);
  }
  render();
}

// G5 — MISCONCEPTION REMEDIATION
// ════════════════════════════════════════════
async function genMisconception(q, userAnswer, gradingResult) {
  if (!hasKey(getActiveModel().prov)) return;
  if (!q || !userAnswer || (gradingResult.score || 0) >= 2) return;
  // Capture the result object reference now — after the await, S.result may point to a different question
  var targetResult = gradingResult;
  var src = _sourceTextForQuestion(q);
  try {
    var raw = await callAI(
      'A student answered a question incorrectly or partially. Identify the likely misconception and give targeted remediation. Be concise and grounded in the source notes.\nFormat:\nMISCONCEPTION: [one short sentence naming the error]\nRETEACH: [2-3 sentences correcting it with the right concept, from the notes]\nFOLLOW-UP: [one targeted follow-up question to isolate the gap]',
      'Question: ' + q.question + '\nCorrect answer: ' + q.answer + '\nStudent answered: ' + userAnswer + '\nGrade: ' + gradingResult.feedback + (src ? '\n\nSource notes:\n' + src.slice(0, 2000) : ''),
      350, 0.4
    );
    // Only update if the captured result is still the one being displayed
    if (S.result === targetResult) {
      targetResult.misconception = raw.trim();
      render();
    }
  } catch(e) { /* non-critical, don't surface */ }
}

// ── Attention layer: aggregate pending tasks/TODOs into one urgency list ──────
// Defensive (every source guarded) so a bad slice never breaks the shell. Each
// item: {key, label, short, urgency:'now'|'soon'|'info', tab}. Sorted urgent-first.
function _attentionItems(nowMs) {
  nowMs = nowMs || Date.now();
  var items = [];
  try { // due flashcards (FSRS)
    var due = (S.cards || []).filter(function (c) { return !isCardSuspended(c) && c.fsrs && fsrsIsDue(c.fsrs); }).length;
    if (due > 0) items.push({ key: 'cards', label: due + ' card' + (due === 1 ? '' : 's') + ' due for review', short: due + ' due', urgency: due >= 5 ? 'now' : 'soon', tab: 'study' });
  } catch (e) {}
  try { // scheduled assessment countdown
    var cd = S.nextInterview ? _prepCountdown(S.nextInterview, nowMs) : null;
    if (cd && !cd.far) {
      var firm = S.nextInterview.firm ? S.nextInterview.firm + ' ' : '';
      var lbl = cd.stale ? firm + cd.label + ' — debrief & log' : firm + cd.label + (cd.days === 0 ? ' is TODAY' : ' in ' + cd.days + 'd');
      var shrt = cd.stale ? firm + 'debrief' : firm + (cd.days === 0 ? 'TODAY' : 'T-' + cd.days);
      items.push({ key: 'exam', label: lbl, short: shrt.trim(), urgency: (cd.stale || cd.days <= 1) ? 'now' : cd.days <= 3 ? 'soon' : 'info', tab: 'study' });
    }
  } catch (e) {}
  try { // stale drill momentum
    var perf = _prepPerf();
    if (perf && perf.daysSince != null && perf.daysSince >= 2) items.push({ key: 'drill', label: 'No drill in ' + perf.daysSince + ' days — run a set', short: 'drill ' + perf.daysSince + 'd', urgency: perf.daysSince >= 4 ? 'now' : 'soon', tab: 'study' });
  } catch (e) {}
  try { // unmet speed gates

// ── System-wide Pomodoro timer (pomotroid-inspired) + focus analytics ────────
var _pomoTimer = null;
var POMO_MODES = { focus: 'Focus', short: 'Short break', long: 'Long break' };
// ---- pure helpers (unit-tested) ----
function _pomoDuration(mode, cfg) { cfg = cfg || S.pomoCfg; return (cfg[mode] || 25) * 60000; }
function _pomoFormat(ms) {
  var s = Math.round(Math.max(0, ms) / 1000), m = Math.floor(s / 60), sec = s - m * 60;
  return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
}
// Next mode after one completes: focus → long every Nth round else short; break → focus.
function _pomoNext(mode, round, cfg) {
  cfg = cfg || S.pomoCfg;
  if (mode === 'focus') return { mode: (round % (cfg.longEvery || 4) === 0) ? 'long' : 'short', round: round };
  return { mode: 'focus', round: round + 1 };
}
// Aggregate completed focus sessions into headline analytics.
function _pomoStats(log, nowMs) {
  log = log || []; nowMs = nowMs || Date.now();
  var dayStart = new Date(nowMs); dayStart.setHours(0, 0, 0, 0); dayStart = dayStart.getTime();
  var todayMin = 0, todaySessions = 0, totalMin = 0;
  log.forEach(function (e) { var mn = +e.min || 0; totalMin += mn; if (e.ts >= dayStart) { todayMin += mn; todaySessions++; } });
  return { todayMin: todayMin, todaySessions: todaySessions, totalSessions: log.length, totalMin: totalMin };
}
// ---- engine ----
function savePomo() { lsSet('sd_pomolog', S.pomoLog); lsSet('sd_pomocfg', S.pomoCfg); }
function _pomoRemaining() { return S.pomo.running ? Math.max(0, S.pomo.endTs - Date.now()) : S.pomo.remainingMs; }
function _pomoClear() { if (_pomoTimer) { clearInterval(_pomoTimer); _pomoTimer = null; } }
function _pomoTick() {
  if (!S.pomo.running) return;
  var rem = Math.max(0, S.pomo.endTs - Date.now());
  S.pomo.remainingMs = rem;
  if (rem <= 0) { _pomoComplete(); return; }
  renderPomo();
}
function pomoStart() {
  if (S.pomo.running) return;
  if (S.pomo.remainingMs <= 0) S.pomo.remainingMs = _pomoDuration(S.pomo.mode);
  S.pomo.running = true;
  S.pomo.endTs = Date.now() + S.pomo.remainingMs;
  _pomoClear(); _pomoTimer = setInterval(_pomoTick, 250);
  renderPomo();
}
function pomoPause() {
  if (!S.pomo.running) return;
  S.pomo.remainingMs = Math.max(0, S.pomo.endTs - Date.now());
  S.pomo.running = false; _pomoClear(); renderPomo();
}
function pomoToggle() { if (S.pomo.running) pomoPause(); else pomoStart(); }
function pomoReset() { S.pomo.running = false; _pomoClear(); S.pomo.remainingMs = _pomoDuration(S.pomo.mode); renderPomo(); }
function pomoSetMode(mode) {
  if (!POMO_MODES[mode]) return;
  S.pomo.running = false; _pomoClear();
  S.pomo.mode = mode; S.pomo.remainingMs = _pomoDuration(mode); renderPomo();
}
function pomoSkip() {
  var nx = _pomoNext(S.pomo.mode, S.pomo.round, S.pomoCfg);
  S.pomo.running = false; _pomoClear();
  S.pomo.mode = nx.mode; S.pomo.round = nx.round; S.pomo.remainingMs = _pomoDuration(nx.mode); renderPomo();
}
function _pomoComplete() {
  _pomoClear(); S.pomo.running = false;

  if (doneMode === 'focus') {
    S.pomoLog = S.pomoLog || [];
    S.pomoLog.push({ ts: Date.now(), min: S.pomoCfg.focus });
    if (S.pomoLog.length > 2000) S.pomoLog = S.pomoLog.slice(-2000);
    savePomo();
  }
  var nx = _pomoNext(doneMode, S.pomo.round, S.pomoCfg);
  S.pomo.mode = nx.mode; S.pomo.round = nx.round; S.pomo.remainingMs = _pomoDuration(nx.mode);
  if (S.pomoCfg.sound) _pomoBeep(doneMode === 'focus');
  toast(doneMode === 'focus' ? 'Focus done — ' + POMO_MODES[nx.mode].toLowerCase() + ' time.' : POMO_MODES[nx.mode] + ' over — back to focus.');
  render();
}
function _pomoBeep(isFocusEnd) {

    var AC = window.AudioContext || window.webkitAudioContext; if (!AC) return;
    var ctx = new AC(), seq = isFocusEnd ? [660, 880] : [880, 660];

}
function pomoTogglePanel() { S.pomoOpen = !S.pomoOpen; if (S.pomoOpen && S.attnOpen) { S.attnOpen = false; rebuildTopbar(); } else { renderPomo(); } }
function pomoClosePanel() { if (S.pomoOpen) { S.pomoOpen = false; renderPomo(); } }
function pomoToggleSound() { S.pomoCfg.sound = !S.pomoCfg.sound; savePomo(); renderPomo(); }
// ---- render ----
function _pomoColor(mode) { return mode === 'focus' ? 'var(--acc)' : mode === 'short' ? '#2f9e8f' : '#7a5cc0'; }
function _pomoRing(size, stroke, mode, frac) {
  var r = (size - stroke) / 2, c = 2 * Math.PI * r, off = c * (1 - Math.max(0, Math.min(1, frac))), h = size / 2;
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '" style="transform:rotate(-90deg)">'
    + '<circle cx="' + h + '" cy="' + h + '" r="' + r + '" fill="none" stroke="var(--brd)" stroke-width="' + stroke + '"/>'
    + '<circle cx="' + h + '" cy="' + h + '" r="' + r + '" fill="none" stroke="' + _pomoColor(mode) + '" stroke-width="' + stroke + '" stroke-linecap="round" stroke-dasharray="' + c.toFixed(1) + '" stroke-dashoffset="' + off.toFixed(1) + '" style="transition:stroke-dashoffset .25s linear"/></svg>';

function renderPomo() {

  var rem = _pomoRemaining(), total = _pomoDuration(S.pomo.mode), frac = total ? rem / total : 0, col = _pomoColor(S.pomo.mode);

      // Persist the in-progress answer so a re-render (e.g. "Show hint") doesn't wipe it.
      ta.addEventListener('input', function() {
        S.ans = ta.value;
        if (cc) cc.textContent = ta.value.length;
      });
      if (S.ans) ta.value = S.ans;
      if (cc) cc.textContent = ta.value.length;
      // Auto-focus the answer field while awaiting an answer, cursor at the end.
      if (!S.result && _gradingStream === null) {
        ta.focus();
        try { ta.selectionStart = ta.selectionEnd = ta.value.length; } catch (e) {}
      }

function removeDoc(name) {
  // Identify cards linked to this document before removing it from S.docs
  var secTitlesForDoc = {};
  studySections().filter(function(s) { return s.doc === name; }).forEach(function(s) { secTitlesForDoc[s.title] = true; });
  var linkedCards = S.cards.filter(function(c) {
    return c.sourceDoc === name || (!c.sourceDoc && c.sourceSection && secTitlesForDoc[c.sourceSection]);
  });

  setDocs(S.docs.filter(function(d) { return d.name !== name; }));
  saveDocs();

  if (linkedCards.length > 0) {
    var n = linkedCards.length;
    var msg = n + ' flashcard' + (n > 1 ? 's' : '') + ' sourced from "' + name + '" found.\n\nRemove them too? (Recommended — they won\'t be regenerated from this material)';
    if (confirm(msg)) {
      var removeIds = {};
      linkedCards.forEach(function(c) { removeIds[c.id] = true; });
      S.cards = S.cards.filter(function(c) { return !removeIds[c.id]; });
      saveCards();
      Object.keys(secTitlesForDoc).forEach(function(t) { delete S.coverage[t]; });
      _saveCoverage();
      toast('Removed "' + name + '" and ' + n + ' card' + (n > 1 ? 's' : '') + '.');
    } else {
      toast('Document removed. ' + n + ' card' + (n > 1 ? 's' : '') + ' kept.');
    }
  }

  render();
}

function addPaste() {
  var n = (document.getElementById('paste-name').value || '').trim();
  var t = (document.getElementById('paste-text').value || '').trim();
  if (!n || !t) { toast('Please enter both a title and some text.'); return; }
  var docs = S.docs.filter(function(d) { return d.name !== n; });
  docs.push({ name: n, content: t, addedAt: Date.now() });
  setDocs(docs);
  saveDocs(); render();
}

    var ay = a.transform[5], by = b.transform[5];
    return by !== ay ? by - ay : a.transform[4] - b.transform[4];
  });
  var lines = [];
  var cur = null;
  var LINE_GAP = 2; // px tolerance for same line
  sorted.forEach(function(item) {
    var y = item.transform[5];
    var h = Math.abs(item.transform[3]) || 10;
    if (!cur || Math.abs(cur.y - y) > LINE_GAP) {
      cur = { y: y, h: h, items: [item] };
      lines.push(cur);
    } else {
      cur.items.push(item);
      cur.h = Math.max(cur.h, h);
    }
  });

  var result = [];
  var prevY = null;
  lines.forEach(function(line) {
    if (!line.items.length) return;
    // Sort items left to right within line
    line.items.sort(function(a, b) { return a.transform[4] - b.transform[4]; });
    var lineText = line.items.map(function(x) { return x.str; }).join(' ').replace(/\s+/g, ' ').trim();
    if (!lineText) return;
    // Heading heuristic: font height > 14 px and short line
    var isHeading = line.h >= 13 && lineText.length < 120;
    if (prevY !== null) {
      var gap = prevY - line.y; // positive = moved down
      // Large gap between paragraphs → blank line
      if (gap > line.h * 1.6) result.push('');
    }
    result.push(isHeading ? '\n## ' + lineText : lineText);
    prevY = line.y;
  });
  var text = result.join('\n').replace(/\n{3,}/g, '\n\n').trim();
  // Bad-page detection: very low alphanumeric ratio or near-empty
  var alnum = (text.match(/[a-zA-Z0-9]/g) || []).length;
  var badPage = text.length < 40 || alnum / Math.max(text.length, 1) < 0.25;
  return { text: text, badPage: badPage };
}

async function extractFile(f) {
  if (f.name.endsWith('.pdf')) {
    if (!window.pdfjsLib) return '[PDF.js not loaded yet — try again in a moment]';
    var ab = await f.arrayBuffer();
    var pdf = await window.pdfjsLib.getDocument({ data: new Uint8Array(ab) }).promise;
    var badPageNums = [];
    var pages = await Promise.all(Array.from({ length: pdf.numPages }, function(_, i) {
      return pdf.getPage(i + 1).then(function(pg) {
        var vp = pg.getViewport({ scale: 1 });
        return pg.getTextContent({ includeMarkedContent: false }).then(function(tc) {
          var result = _reconstructPageText(tc.items, vp);
          if (result.badPage) badPageNums.push(i + 1);
          return result.text;
        });
      });
    }));
    var text = pages.join('\n\n').trim();
    // Attach extraction quality info so the caller can surface a warning
    if (badPageNums.length) {
      var ratio = badPageNums.length / pdf.numPages;
      if (ratio > 0.3 || badPageNums.length >= 3) {
        text = text + '\n\n[STUDIUM_BAD_EXTRACT:' + badPageNums.join(',') + ':' + pdf.numPages + ']';
      }
    }
    return text;
  }
  return f.text();
}

// Render a single PDF page to a base64 PNG for vision OCR
async function _pdfPageToBase64(pdfDoc, pageNum) {
  var pg = await pdfDoc.getPage(pageNum);
  var scale = 2; // 2× for readability
  var vp = pg.getViewport({ scale: scale });
  var canvas = document.createElement('canvas');
  canvas.width = vp.width; canvas.height = vp.height;
  var ctx = canvas.getContext('2d');
  await pg.render({ canvasContext: ctx, viewport: vp }).promise;
  return canvas.toDataURL('image/jpeg', 0.85).replace(/^data:image\/jpeg;base64,/, '');
}

// Run vision OCR on a list of bad page numbers from a PDF file
// Returns a map {pageNum: ocrText} for the pages it could read
async function _visionOcrPages(file, badPageNums) {
  if (!window.pdfjsLib) return {};
  var ab = await file.arrayBuffer();
  var pdf = await window.pdfjsLib.getDocument({ data: new Uint8Array(ab) }).promise;
  var model = getPreferredModel('generation');
  // Vision OCR requires a frontier model (Anthropic or OpenAI with vision)
  var visionProv = ['anthropic', 'openai'].indexOf(model.prov) >= 0 ? model.prov : null;
  if (!visionProv) return {};

  // Process up to 6 bad pages in parallel
  var toProcess = badPageNums.slice(0, 6);
  var pageResults = await Promise.all(toProcess.map(async function(pageNum) {
    try {
      var b64 = await _pdfPageToBase64(pdf, pageNum);
      var text;
      if (visionProv === 'anthropic') {
        var resp = await fetch('/proxy/anthropic', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: model.id, max_tokens: 2000, temperature: 0,
            messages: [{ role: 'user', content: [
              { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
              { type: 'text', text: 'Transcribe all text from this page. Preserve structure: headings on their own lines, equations in LaTeX \\(...\\) or $$...$$, paragraph breaks as blank lines. Output ONLY the transcribed text, no commentary.' },
            ]}],
          }),
          signal: _sig(),
        });
        if (resp.ok) {
          var d = await resp.json();
          text = (d.content && d.content[0] && d.content[0].text) || '';
        }
      } else {
        var resp2 = await fetch('/proxy/openai', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: model.id, max_tokens: 2000, temperature: 0,
            messages: [{ role: 'user', content: [
              { type: 'image_url', image_url: { url: 'data:image/jpeg;base64,' + b64 } },
              { type: 'text', text: 'Transcribe all text from this page. Preserve structure: headings on their own lines, equations in LaTeX. Output ONLY the transcribed text.' },
            ]}],
          }),
          signal: _sig(),
        });
        if (resp2.ok) {
          var d2 = await resp2.json();
          text = (d2.choices && d2.choices[0] && d2.choices[0].message && d2.choices[0].message.content) || '';
        }
      }
      return (text && text.trim()) ? { pageNum: pageNum, text: text.trim() } : null;
    } catch(e) {
      console.warn('[visionOCR] page', pageNum, 'failed:', e.message);
      return null;
    }
  }));
  var results = {};
  pageResults.forEach(function(r) { if (r) results[r.pageNum] = r.text; });
  return results;
}

// Strip the bad-extract sentinel from stored content (returns clean text + pages info)
function _parseBadExtract(content) {
  var m = (content || '').match(/\[STUDIUM_BAD_EXTRACT:([\d,]+):(\d+)\]\s*$/);
  if (!m) return { clean: content || '', badPages: [], total: 0 };
  return {
    clean: content.slice(0, m.index).trim(),
    badPages: m[1].split(',').map(Number),
    total: Number(m[2]),
  };
}

async function handleFiles(files) {
  var warnings = [];
  var results = await Promise.all(Array.from(files).map(async function(f) {
    var text = '';
    try { text = await extractFile(f); }
    catch(e) { text = '[Could not extract — try pasting text directly. Error: ' + e.message + ']'; }
    var be = _parseBadExtract(text);
    if (be.badPages.length) {
      if (S.cfg.visionOcr && hasKey(getActiveModel().prov) && f.name.endsWith('.pdf')) {
        // Attempt vision OCR for flagged pages
        try {
          var ocrResults = await _visionOcrPages(f, be.badPages);
          if (Object.keys(ocrResults).length) {
            // Rebuild page list: clean + OCR replacements
            var ab2 = await f.arrayBuffer();
            var pdf2 = await window.pdfjsLib.getDocument({ data: new Uint8Array(ab2) }).promise;
            var allPages = await Promise.all(Array.from({ length: pdf2.numPages }, function(_, i) {
              return pdf2.getPage(i + 1).then(function(pg) {
                return pg.getTextContent({ includeMarkedContent: false }).then(function(tc) {
                  return _reconstructPageText(tc.items, pg.getViewport({ scale: 1 })).text;
                });
              });
            }));
            be.badPages.forEach(function(pn) {
              if (ocrResults[pn]) allPages[pn - 1] = '[Vision OCR — page ' + pn + ']\n' + ocrResults[pn];
            });
            text = allPages.join('\n\n').trim();
            warnings.push(f.name + ': vision OCR applied to ' + Object.keys(ocrResults).length + ' page(s).');
          } else {
            text = be.clean;
            warnings.push(f.name + ': pages ' + be.badPages.join(', ') + ' of ' + be.total + ' could not be read by vision OCR either — paste the text manually for best results.');
          }
        } catch(ocrErr) {
          text = be.clean;
          warnings.push(f.name + ': vision OCR failed (' + ocrErr.message + ') — paste text manually for best results.');
        }
      } else {
        text = be.clean;
        warnings.push(f.name + ': pages ' + be.badPages.join(', ') + ' of ' + be.total + ' read poorly (scanned/image PDF?) — enable vision OCR in Settings or paste the text manually.');
      }
    }
    return { name: f.name, content: text, addedAt: Date.now() };
  }));
  var map = {};
  S.docs.forEach(function(d) { map[d.name] = d; });
  results.forEach(function(r) { map[r.name] = r; });
  setDocs(Object.values(map));
  saveDocs();
  if (warnings.length) {
    S.extractWarnings = (S.extractWarnings || []).concat(warnings);
    lsSet('sd_extractWarnings', S.extractWarnings);
  }
  render();
}

async function submitQ() {
  var ta = document.getElementById('q-ans');
  var a  = ta ? ta.value.trim() : '';
  if (!a) return;
  S.ans = a;
  var q = S.queue[S.qi];
  if (!q) return;
  // Fast JS path: cloze grading (no LLM needed)
  if (q.type === 'cloze') {
    var clozeResult = gradeCloze(q, a);
    _gradingStream = null;
    S.result = clozeResult;
    _recordQuizAttempt(q, a, clozeResult);
    var csc = clozeResult.score;
    if (csc === 0) { S.missedQOffer = null; _autoAddMissedCard(q, clozeResult); }
    else if (csc === 1) { S.missedQOffer = _buildMissedCardData(q, clozeResult); }
    else { S.missedQOffer = null; }
    render(); return;
  }
  // Fast JS path for numeric answers
  var autoResult = _tryNumericGrade(q, a);
  if (autoResult) {
    _gradingStream = null;
    S.result = autoResult;
    _recordQuizAttempt(q, a, autoResult);
    var sc = autoResult.score;
    if (sc === 0) { S.missedQOffer = null; _autoAddMissedCard(q, autoResult); }
    else if (sc === 1) { S.missedQOffer = _buildMissedCardData(q, autoResult); }
    else { S.missedQOffer = null; }
    render(); return;
  }
  _gradingStream = { text: '' };
  render();
  showSpin('Evaluating answer…');
  try {
    var raw = await streamGrade(q, a, function(full) {
      _gradingStream.text = full;
      var el = document.getElementById('grade-stream');
      if (el) {
        var preview = extractStreamFeedback(full);
        el.innerHTML = _mathNormalize(preview || '•••');
        clearTimeout(_mathStreamTimer);
        _mathStreamTimer = setTimeout(function() {
          if (window.renderMathInElement && el.parentNode) { try { renderMathInElement(el, _katexOpts); } catch(e) {} }
        }, 120);
      }
    });
    _gradingStream = null;
    S.result = pj(raw);
    _recordQuizAttempt(q, a, S.result);
    var sc = S.result.score;
    if (sc === 0) {
      S.missedQOffer = null; _autoAddMissedCard(q, S.result);
      genMisconception(q, a, S.result); // G5: async, fills S.result.misconception
    } else if (sc === 1) {
      S.missedQOffer = _buildMissedCardData(q, S.result);
      genMisconception(q, a, S.result);
    } else {
      S.missedQOffer = null;
    }
    // G6: track confidence calibration
    if (S.confidence) {
      S.meta.calibration.total = (S.meta.calibration.total || 0) + 1;
      if (S.confidence === 'sure' && sc < 2) S.meta.calibration.overconfident = (S.meta.calibration.overconfident || 0) + 1;
      S.confidence = null;
    }
  } catch(e) {
    _gradingStream = null;
    if (e.name === 'AbortError') {
      toast('Evaluation cancelled.');
      S.result = null;
    } else {
      S.result = { correct:false, score:0, feedback:'Evaluation error: '+e.message, modelAnswer:q.answer };
    }
  } finally {
    hideSpin();
    render();
  }
}
function nextQ() {
  S.ans = ''; S.result = null; S.missedQOffer = null; _hintShown = false;
  if (S.qi < S.queue.length - 1) { S.qi++; render(); }
  else { S.qi = 0; finalizeCurrentSession(); genQuiz(); }
}

  S.ans = ''; S.result = null; S.missedQOffer = null; S.confidence = null; _hintShown = false;

// ── Cloze deletion ──────────────────────────────────────────────────────────
function _normalizeCloze(s) {
  return String(s || '').toLowerCase().trim()
    .replace(/[^a-z0-9À-ɏ]/g, ' ').replace(/\s+/g, ' ').trim();
}

function gradeCloze(q, answer) {
  var correct = _normalizeCloze(answer) === _normalizeCloze(q.blank);
  return {
    correct: correct,
    score: correct ? 3 : 0,
    feedback: correct ? 'Correct!' : 'Expected "' + q.blank + '".',
    modelAnswer: q.blank,
    _clozeGraded: true,
  };
}

    : '';
  var genTarget = Math.max(5, Math.min(12, plan.cap + 2));
  var cardSys = _personaSys() + 'Create ' + genTarget + ' study flashcards. If a selected section is provided, focus on that section. Include a "typed" field set to true for cards whose answer is a single short term or number (4 words or fewer). Use LaTeX delimiters for math. Reply ONLY with a valid JSON array. No prose, markdown, bullets, comments, or unescaped quotation marks inside values:\n[{"front":"term or question","back":"concise answer","note":"1-2 sentence deeper insight, worked example, or mnemonic (use LaTeX for math)","topic":"subject area","sourceSection":"exact section heading the card came from","typed":false}]' + weakHint + topicConstraint;
  var cardUser = 'Study scope: ' + ctx.label + '\n\nStudy material:\n' + contextText(ctx.text);
  var _cTokens = 0;
  try {
    var cardItems = await genStructured({
      sys: cardSys, user: cardUser, max: 6000, temp: 0.7, schema: JSON_SCHEMAS.cardList,
      task: 'generation', stream: true,
      onChunk: function(partial) {
        _cTokens++;
        if (_cTokens % 20 === 0) {
          var el = document.getElementById('spin-msg');
          if (el) el.textContent = 'Creating flashcards\u2026 (' + partial.length + ' chars)';
        }
      },
      parse: function(raw) { return validItems(unwrapStructuredOutput(pj(raw)), ['front','back'], ['note','topic','sourceSection']); },
    });
    var lib = fsrsLib();
    var rawCards = _validateAndFixSections(cardItems);
    var existing = S.cards;
    var frontMap = {};
    existing.forEach(function(c) { frontMap[_normalizeFront(c.front)] = true; });
    // Build a section→doc lookup so each new card gets a sourceDoc stamp
    var secDocMap = {};
    studySections().forEach(function(s) { if (!secDocMap[s.title]) secDocMap[s.title] = s.doc; });
    var newCards = rawCards.filter(function(c) { return !frontMap[_normalizeFront(c.front)]; })
      .map(function(c, i) {
        var typed = c.typed === true || String(c.back || '').trim().split(/\s+/).length <= 4;
        var sourceDoc = secDocMap[c.sourceSection] || null;
        return Object.assign({ id: Date.now()+i, mastered:false, typed: typed, fsrs: lib ? lib.createEmptyCard() : null, sourceDoc: sourceDoc }, c);
      });
    S.cards = existing.concat(newCards);
    newCards.forEach(function(c) { if (c.sourceSection) _bumpCoverage(c.sourceSection, 'carded'); });
    S.fcIdx = 0; S.fcFlipped = false;
    saveCards();
    if (newCards.length) toast(newCards.length + ' new card' + (newCards.length > 1 ? 's' : '') + ' added.');
    else toast('No new cards (all were already in your deck).');
  } catch(e) { toast('Flashcard generation failed: ' + e.message); }
  finally { hideSpin(); render(); }
}

function setFcFilt(f) { S.fcFilt = f; S.fcIdx = 0; S.fcFlipped = false; render(); }

function flipCard() { S.fcFlipped = !S.fcFlipped; render(); }

function fcGo(dir) {
  S.fcFlipped = false;
  var filtered = S.fcFilt === 'active'   ? S.cards.filter(function(c) { return !fsrsIsMastered(c); })
               : S.fcFilt === 'mastered' ? S.cards.filter(function(c) { return  fsrsIsMastered(c); })
               : S.cards;
  S.fcIdx = (S.fcIdx + dir + filtered.length) % Math.max(filtered.length, 1);
  render();
}

function markCard(val) {
  var filtered = S.fcFilt === 'active'   ? S.cards.filter(function(c) { return !fsrsIsMastered(c); })
               : S.fcFilt === 'mastered' ? S.cards.filter(function(c) { return  fsrsIsMastered(c); })
               : S.cards;
  var fc = filtered[S.fcIdx];
  if (!fc) return;
  S.cards = S.cards.map(function(x) { return x.id === fc.id ? Object.assign({}, x, { mastered: val }) : x; });
  saveCards(); fcGo(1);
}

// ════════════════════════════════════════════
// ACTIONS — MAP
// ════════════════════════════════════════════
async function genMap() {
  if (!S.docs.length) return;
  if (!hasKey(getActiveModel().prov)) {
    toast('Add an API key in Settings first.');
    setTab('settings'); return;
  }
  var ctx = studyContext();
  showSpin('Building concept map\u2026');
  try {
    var mapSys = 'Build a detailed concept map. Use LaTeX math delimiters when helpful. Focus on the current study scope: ' + ctx.label + '. Reply ONLY with valid JSON, no prose:\n{"nodes":[{"id":"n1","label":"short name (1-3 words)","category":"core|method|example|theorem","description":"1-2 sentence explanation of this concept"}],"edges":[{"source":"n1","target":"n2","label":"relation verb phrase","type":"builds-on|uses|contrasts|exemplifies|leads-to","strength":2}]}\nGuidelines: 14-20 nodes; every node needs >=1 edge; category guide: core=fundamental concepts, method=techniques/algorithms, example=applications/instances, theorem=mathematical results; edge strength 1-3 (3=strongest dependency); include descriptions for all nodes.';
    var g = await genStructured({
      sys: mapSys,
      user: 'Study scope: ' + ctx.label + '\n\nStudy material:\n' + contextText(ctx.text),
      max: 5000, temp: 0.7, schema: JSON_SCHEMAS.conceptMap, task: 'analysis', stream: false,
      parse: function(raw) {
        var gg = unwrapStructuredOutput(pj(raw));
        if (!gg || !Array.isArray(gg.nodes) || !gg.nodes.length) throw new Error('Model response did not contain usable items');
        return gg;
      },
    });
    var rawNodes = Array.isArray(g.nodes) ? g.nodes : [];
    var rawEdges = Array.isArray(g.edges) ? g.edges : [];
    var nodes = validItems(rawNodes, ['id','label','category']);
    // Re-attach optional description from raw output (validItems strips extra fields)
    nodes = nodes.map(function(n) {
      var r = rawNodes.find(function(x){ return x.id===n.id; });
      return r && r.description ? Object.assign({}, n, {description: String(r.description)}) : n;
    });
    var edges = validItems(rawEdges, ['source','target','label']);
    // Re-attach strength and type
    edges = edges.map(function(e) {
      var r = rawEdges.find(function(x){ return x.source===e.source&&x.target===e.target; });
      return Object.assign({strength:1,type:'uses'}, e, r ? {strength:Number(r.strength)||1,type:r.type||'uses'} : {});
    });
    S.cmap = { nodes: nodes, edges: edges };
    S.cmapSel = null; LM.sel = null; LM.canvas = null; saveCmap();
  } catch(e) { toast('Map generation failed: ' + e.message); }
  finally { hideSpin(); render(); }
}

async function genSubjects() {
  if (S.docs.length < 2) return;
  showSpin('Organizing library by subject…');
  try {
    var docList = S.docs.map(function(d) {
      return '- "' + d.name + '"\nPreview: ' + d.content.slice(0, 280).replace(/\s+/g, ' ');
    }).join('\n\n');
    var raw = await callAI(
      'Group these study documents into subject areas. Use concise subject names (1–3 words). Every document must appear in exactly one subject. Reply ONLY with a valid JSON array, no prose:\n[{"name":"Subject Name","docNames":["exact filename"]}]',
      'Documents:\n' + docList, 700
    );
    var parsed = pj(raw);
    if (!Array.isArray(parsed)) throw new Error('Expected array');
    var docKey = S.docs.map(function(d) { return d.name; }).slice().sort().join('|');
    S.subjects = parsed
      .filter(function(s) { return s.name && Array.isArray(s.docNames) && s.docNames.length > 0; })
      .map(function(s, i) {
        return {
          id: s.id || ('subj' + Date.now() + i),
          name: String(s.name),
          docNames: s.docNames.map(String),
          examDate: s.examDate || null,
        };
      });
    S.subjectDocKey = docKey;
    saveSubjects();
    saveSubjectDocKey();
  } catch(e) { toast('Subject organization failed: ' + e.message); }
  finally { hideSpin(); render(); }
}

function selectNode(id) {
  S.cmapSel = (S.cmapSel === id) ? null : id;
  LM.sel = S.cmapSel;
  lmZoomTo(LM.sel);
  LM.alpha = Math.max(LM.alpha, 0.08);
  var el = document.getElementById('cmap-detail');
  if (el) {
    el.innerHTML = renderMapDetail();
    if (window.renderMathInElement) renderMathInView();
    _mathTimers.push(setTimeout(renderMathInView, 200));
  }
}

// ════════════════════════════════════════════
// ACTIONS — BACKUP / EXPORT / IMPORT
// ════════════════════════════════════════════
function exportBackup() {
  var data = JSON.stringify({
    version: 3, exportedAt: new Date().toISOString(),
    docs: S.docs, cards: S.cards, cmap: S.cmap,
    hist: S.hist, subjects: S.subjects, streak: S.streak,
    meta: S.meta, cfg: getSafeCfg(), analytics: S.analytics,
  }, null, 2);
  var blob = new Blob([data], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'studium-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(a.href);
}

async function importBackup(file) {
  if (!file) return;
  try {
    var text = await file.text();
    var data = JSON.parse(text);
    if (!data.version) throw new Error('Not a valid Studium backup');
    if (Array.isArray(data.docs))  { setDocs(data.docs);  saveDocs(); }
    if (Array.isArray(data.cards)) { S.cards = data.cards; saveCards(); }
    if (data.cmap)                 { S.cmap  = data.cmap;  saveCmap(); }
    if (Array.isArray(data.hist))  {
      S.hist = data.hist.map(function(h, i) { return h.id ? h : Object.assign({ id: String(h.ts || Date.now()) + '_' + i }, h); });
      saveHist();
    }
    if (Array.isArray(data.subjects)) { S.subjects = data.subjects; saveSubjects(); }
    if (data.streak)    { S.streak = data.streak; lsSet('sd_streak', S.streak); }
    if (data.meta && typeof data.meta === 'object') { Object.assign(S.meta, data.meta); saveMeta(); }
    if (data.analytics) { S.analytics = normalizeAnalytics(data.analytics); saveAnalytics(); }
    if (data.cfg) {
      if (data.cfg.activeModel) S.cfg.activeModel = migrateModelId(data.cfg.activeModel);
      if (data.cfg.autoFallback != null) S.cfg.autoFallback = data.cfg.autoFallback;
      if (data.cfg.openaiCompatibleBaseUrl) S.cfg.openaiCompatibleBaseUrl = data.cfg.openaiCompatibleBaseUrl;
      saveCfg();
    }
    toast('Imported: ' + S.docs.length + ' docs, ' + S.cards.length + ' cards, ' + S.hist.length + ' history entries');
    render();
  } catch(e) { toast('Import failed: ' + e.message); }
}

// ════════════════════════════════════════════
// ACTIONS — MISTAKE REDO
// ════════════════════════════════════════════
async function redoMistakes() {
  var mistakes = S.hist.filter(function(h) { return (h.score || 0) < 2; }).slice(-30);
  if (!mistakes.length) { toast('No low-score answers to redo yet.'); return; }
  if (!hasKey(getActiveModel().prov)) { toast('Add an API key in Settings first.'); setTab('settings'); return; }
  S.queue = mistakes.map(function(h, i) {
    return {
      id: Date.now() + i,
      question: h.question,
      hint: '',
      answer: h.modelAnswer || h.answer || '(see original)',
      topic: h.topic || 'Review',
    };
  });
  S.qi = 0; S.ans = ''; S.result = null; _hintShown = false;
  goStudyIntent('drill');
  toast('Loaded ' + S.queue.length + ' mistake questions — reanswer them to reinforce.');
}

// ════════════════════════════════════════════
// ACTIONS — EDIT / DELETE ITEMS
// ════════════════════════════════════════════
function deleteCard(id) {
  S.cards = S.cards.filter(function(c) { return c.id !== id; });
  var filtered = S.fcFilt === 'active'   ? S.cards.filter(function(c) { return !fsrsIsMastered(c); })
               : S.fcFilt === 'mastered' ? S.cards.filter(function(c) { return  fsrsIsMastered(c); }) : S.cards;
  if (S.fcIdx >= filtered.length) S.fcIdx = Math.max(0, filtered.length - 1);
  S.editingCardId = null;
  saveCards(); render();
}

function editCardStart(id) { S.editingCardId = id; render(); }
function cancelCardEdit()  { S.editingCardId = null; render(); }

function saveCardEdit(id) {
  var front = (document.getElementById('edit-front') || {}).value || '';
  var back  = (document.getElementById('edit-back')  || {}).value || '';
  var note  = (document.getElementById('edit-note')  || {}).value || '';
  if (!front.trim() || !back.trim()) { toast('Front and back are required.'); return; }
  S.cards = S.cards.map(function(c) {
    return c.id === id ? Object.assign({}, c, { front: front.trim(), back: back.trim(), note: note.trim() }) : c;
  });
  S.editingCardId = null;
  saveCards(); render();
}

function deleteQ() {
  if (S.queue.length <= 1) { S.queue = []; S.qi = 0; render(); return; }
  S.queue = S.queue.filter(function(_, i) { return i !== S.qi; });
  if (S.qi >= S.queue.length) S.qi = S.queue.length - 1;
  S.ans = ''; S.result = null; _hintShown = false;
  render();
}

// ════════════════════════════════════════════
// ACTIONS — SELF-GRADE OVERRIDE
// ════════════════════════════════════════════
function overrideScore(score) {
  if (!S.result) return;
  S.result.score = score;
  S.result.correct = score >= 2;
  var q = S.queue[S.qi];
  _updateRecordedQuizScore(q ? q.question : null, score);
  // re-evaluate missed-card offer after manual score override
  if (q) {
    if (score === 0) {
      S.missedQOffer = null;
      _autoAddMissedCard(q, S.result);
    } else if (score === 1) {
      S.missedQOffer = _buildMissedCardData(q, S.result);
    } else {
      S.missedQOffer = null;
    }
  }
  render();
}

function todayOverrideScore(score) {
  if (!S.todayResult) return;
  var item = S.todayQ[S.todayIdx];
  var q = item && item.type === 'quiz' ? item.q : null;
  S.todayResult.score = score;
  S.todayResult.correct = score >= 2;
  _updateRecordedQuizScore(q ? q.question : null, score);
  if (q) {
    if (score === 0) {
      S.missedQOffer = null;
      _autoAddMissedCard(q, S.todayResult);
    } else if (score === 1) {
      S.missedQOffer = _buildMissedCardData(q, S.todayResult);
    } else {
      S.missedQOffer = null;
    }
  }
  render();
}

function _normalizeFront(text) {
  return String(text || '').toLowerCase().replace(/[^\w\s]/g, '').replace(/\s+/g, ' ').trim();
}

function _canonicalSection(raw) {
  if (!raw) return '';
  var secs = studySections();
  var norm = String(raw).toLowerCase().trim();
  var exact = secs.find(function(s) { return s.title.toLowerCase() === norm; });
  if (exact) return exact.title;
  // fuzzy: find best partial match
  var best = null, bestScore = 0;
  secs.forEach(function(s) {
    var st = s.title.toLowerCase();
    var score = st.includes(norm) || norm.includes(st) ? Math.min(st.length, norm.length) / Math.max(st.length, norm.length) : 0;
    if (score > 0.7 && score > bestScore) { bestScore = score; best = s.title; }
  });
  return best || raw; // return original if no match (don't drop it, just keep as-is)
}

function _validateAndFixSections(items, field) {
  field = field || 'sourceSection';
  var secs = studySections();
  if (!secs.length) return items;
  return items.map(function(item) {
    var updated = Object.assign({}, item);
    if (updated[field]) updated[field] = _canonicalSection(updated[field]);
    // Also canonicalize the topic field so analytics don't fragment across sessions
    if (field === 'sourceSection' && updated.topic) {
      var ct = _canonicalSection(updated.topic);
      if (ct) updated.topic = ct;
    }
    return updated;
  });
}

function _srcCiteLink(sectionTitle) {
  if (!sectionTitle) return '';
  var secs = studySections();
  var sec = secs.find(function(s) { return s.title === sectionTitle || s.title.toLowerCase() === sectionTitle.toLowerCase(); });
  var onclick = sec ? 'jumpToSection(\'' + jsEsc(sec.id) + '\')' : '';
  return '<span class="src-cite"' + (onclick ? ' onclick="' + onclick + '" style="cursor:pointer;text-decoration:underline dotted"' : '') + ' title="' + esc(sectionTitle) + '">'
    + esc(sectionTitle.length > 40 ? sectionTitle.slice(0, 38) + '…' : sectionTitle) + '</span>';
}

function jumpToSection(sectionId) {
  S.sectionScope = sectionId;
  setTab('library'); S.librarySection = 'docs';
  setTimeout(function() {
    var el = document.getElementById('sec-' + sectionId);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 120);
}

function _buildMissedCardData(q, result) {
  return {
    front: q.question,
    back: (result && result.modelAnswer) || q.answer || '',
    note: (result && result.feedback) || '',
    topic: q.topic || '',
    sourceSection: q.sourceSection || '',
  };
}

function _upsertReviewCard(data) {
  var lib = fsrsLib();
  var norm = _normalizeFront(data.front);
  var existing = S.cards.find(function(c) { return _normalizeFront(c.front) === norm; });
  if (existing) {
    // Card already exists — bump it to due now so it resurfaces
    S.cards = S.cards.map(function(c) {
      if (c.id !== existing.id) return c;
      var updated = Object.assign({}, c);
      if (updated.fsrs) updated.fsrs = Object.assign({}, updated.fsrs, { due: new Date().toISOString() });
      return updated;
    });
    toast('Card already in deck — scheduled for review');
  } else {
    var newCard = Object.assign({ id: Date.now(), mastered: false, fsrs: lib ? lib.createEmptyCard() : null }, data);
    S.cards = S.cards.concat([newCard]);
    toast('Added to review deck');
  }
  saveCards();
}

function _autoAddMissedCard(q, result) {
  _upsertReviewCard(_buildMissedCardData(q, result));
}

function addMissedToReview() {
  if (!S.missedQOffer) return;
  _upsertReviewCard(S.missedQOffer);
  S.missedQOffer = null;
  render();
}

function selectModel(id) {

function toggleFallback() { S.cfg.autoFallback = !S.cfg.autoFallback; saveCfg(); render(); }
function toggleKeyVis(id) { var el = document.getElementById(id); if (el) el.type = el.type === 'password' ? 'text' : 'password'; }

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async function() {
  if (window.pdfjsLib) window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  await loadState();
  render();
  var _resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(function() { updateMapSize(); render(); }, 120);
  });
  document.addEventListener('keydown', function(e) {
    var tag = (e.target.tagName || '').toLowerCase();
    var typing = tag === 'input' || tag === 'textarea' || tag === 'select';

    if (e.key === 'Escape' && S.attnOpen) { e.preventDefault(); S.attnOpen = false; rebuildTopbar(); return; }
    if (e.key === 'Escape' && S.pomoOpen) { e.preventDefault(); S.pomoOpen = false; renderPomo(); return; }
    if (e.ctrlKey && e.key === 'Enter' && S.tab === 'study' && S.studyIntent === 'drill' && !S.result && _gradingStream === null) { submitQ(); return; }
    // After grading in Drill, plain Enter advances to the next question (completes the keyboard loop).
    if (e.key === 'Enter' && !e.ctrlKey && !e.shiftKey && !e.altKey && !e.metaKey && S.tab === 'study' && S.studyIntent === 'drill' && S.result && _gradingStream === null && !typing) { e.preventDefault(); nextQ(); return; }

    if (S.tab === 'study' && !typing && S.todayActive) {
      var todayItem = S.todayQ[S.todayIdx];
      if (todayItem && todayItem.type === 'card') {
        if (e.key === ' ') { e.preventDefault(); if (!S.todayFlipped) { S.todayFlipped = true; render(); } }
        else if (S.todayFlipped) {
          if (e.key === '1') rateCard(todayItem.id, 1);
          else if (e.key === '2') rateCard(todayItem.id, 2);
          else if (e.key === '3') rateCard(todayItem.id, 3);
          else if (e.key === '4') rateCard(todayItem.id, 4);
        }
      }
    }

    // Quant drill rapid-fire verbs: Esc skips, ? toggles the hint. Bound only
    // while answering (not on the result screen, where Enter already advances),
    // and on keys the numeric answer box can't need — digits stay free to type.
    if (S.tab === 'study' && S.studyIntent === 'quant' && S.quant && S.quant.active && !S.quant.showResult && !S.quant.timeUp) {
      if (e.key === 'Escape') { e.preventDefault(); quantSkip(); return; }
      if (e.key === '?') { e.preventDefault(); quantToggleHint(); return; }
    }

    if (S.tab === 'library' && S.librarySection === 'cards' && !typing) {
      if (e.key === ' ') { e.preventDefault(); flipCard(); }
      else if (e.key === 'ArrowLeft')  fcGo(-1);
      else if (e.key === 'ArrowRight') fcGo(1);
      else if ((e.key === 'y' || e.key === 'Y') && S.fcFlipped) markCard(true);
      else if ((e.key === 'n' || e.key === 'N') && S.fcFlipped) markCard(false);
    }
  });
});
