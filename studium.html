<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Studium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFFEFA;--surf:#FBF5EA;--card:#FBF5EA;--card2:#F9F3E6;
  --brd:#EDE3D0;--brd2:#E0D4BE;
  --acc:#0A7A48;--acc-strong:#00693E;--acc-t:#E3F6EC;--acc-b:#ACE0C6;
  --warn:#B45309;--warn-t:#FEF3E2;
  --hl:#D4FF00;--ok:#00693E;
  --tx:#181815;--mut:#45423B;--dim:#555149;
  --dark:#141410;--dark-s:#1E1E1A;--dark-br:#2E2E2A;--dark-m:#9A9690;
  --sans:'Atkinson Hyperlegible',system-ui,sans-serif;
  --rule:1px solid var(--brd);
  --shadow-sm:0 1px 2px rgba(60,45,25,0.05), 0 2px 6px rgba(60,45,25,0.06);
  --shadow:0 2px 8px rgba(60,45,25,0.07), 0 12px 30px rgba(60,45,25,0.09);
  --shadow-lg:0 6px 18px rgba(60,45,25,0.10), 0 24px 56px rgba(60,45,25,0.13);
  --radius-sm:10px;--radius:14px;--radius-lg:20px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:16px;line-height:1.75;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(20,33,61,0.12);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(20,33,61,0.25)}
#app{position:relative;z-index:1;height:100%;display:flex}
/* Sidebar */
#sidebar{width:58px;flex-shrink:0;background:var(--bg);border-right:1px solid var(--brd);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:2px;z-index:10}
.sb-logo{font-family:var(--sans);font-size:15px;color:var(--acc);padding:6px 0 16px;letter-spacing:.05em;font-weight:700}
.nb{position:relative;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);cursor:pointer;border:none;background:transparent;transition:background .15s,color .15s;color:var(--mut)}
.nb:hover{background:var(--brd);color:var(--tx)}
.nb.act{background:rgba(10,122,72,0.08);color:var(--acc);box-shadow:inset 0 0 0 1px rgba(10,122,72,0.22)}
.nb svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.nb .tt{position:absolute;left:calc(100% + 10px);background:var(--card);border:1px solid var(--brd);color:var(--tx);font-family:var(--sans);font-size:12px;padding:4px 10px;border-radius:var(--radius-sm);white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:200;box-shadow:var(--shadow-sm)}
.nb:hover .tt{opacity:1}
.sb-spacer{flex:1}
.sb-div{width:24px;height:1px;background:var(--brd);margin:6px 0}
/* Main */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:48px;flex-shrink:0;background:rgba(255,254,250,0.94);border-bottom:1px solid var(--brd);backdrop-filter:blur(14px);display:flex;align-items:center;padding:0 28px;gap:12px;z-index:5}
#topbar-title{font-family:var(--sans);font-size:14px;color:var(--tx);flex:1;letter-spacing:.01em;font-weight:700}
#content{flex:1;overflow-y:auto;padding:32px}
#view{max-width:820px;margin:0 auto}
/* Cards */
.card{background:var(--card);border:1px solid var(--brd);border-radius:var(--radius-lg);padding:22px;margin-bottom:14px;box-shadow:var(--shadow-sm);transition:border-color .2s,box-shadow .2s,transform .2s}
.card:hover{border-color:var(--acc-b);box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.card-hi{border-color:var(--acc)!important;box-shadow:0 0 0 1px rgba(10,122,72,0.22),var(--shadow-lg)}
/* Inputs */
.inp{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--brd);border-radius:var(--radius);color:var(--tx);font-family:var(--sans);font-size:15px;outline:none;transition:border-color .18s,box-shadow .18s;resize:none;font-weight:400}
.inp:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(10,122,72,0.22)}
input.inp{height:42px}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:999px;cursor:pointer;font-family:var(--sans);font-size:13.5px;font-weight:700;transition:filter .15s,opacity .15s,transform .12s;white-space:nowrap;line-height:1}
.btn:hover:not(:disabled){filter:brightness(0.96);transform:translateY(-1px)}
.btn:active:not(:disabled){transform:translateY(0.5px) scale(0.99)}
.btn:disabled{opacity:.32;cursor:not-allowed;filter:none}
.bp{background:var(--acc);color:#fff;box-shadow:0 2px 6px rgba(10,122,72,0.20)}
.bp:hover:not(:disabled){background:var(--acc-strong);box-shadow:0 6px 18px rgba(10,122,72,0.20)}
.bg{background:var(--card);color:var(--tx);border:1px solid var(--brd)}
.bg:hover:not(:disabled){background:var(--surf);border-color:var(--acc-b);filter:none;box-shadow:var(--shadow-sm)}
.bok{background:var(--ok);color:#fff}
.bno{background:var(--warn);color:#fff}
.btn-sm{padding:5px 12px;font-size:12.5px}
/* Badge */
.bdg{display:inline-block;padding:2px 9px;border-radius:20px;font-family:var(--sans);font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
.bdg-done{background:var(--acc-t);color:var(--acc-strong);border:1px solid var(--acc-b)}
.bdg-open{background:var(--warn-t);color:var(--warn);border:1px solid rgba(180,83,9,0.2)}
.bdg-neutral{background:var(--surf);color:var(--dim);border:1px solid var(--brd)}
/* Layout helpers */
.row{display:flex;align-items:center;gap:12px}
.rowsb{display:flex;align-items:center;justify-content:space-between}
.ph{font-family:var(--sans);font-size:22px;color:var(--tx);margin-bottom:20px;font-weight:700;letter-spacing:-.015em;line-height:1.3}
.sh{font-family:var(--sans);font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px;font-weight:700}
/* Progress */
.prog{height:5px;background:var(--brd);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;background:var(--acc);transition:width .5s}
/* Drop zone */
.drop{border:1px dashed var(--brd2);border-radius:var(--radius-lg);padding:44px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:14px;background:var(--card)}
.drop:hover,.drop.dg{border-color:var(--acc);background:var(--acc-t)}
/* Flashcard */
.fc-wrap{position:relative;height:300px;margin-bottom:14px}
.fc-ghost{position:absolute;background:var(--card);border:1px solid var(--brd);border-radius:var(--radius-lg);pointer-events:none;box-shadow:var(--shadow-sm)}
.fc-stage{position:absolute;inset:0;perspective:1400px;cursor:pointer}
.fc-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .52s cubic-bezier(.4,0,.2,1)}
.fc-inner.flip{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;inset:0;border-radius:var(--radius-lg);backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px 36px;overflow-y:auto}
.fc-front{background:var(--card);border:1px solid var(--brd);box-shadow:var(--shadow-sm)}
.fc-back{background:var(--card2);border:1px solid var(--acc-b);box-shadow:var(--shadow-sm);transform:rotateY(180deg)}
/* Stat grid */
.sg{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
@media(max-width:700px){.sg{grid-template-columns:repeat(3,1fr)}}
@media(max-width:480px){.sg{grid-template-columns:repeat(2,1fr)}}
.sc{background:var(--card);border:1px solid var(--brd);border-radius:var(--radius-lg);padding:14px 12px;text-align:center;box-shadow:var(--shadow-sm);transition:transform .2s,box-shadow .2s}
.sc:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--acc-b)}
.sv{font-family:var(--sans);font-size:24px;font-weight:700;line-height:1;letter-spacing:-.01em}
.sl{font-family:var(--sans);font-size:11px;color:var(--mut);margin-top:5px;text-transform:uppercase;letter-spacing:.05em;font-weight:700}
/* Spinner */
#spinner{position:fixed;inset:0;background:rgba(255,254,250,.85);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.spin-box{background:var(--card);border:1px solid var(--brd);border-radius:var(--radius-lg);padding:36px 60px;text-align:center;box-shadow:var(--shadow-lg)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:30px;height:30px;border:2px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .28s ease both}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
/* Toast */
#toast{position:fixed;bottom:24px;right:24px;z-index:500;background:var(--card);border:1px solid var(--brd);border-left:3px solid var(--acc);border-radius:var(--radius);padding:10px 16px;font-family:var(--sans);font-size:13px;color:var(--tx);box-shadow:var(--shadow-lg);max-width:320px;transition:opacity .3s;display:none}
/* Empty */
.empty{text-align:center;padding:56px 24px;border:1px solid var(--brd);border-radius:10px;margin-bottom:14px;background:var(--card)}
/* No-key warning */
.nokey{background:rgba(201,164,74,.07);border:1px solid rgba(201,164,74,.22);border-left:3px solid var(--gold);border-radius:7px;padding:11px 15px;font-family:var(--sans);font-size:13px;color:var(--gold);margin-bottom:14px}
/* Model cards */
.mc{flex:1 1 calc(50% - 6px);min-width:0;background:var(--card);border:1px solid var(--brd);border-radius:9px;padding:14px;cursor:pointer;position:relative;transition:border-color .2s,opacity .2s}
.mc:hover:not(.locked){border-color:var(--brd2)}
.mc.locked{opacity:.36;cursor:default}
/* Toggle */
.tog{width:44px;height:24px;border-radius:12px;flex-shrink:0;cursor:pointer;position:relative;transition:background .2s}
.tog-knob{position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.4)}
/* Chart bars */
.cbar{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-family:var(--sans);font-size:13px}
.cbar-label{width:150px;color:var(--mut);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cbar-track{flex:1;height:8px;background:var(--brd);border-radius:4px;overflow:hidden}
.cbar-fill{height:100%;border-radius:4px;transition:width .6s}
.cbar-pct{width:36px;text-align:right;font-weight:600}
/* Timeline */
.tl{display:flex;gap:4px;align-items:flex-end;height:72px}
.tl-b{flex:1;min-width:8px;border-radius:3px 3px 0 0;transition:height .4s,background .4s}
/* Keyboard hints */
.kh{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}
.key{display:inline-block;padding:2px 6px;background:var(--brd);border:1px solid var(--brd2);border-radius:4px;font-family:var(--sans);font-size:11px;color:var(--mut);line-height:1.5}
.kh-sep{color:var(--dim);font-family:var(--sans);font-size:12px}
/* Streak */
.streak-dot{width:8px;height:8px;border-radius:50%;background:#f4a24a;box-shadow:0 0 6px #f4a24a;flex-shrink:0}
/* Pip animation */
@keyframes pipIn{from{transform:scaleX(0);transform-origin:left}to{transform:scaleX(1);transform-origin:left}}
.pip-fill{animation:pipIn .35s ease both}
/* Respect reduced-motion preference (WCAG 2.3.3): neutralise animations/transitions */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}
}
/* Today tab */
.today-stat{background:var(--card);border:1px solid var(--brd);border-radius:var(--radius-lg);padding:18px 14px;text-align:center;box-shadow:var(--shadow-sm)}
.today-sv{font-size:32px;font-weight:700;line-height:1;letter-spacing:-.02em}
.today-sl{font-size:11px;color:var(--mut);margin-top:5px;text-transform:uppercase;letter-spacing:.05em;font-weight:700}
/* FSRS rating buttons */
.rating-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 6px;border:1.5px solid var(--brd);border-radius:var(--radius);cursor:pointer;background:var(--card);transition:all .15s;font-family:var(--sans);outline:none}
.rating-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.rb-again{color:#d05555;border-color:rgba(208,85,85,.35)}.rb-again:hover{background:rgba(208,85,85,.06)}
.rb-hard{color:#c49a3a;border-color:rgba(196,154,58,.35)}.rb-hard:hover{background:rgba(196,154,58,.06)}
.rb-good{color:#35b59b;border-color:rgba(53,181,155,.35)}.rb-good:hover{background:rgba(53,181,155,.06)}
.rb-easy{color:#4c79f2;border-color:rgba(76,121,242,.35)}.rb-easy:hover{background:rgba(76,121,242,.06)}
.rb-label{font-size:13px;font-weight:700;line-height:1}
.rb-due{font-size:11px;color:var(--dim);margin-top:1px}
/* Source citation */
.src-cite{display:inline-block;font-family:var(--sans);font-size:11px;color:var(--mut);background:var(--surf);border:1px solid var(--brd);border-radius:20px;padding:1px 8px;margin-left:6px;vertical-align:middle}
/* KaTeX math rendering */
.math-rich .katex{font-size:1em}
.math-rich .katex-display{overflow-x:auto;overflow-y:hidden;margin:.5em 0;white-space:normal}
.math-rich .katex-html{white-space:normal}
</style>
</head>

<div id="app">
  <nav id="sidebar" aria-label="Primary"></nav>
  <div id="main">
    <div id="topbar">
      <div id="topbar-title"></div>
      <div id="topbar-model"></div>
    </div>
    <div id="content"><main id="view" tabindex="-1"></main></div>
  </div>
</div>

<div id="spinner" style="display:none" role="status" aria-live="polite">
  <div class="spin-box">
    <div class="spin"></div>
    <p id="spin-msg" style="font-family:var(--sans);font-size:14px;color:var(--mut);animation:pulse 1.8s ease infinite">Loading…</p>
    <button class="btn bg btn-sm" style="margin-top:14px;font-size:12px" onclick="cancelGeneration()">Cancel</button>
  </div>
</div>
<div id="toast"></div>

  }
</script>

var _db = null;

function _openDB() {
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open('studium', 3);
    req.onupgradeneeded = function(e) {
      var db = e.target.result;
      if (!db.objectStoreNames.contains('docs'))    db.createObjectStore('docs',    { keyPath: 'name' });
      if (!db.objectStoreNames.contains('cards'))   db.createObjectStore('cards',   { keyPath: 'id' });
      if (!db.objectStoreNames.contains('cmap'))    db.createObjectStore('cmap');
      if (!db.objectStoreNames.contains('reviews')) db.createObjectStore('reviews', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('hist'))    db.createObjectStore('hist',    { keyPath: 'id' });
    };
    req.onsuccess  = function(e) { resolve(e.target.result); };
    req.onerror    = function()  { reject(req.error); };
  });
}

function _dbAll(store) {
  return new Promise(function(resolve) {
    if (!_db) { resolve([]); return; }
    var req = _db.transaction(store, 'readonly').objectStore(store).getAll();
    req.onsuccess = function() { resolve(req.result || []); };
    req.onerror   = function() { resolve([]); };
  });
}

function _dbPutAll(store, items) {
  if (!_db || !items.length) return Promise.resolve();
  return new Promise(function(resolve) {
    var tx = _db.transaction(store, 'readwrite');
    var os = tx.objectStore(store);
    items.forEach(function(item) { os.put(item); });
    tx.oncomplete = resolve; tx.onerror = resolve;
  });
}

function _dbClear(store) {
  return new Promise(function(resolve) {
    if (!_db) { resolve(); return; }
    var tx = _db.transaction(store, 'readwrite');
    tx.objectStore(store).clear().onsuccess = resolve;
    tx.onerror = resolve;
  });
}

function _dbGetCmap() {
  return new Promise(function(resolve) {
    if (!_db) { resolve(null); return; }
    var req = _db.transaction('cmap', 'readonly').objectStore('cmap').get('main');
    req.onsuccess = function() { resolve(req.result || null); };
    req.onerror   = function() { resolve(null); };
  });
}

function _dbPutCmap(cmap) {
  return new Promise(function(resolve) {
    if (!_db) { resolve(); return; }
    var tx = _db.transaction('cmap', 'readwrite');
    tx.objectStore('cmap').put(cmap, 'main');
    tx.oncomplete = resolve; tx.onerror = resolve;
  });
}

async function keychainRequest(path, options) {
  const res = await fetch(path, options || {});
  if (!res.ok) {
    const body = await res.json().catch(function() { return {}; });
    throw new Error(body.error || ('HTTP ' + res.status));
  }
  return await res.json();
}

async function loadKeychainSecrets() {
  try {
    const payload = await keychainRequest('/keychain/keys');
    const keys = payload && payload.keys ? payload.keys : {};
    KEYCHAIN_FIELDS.forEach(function(field) {
      var v = keys[field];
      // Server now returns booleans: true = key is saved, false = not set.
      // Store sentinel '__saved__' so hasKey() returns true without exposing the value.
      if (typeof v === 'boolean') S.cfg[field] = v ? '__saved__' : '';
      else if (typeof v === 'string') S.cfg[field] = v; // legacy server fallback
      else S.cfg[field] = '';
    });
    saveCfg();
    rebuildTopbar();
    if (S.tab === 'settings') render();
  } catch (e) {}
}

async function saveKeychainSecret(field, val) {
  if (!KEYCHAIN_FIELDS.includes(field)) return;
  await keychainRequest('/keychain/' + field, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ value: val || '' }),
  });
}

async function clearKeychainSecret(field) {
  if (!KEYCHAIN_FIELDS.includes(field)) return;
  await saveKeychainSecret(field, '');
}

async function migrateLegacySecrets(legacyCfg, cfg) {
  const liveCfg = cfg || {};
  const source = legacyCfg || {};
  let needsSave = false;
  KEYCHAIN_FIELDS.forEach(function(field) {
    const value = source[field];
    if (typeof value === 'string' && value.trim() && value !== '__saved__') {
      S.cfg[field] = value;
      needsSave = true;
    }
  });
  if (!needsSave) return;
  for (const field of KEYCHAIN_FIELDS) {
    if (S.cfg[field]) {
      await saveKeychainSecret(field, S.cfg[field]);
    }
  }
  saveCfg();
}

function bumpDocsVersion() {

var _studySectionsCache = { version: -1, value: null };
var _docTextCache = { version: -1, value: '' };
var _studyContextCache = { version: -1, scope: null, subjectKey: null, value: null };

function docText() {
  if (_docTextCache.version === S.docsVersion) return _docTextCache.value;
  var text = S.docs.map(function(d) { return '### ' + d.name + '\n' + d.content; }).join('\n---\n');
  _docTextCache.version = S.docsVersion;
  _docTextCache.value = text;
  return text;
}

function studySections() {
  if (_studySectionsCache.version === S.docsVersion) return _studySectionsCache.value;
  var out = [];
  S.docs.forEach(function(d, di) {
    var text = d.content || '';
    var matches = headingMatches(text);
    if (matches.length) {
      var stack = [];
      matches.forEach(function(m, i) {
        var level = m.level;
        var title = m.title;
        var start = m.index + m.rawLen;
        var end = i + 1 < matches.length ? matches[i+1].index : text.length;
        while (stack.length && stack[stack.length-1].level >= level) stack.pop();
        var parent = stack.length ? stack[stack.length-1] : null;
        var id = 'd' + di + 's' + i;
        var path = (parent ? parent.path + ' / ' : '') + title;
        var sec = { id:id, doc:d.name, title:title, path:path, level:level, parentId:parent && parent.id, index:out.length, content:text.slice(start,end).trim() };
        out.push(sec);
        stack.push(sec);
      });
    } else {
      var paras = text.split(/\n{2,}/), buf = '', n = 1;
      paras.forEach(function(p) {
        if ((buf + '\n\n' + p).length > 2800 && buf.trim()) {
          out.push({ id:'d' + di + 's' + n, doc:d.name, title:'Part ' + n, path:'Part ' + n, level:1, parentId:null, index:out.length, content:buf.trim() });
          n++; buf = p;
        } else {
          buf += (buf ? '\n\n' : '') + p;
        }
      });
      if (buf.trim()) out.push({ id:'d' + di + 's' + n, doc:d.name, title:n === 1 ? d.name : 'Part ' + n, path:n === 1 ? d.name : 'Part ' + n, level:1, parentId:null, index:out.length, content:buf.trim() });
    }
  });
  _studySectionsCache.version = S.docsVersion;
  _studySectionsCache.value = out;
  return out;
}

function studyContext() {
  var subjectKey = S.subjectDocKey + '|' + (S.subjectsVersion || 0);
  if (_studyContextCache.version === S.docsVersion && _studyContextCache.scope === S.sectionScope && _studyContextCache.subjectKey === subjectKey) return _studyContextCache.value;
  var secs = studySections();
  var subjs = activeSubjects();

  var result;
  if (S.sectionScope && S.sectionScope.startsWith('subj:')) {
    var subjId = S.sectionScope.slice(5);
    var subj = subjs.find(function(s) { return s.id === subjId; });
    if (subj) {
      var subjDocs = S.docs.filter(function(d) { return subj.docNames.indexOf(d.name) >= 0; });
      var text = subjDocs.map(function(d) { return '### ' + d.name + '\n' + d.content; }).join('\n---\n');
      result = { label: subj.name, text: text, section: null, sections: secs };
      _studyContextCache.version = S.docsVersion;
      _studyContextCache.scope = S.sectionScope;
      _studyContextCache.subjectKey = subjectKey;
      _studyContextCache.value = result;
      return result;
    }
  }

  var sel = secs.find(function(s) { return s.id === S.sectionScope; });
  if (!sel) {
    result = { label:'Full library', text:docText(), section:null, sections:secs };
    _studyContextCache.version = S.docsVersion;
    _studyContextCache.scope = S.sectionScope;
    _studyContextCache.subjectKey = subjectKey;
    _studyContextCache.value = result;
    return result;
  }

  var deps = [], p = sel.parentId;
  while (p) {
    var parent = secs.find(function(s) { return s.id === p; });
    if (!parent) break;
    deps.unshift(parent);
    p = parent.parentId;
  }
  secs.filter(function(s) { return s.doc === sel.doc && s.index < sel.index && sel.index - s.index <= 2; })
      .forEach(function(s) { if (!deps.some(function(d) { return d.id === s.id; })) deps.push(s); });
  var depText = deps.map(function(s) { return '### Dependency context: ' + s.doc + ' / ' + s.path + '\n' + s.content; }).join('\n\n');
  var primary = '### Primary selected section: ' + sel.doc + ' / ' + sel.path + '\n' + sel.content;
  result = { label:sel.doc + ' / ' + sel.path, text:(depText ? depText + '\n\n' : '') + primary, section:sel, sections:secs };
  _studyContextCache.version = S.docsVersion;
  _studyContextCache.scope = S.sectionScope;
  _studyContextCache.subjectKey = subjectKey;
  _studyContextCache.value = result;
  return result;
}

function examDaysLeft() {
  // Prefer a subject-level exam date when the user is scoped to a subject
  var subjDate = null;
  if (S.sectionScope && S.sectionScope.startsWith('subj:')) {
    var sid = S.sectionScope.slice(5);
    var subj = (S.subjects || []).find(function(s) { return s.id === sid; });
    if (subj && subj.examDate) subjDate = subj.examDate;
  }
  var useDate = subjDate || (S.meta && S.meta.examDate);
  if (!useDate) return null;
  var d = new Date(String(useDate) + 'T23:59:59');
  if (isNaN(d.getTime())) return null;
  return Math.ceil((d.getTime() - Date.now()) / 86400000);
}

function examSchedulePlan() {
  var days = examDaysLeft();
  if (days === null) return { days: null, retention: 0.9, cap: (S.meta && S.meta.dailyNewCap) || 10, cram: false };
  var base = (S.meta && S.meta.dailyNewCap) || 10;
  var urgency = days <= 0 ? 2.2 : days <= 3 ? 2.0 : days <= 7 ? 1.7 : days <= 14 ? 1.35 : 1;
  return {
    days: days,
    retention: days <= 3 ? 0.97 : days <= 7 ? 0.95 : days <= 14 ? 0.93 : 0.9,
    cap: Math.max(1, Math.ceil(base * urgency)),
    cram: days <= 3,
  };
}

function examDaysLeftForSubject(subj) {
  if (!subj || !subj.examDate) return null;
  var d = new Date(String(subj.examDate) + 'T23:59:59');
  if (isNaN(d.getTime())) return null;
  return Math.ceil((d.getTime() - Date.now()) / 86400000);
}

function isCardSuspended(card) {
  return !!(card && (card.suspended || (S.meta.suspendedCards || []).indexOf(card.id) !== -1));
}

function fsrsLapses(card) {
  return Number(card && card.fsrs && card.fsrs.lapses) || 0;
}

function isLeechCard(card) {
  return !isCardSuspended(card) && fsrsLapses(card) >= 4;
}

function activeSubjects() {
  var docKey = S.docs.map(function(d) { return d.name; }).slice().sort().join('|');
  return docKey === S.subjectDocKey ? S.subjects : [];
}

function recordStreak() {
  var today = new Date().toDateString();
  var yesterday = new Date(Date.now() - 86400000).toDateString();
  if (S.streak.lastDate === today) return;
  S.streak.count = S.streak.lastDate === yesterday ? S.streak.count + 1 : 1;
  S.streak.lastDate = today;
  lsSet('sd_streak', S.streak);
}

// ── Readiness: coverage × retention per scope ─────────────────────────────
// Returns {pct: 0-100, coveragePct: 0-100, retentionPct: 0-100, gaps: [...]}
function computeReadiness() {
  var secs = studySections();
  if (!secs.length) return null;
  var totalSecs = secs.length;
  var quizzedSecs = secs.filter(function(s) { return (S.coverage[s.title] || {}).quizzed > 0; }).length;
  var coveragePct = Math.round(quizzedSecs / totalSecs * 100);

  var ret = fsrsAvgRetention();
  if (ret === null) return null; // Not enough FSRS data — 0% retention would be misleading
  var retentionPct = ret;

  var pct = Math.round(coveragePct * retentionPct / 100);

  var gaps = secs.filter(function(s) {
    var cov = S.coverage[s.title] || {};
    return !cov.quizzed;
  }).slice(0, 5).map(function(s) { return s.title; });

  // Weak sections (quizzed but low accuracy)
  var insights = getAnalyticsInsights();
  var weakTitles = insights.weakTopics.slice(0, 3).map(function(w) { return w.topic; });

  return { pct: pct, coveragePct: coveragePct, retentionPct: ret, gaps: gaps, weakTopics: weakTitles };
}

// ── Coverage tracking ─────────────────────────────────────────────────────
function _saveCoverage() { lsSet('sd_coverage', S.coverage); }

function _bumpCoverage(sectionTitle, field) {
  if (!sectionTitle) return;
  var key = String(sectionTitle);
  if (!S.coverage[key]) S.coverage[key] = { quizzed: 0, carded: 0 };
  S.coverage[key][field] = (S.coverage[key][field] || 0) + 1;
  _saveCoverage();
}

// Returns section titles sorted by ascending quizzed count (least covered first)
function _undercoveredSections(field, limit) {
  var secs = studySections();
  return secs.map(function(s) {
    return { title: s.title, count: (S.coverage[s.title] || {})[field] || 0 };
  }).sort(function(a, b) { return a.count - b.count; })
    .slice(0, limit || 5).map(function(x) { return x.title; });
}

function _recordQuizAttempt(q, answer, result) {
  var topic = _canonicalSection(q.topic || q.sourceSection || '') || q.topic || 'General';
  var sectionTitle = _canonicalSection(q.sourceSection || q.topic || '') || q.sourceSection || q.topic;
  if (sectionTitle) _bumpCoverage(sectionTitle, 'quizzed');
  var histEntry = {
    id: String(Date.now()) + String(Math.random()).slice(2),
    question: q.question, topic: topic,
    correct: result.correct, score: result.score,
    ts: Date.now(), userAnswer: answer,
    modelAnswer: result.modelAnswer || q.answer || '',
  };
  S.hist.push(histEntry);
  _idbAddHistEntry(histEntry);
  recordStreak();
  recordAnalyticsAttempt({
    question: q.question, topic: topic,
    correct: result.correct, score: result.score,
    ts: Date.now(), modelId: getActiveModel().id,
    scopeLabel: studyContext().label, answerLength: answer.length,
    feedback: result.feedback,
  });
  saveHist();
  return histEntry;
}

function _updateRecordedQuizScore(question, score) {
  var correct = score >= 2;
  for (var i = S.hist.length - 1; i >= 0; i--) {
    if (!question || S.hist[i].question === question) {
      S.hist[i].score = score;
      S.hist[i].correct = correct;
      _idbUpdateHistEntry(S.hist[i]);
      break;
    }
  }
  var sessions = [];
  if (S.analytics.currentSession) sessions.push(S.analytics.currentSession);
  sessions = sessions.concat(S.analytics.sessions.slice().reverse());
  outer: for (var s = 0; s < sessions.length; s++) {
    var session = sessions[s];
    if (!session || !Array.isArray(session.attempts)) continue;
    for (var j = session.attempts.length - 1; j >= 0; j--) {
      if (!question || session.attempts[j].question === question) {
        session.attempts[j].score = score;
        session.attempts[j].correct = correct;
        session.correctCount = session.attempts.filter(function(a) { return a.correct; }).length;
        session.avgScore = session.attempts.length ? session.attempts.reduce(function(sum, a) { return sum + (a.score || 0); }, 0) / session.attempts.length : 0;
        session.accuracy = session.attempts.length ? Math.round(session.correctCount / session.attempts.length * 100) : 0;
        break outer;
      }
    }
  }
  saveHist();
  saveAnalytics();
}

function defaultAnalytics() {
  return { sessions: [], currentSession: null };
}

function normalizeAttempts(items) {
  if (!Array.isArray(items)) return [];
  return items.filter(function(item) { return item && typeof item === 'object'; });
}

function normalizeSession(session) {
  if (!session || typeof session !== 'object') return null;
  var attempts = normalizeAttempts(session.attempts);
  var questionCount = typeof session.questionCount === 'number' ? session.questionCount : attempts.length;
  var correctCount = typeof session.correctCount === 'number' ? session.correctCount : attempts.filter(function(a) { return a.correct; }).length;
  return {
    id: session.id || ('sess-' + Date.now()),
    startedAt: session.startedAt || Date.now(),
    endedAt: session.endedAt || null,
    modelId: session.modelId || getActiveModel().id,
    scopeLabel: session.scopeLabel || 'All content',
    sectionScope: session.sectionScope || 'all',
    docCount: session.docCount || S.docs.length,
    attempts: attempts,
    questionCount: questionCount,
    correctCount: correctCount,
    avgScore: session.avgScore || (attempts.length ? attempts.reduce(function(sum, a) { return sum + (a.score || 0); }, 0) / attempts.length : 0),
    accuracy: session.accuracy || (attempts.length ? Math.round(correctCount / attempts.length * 100) : 0),
    durationMs: session.durationMs || 0,
    status: session.status || (session.endedAt ? 'closed' : 'open'),
  };
}

function normalizeAnalytics(data) {
  var analytics = defaultAnalytics();
  if (!data || typeof data !== 'object') return analytics;
  analytics.sessions = Array.isArray(data.sessions) ? data.sessions.map(normalizeSession).filter(Boolean) : [];
  analytics.currentSession = normalizeSession(data.currentSession);
  return analytics;
}

function saveAnalytics() { lsSet('sd_analytics', S.analytics); }

function finalizeCurrentSession() {
  if (!S.analytics.currentSession) return;
  var session = S.analytics.currentSession;
  session.endedAt = session.endedAt || Date.now();
  session.durationMs = Math.max(0, session.endedAt - session.startedAt);
  session.questionCount = session.attempts.length;
  session.correctCount = session.attempts.filter(function(a) { return a.correct; }).length;
  session.avgScore = session.attempts.length ? session.attempts.reduce(function(sum, a) { return sum + (a.score || 0); }, 0) / session.attempts.length : 0;
  session.accuracy = session.attempts.length ? Math.round(session.correctCount / session.attempts.length * 100) : 0;
  session.status = 'closed';
  S.analytics.sessions.push(session);
  S.analytics.currentSession = null;
  saveAnalytics();
}

function startAnalyticsSession() {
  finalizeCurrentSession();
  var ctx = studyContext();
  var session = {
    id: 'sess-' + Date.now() + '-' + Math.floor(Math.random() * 1000),
    startedAt: Date.now(),
    endedAt: null,
    modelId: getActiveModel().id,
    scopeLabel: ctx.label || 'All content',
    sectionScope: S.sectionScope || 'all',
    docCount: S.docs.length,
    attempts: [],
    questionCount: 0,
    correctCount: 0,
    avgScore: 0,
    accuracy: 0,
    durationMs: 0,
    status: 'open',
  };
  S.analytics.currentSession = session;
  saveAnalytics();
  return session;
}

function recordAnalyticsAttempt(attempt) {
  if (!attempt) return;
  var session = S.analytics.currentSession || startAnalyticsSession();
  var record = {
    id: 'att-' + Date.now() + '-' + Math.floor(Math.random() * 1000),
    ts: attempt.ts || Date.now(),
    question: attempt.question || '',
    topic: _canonicalSection(attempt.topic || '') || attempt.topic || 'General',
    score: attempt.score || 0,
    correct: !!attempt.correct,
    modelId: attempt.modelId || getActiveModel().id,
    scopeLabel: attempt.scopeLabel || (studyContext().label || 'All content'),
    answerLength: attempt.answerLength || 0,
    feedback: attempt.feedback || '',
  };
  session.attempts.push(record);
  session.questionCount = session.attempts.length;
  session.correctCount = session.attempts.filter(function(a) { return a.correct; }).length;
  session.avgScore = session.attempts.length ? session.attempts.reduce(function(sum, a) { return sum + (a.score || 0); }, 0) / session.attempts.length : 0;
  session.accuracy = session.attempts.length ? Math.round(session.correctCount / session.attempts.length * 100) : 0;
  session.durationMs = Math.max(0, Date.now() - session.startedAt);
  saveAnalytics();
}

function getAnalyticsAttempts() {
  var attempts = [];
  if (S.analytics.currentSession && S.analytics.currentSession.attempts) {
    attempts = attempts.concat(S.analytics.currentSession.attempts);
  }
  S.analytics.sessions.forEach(function(session) {
    if (session && Array.isArray(session.attempts)) {
      attempts = attempts.concat(session.attempts);
    }
  });
  // Canonicalize topics on read so stale fragmented topics merge across sessions
  return attempts.map(function(a) {
    if (!a || !a.topic) return a;
    var canonical = _canonicalSection(a.topic);
    return canonical && canonical !== a.topic ? Object.assign({}, a, { topic: canonical }) : a;
  });
}

function computeAccuracyTrend() {
  var sessions = S.analytics.sessions.filter(function(s) { return s && s.attempts && s.attempts.length >= 2; });
  if (sessions.length < 4) return null;
  var half = Math.ceil(sessions.length / 2);
  var recent = sessions.slice(-half);
  var older  = sessions.slice(-sessions.length, -half);
  if (!older.length) return null;
  function avg(ss) { return Math.round(ss.reduce(function(s, x) { return s + x.accuracy; }, 0) / ss.length); }
  var recentAcc = avg(recent);
  var olderAcc  = avg(older);
  return { delta: recentAcc - olderAcc, recent: recentAcc, older: olderAcc };
}

function getAnalyticsInsights() {
  var attempts = getAnalyticsAttempts();
  var topicStats = {};
  var questionStats = {};

  attempts.forEach(function(a) {
    var rawTopic = a.topic || '';
    var topic = _canonicalSection(rawTopic) || rawTopic || 'General';
    var question = a.question || 'Untitled question';

    if (!topicStats[topic]) { topicStats[topic] = { attempts: 0, correct: 0, wrong: 0 }; }
    topicStats[topic].attempts++;
    if (a.correct) topicStats[topic].correct++; else topicStats[topic].wrong++;

    if (!questionStats[question]) { questionStats[question] = { attempts: 0, correct: 0, wrong: 0 }; }
    questionStats[question].attempts++;
    if (a.correct) questionStats[question].correct++; else questionStats[question].wrong++;
  });

  var weakTopics = Object.keys(topicStats).map(function(topic) {
    var stats = topicStats[topic];
    var accuracy = stats.attempts ? Math.round(stats.correct / stats.attempts * 100) : 0;
    return { topic: topic, attempts: stats.attempts, accuracy: accuracy, wrong: stats.wrong };
  }).filter(function(item) { return item.attempts >= 2 && (item.accuracy < 65 || item.wrong >= 2); }).sort(function(a, b) { return a.accuracy - b.accuracy; }).slice(0, 5);

  var recurrentQuestions = Object.keys(questionStats).map(function(question) {
    var stats = questionStats[question];
    return { question: question, attempts: stats.attempts, correct: stats.correct, wrong: stats.wrong };
  }).filter(function(item) { return item.attempts >= 2 && item.correct > 0 && item.wrong > 0; }).sort(function(a, b) { return b.wrong - a.wrong; }).slice(0, 5);

  return {
    attempts: attempts.length,
    totalCorrect: attempts.filter(function(a) { return a.correct; }).length,
    avgScore: attempts.length ? attempts.reduce(function(sum, a) { return sum + (a.score || 0); }, 0) / attempts.length : 0,
    accuracy: attempts.length ? Math.round(attempts.filter(function(a) { return a.correct; }).length / attempts.length * 100) : 0,
    sessionCount: S.analytics.sessions.length + (S.analytics.currentSession ? 1 : 0),
    weakTopics: weakTopics,
    recurrentQuestions: recurrentQuestions,
    trend: computeAccuracyTrend(),
  };
}

function clearAnalyticsData() {
  S.analytics = defaultAnalytics();
  saveAnalytics();
}

function isRetryable(msg) {
  const m = String(msg || '').toLowerCase();
  return m.includes('429') || m.includes('rate limit') || m.includes('quota') ||
         m.includes('overloaded') || m.includes('503') || m.includes('529') ||
         m.includes('502') || m.includes('network') || m.includes('failed to fetch') ||
         m.includes('connection');
}
function isFatal(msg) {
  const m = String(msg || '').toLowerCase();
  return m.includes('401') || m.includes('unauthorized') || m.includes('invalid api key') ||
         m.includes('incorrect api key') || m.includes('no') && m.includes('key configured');
}

function extractErrMsg(e, status) {
  if (e && e.error && typeof e.error === 'object') return e.error.message || JSON.stringify(e.error);
  if (e && typeof e.error === 'string') return e.error;
  if (e && e.message) return e.message;
  return 'HTTP ' + status;
}

async function withRetry(fn, maxRetries) {
  var delay = 1200, last;
  for (var i = 0; i < (maxRetries || 3); i++) {
    try { return await fn(); } catch(e) {
      last = e;
      if (e.name === 'AbortError') throw e;
      if (!isRetryable(e.message)) throw e;
      if (i < (maxRetries || 3) - 1) await new Promise(function(res) { setTimeout(res, delay); });
      delay = Math.min(delay * 2, 8000);
    }
  }
  throw last;
}

function _schemaPayload(schemaSpec) {
  if (!schemaSpec) return null;
  return { name: schemaSpec.name || 'structured_output', schema: schemaSpec.schema, unwrap: schemaSpec.unwrap || null };
}

function _schemaText(obj, schemaSpec) {
  var v = obj;
  if (schemaSpec) {
    if (schemaSpec.name && v && Object.prototype.hasOwnProperty.call(v, schemaSpec.name)) {
      v = v[schemaSpec.name];
    }
    if (schemaSpec.unwrap && v && Object.prototype.hasOwnProperty.call(v, schemaSpec.unwrap)) {
      v = v[schemaSpec.unwrap];
    }
  }
  return JSON.stringify(v);
}

function _googleSchema(schema) {
  if (!schema || typeof schema !== 'object') return schema;
  if (Array.isArray(schema)) return schema.map(_googleSchema);
  var out = {};
  Object.keys(schema).forEach(function(k) {
    if (k === 'additionalProperties' || k === 'minItems' || k === 'minimum' || k === 'maximum') return;
    out[k] = _googleSchema(schema[k]);
  });
  return out;
}

async function apiAnthropic(modelId, sys, user, max, temperature, schema) {
  const body = {
    model: modelId, max_tokens: max,
    system: [{ type: 'text', text: sys, cache_control: { type: 'ephemeral' } }],
    messages: [{ role: 'user', content: [{ type: 'text', text: user, cache_control: { type: 'ephemeral' } }] }],
  };
  if (typeof temperature !== 'undefined') body.temperature = temperature;
  if (schema) {
    var sp = _schemaPayload(schema);
    body.tools = [{ name: sp.name, description: 'Return structured data', input_schema: sp.schema }];
    body.tool_choice = { type: 'tool', name: sp.name };
  }
  const r = await fetch('/proxy/anthropic', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body), signal: _sig(),
  });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(extractErrMsg(e, r.status)); }
  const d = await r.json();
  if (schema) {
    const blk = Array.isArray(d.content) ? d.content.find(function(b) { return b.type === 'tool_use'; }) : null;
    if (!blk) throw new Error('No tool_use block in Anthropic response');
    return { text: _schemaText(blk.input, schema), tok: (d.usage?.input_tokens || 0) + (d.usage?.output_tokens || 0) };
  }
  const blk = Array.isArray(d.content) ? d.content.find(function(b) { return b.type === 'text'; }) : null;
  if (!blk) throw new Error('No text block in Anthropic response');
  if (d.stop_reason === 'max_tokens') toast('Response cut off at token limit — narrow your scope for full coverage');
  return { text: blk.text, tok: (d.usage?.input_tokens || 0) + (d.usage?.output_tokens || 0) };
}

async function apiOpenAI(modelId, sys, user, max, temperature, schema) {
  const body = { model: modelId, max_tokens: max, messages: [{ role: 'system', content: sys }, { role: 'user', content: user }] };
  if (typeof temperature !== 'undefined') body.temperature = temperature;
  if (schema) {
    var sp = _schemaPayload(schema);
    body.response_format = { type: 'json_schema', json_schema: { name: sp.name, strict: false, schema: sp.schema } };
  }
  const r = await fetch('/proxy/openai', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body), signal: _sig(),
  });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(extractErrMsg(e, r.status)); }
  const d = await r.json();
  if (d.choices?.[0]?.finish_reason === 'length') toast('Response cut off at token limit — narrow your scope for full coverage');
  var content = d.choices[0].message.content;
  return { text: schema ? _schemaText(pj(content), schema) : content, tok: d.usage?.total_tokens || 0 };
}

async function apiGoogle(modelId, sys, user, max, temperature, schema) {
  const generationConfig = { maxOutputTokens: max, responseMimeType: 'application/json' };
  if (typeof temperature !== 'undefined') generationConfig.temperature = temperature;

  const r = await fetch('/proxy/google', {

  });

  if (!cand?.content?.parts?.[0]) throw new Error(d.promptFeedback?.blockReason || 'No response from Gemini');
  var text = cand.content.parts[0].text;

function modelRole(model) {

function getModelPriority(model, task) {
  var role = modelRole(model);
  var mode = S.cfg.routingMode || 'hybrid';
  var score;
  if (mode === 'offline') {
    // Prefer local only; frontier models get deprioritized
    score = role === 'local' ? 0 : 2;
  } else if (mode === 'quality') {
    // Everything goes to frontier
    score = role === 'frontier' ? 0 : 2;
  } else {
    // Hybrid: local for bulk generation, frontier for grading/insight
    if (task === 'grading' || task === 'analysis' || task === 'insight') {
      score = role === 'frontier' ? 0 : 1;
    } else {
      score = role === 'local' ? 0 : 1;
    }
  }
  if (model.id === S.cfg.activeModel) score -= 0.1;
  return score;
}

function getModelTryList(task) {
  if (!S.cfg.autoFallback) return [S.cfg.activeModel];
  return MODELS.slice().filter(function(m) { return m.id === S.cfg.activeModel || hasKey(m.prov); }).sort(function(a, b) {
    var pa = getModelPriority(a, task);
    var pb = getModelPriority(b, task);
    if (pa !== pb) return pa - pb;
    if (a.id === S.cfg.activeModel) return -1;
    if (b.id === S.cfg.activeModel) return 1;
    return 0;
  }).map(function(m) { return m.id; });
}

function getPreferredModel(task) {
  var tryList = getModelTryList(task);
  for (var i = 0; i < tryList.length; i++) {
    var m = MODELS.find(function(x) { return x.id === tryList[i]; });
    if (m && hasKey(m.prov) && !isModelDead(m)) return m;
  }
  return getActiveModel();
}

async function callAI(sys, user, max, temperature, schema, task) {
  max = max || 900;
  const tryList = getModelTryList(task);

  let lastErr;
  for (const mid of tryList) {
    const model = MODELS.find(function(m) { return m.id === mid; });
    if (!model || !hasKey(model.prov)) continue;
    try {
      const res = await withRetry(function() {
        if (model.prov === 'anthropic') return apiAnthropic(mid, sys, user, max, temperature, schema);
        if (model.prov === 'openai')    return apiOpenAI(mid, sys, user, max, temperature, schema);
        if (model.prov === 'google')    return apiGoogle(mid, sys, user, max, temperature, schema);
        return apiOpenAICompatible(model.apiModel || mid, sys, user, max, temperature, schema);
      }, 3);
      if (res.tok) { S.cfg.usage[mid] = (S.cfg.usage[mid] || 0) + res.tok; saveCfg(); }
      if (mid !== S.cfg.activeModel) {
        const orig = MODELS.find(function(m) { return m.id === S.cfg.activeModel; });
        toast((orig ? orig.name : 'Active model') + ' unavailable \u2014 fell back to ' + model.name);
      }
      return res.text;
    } catch(e) {
      lastErr = e;
      if (e.name === 'AbortError') throw e;
      if (isFatal(e.message)) { throw new Error(model.name + ': ' + e.message); }
      if (!S.cfg.autoFallback) throw e;
    }
  }
  throw lastErr || new Error('All models failed or no API key configured');
}

// Robust structured generation: try schema-constrained output first, then fall
// back to a plain (no-schema) call if the response can't be parsed into the
// expected shape. Many models — especially local/compatible ones — return a
// single object or echo the schema under constrained decoding; the plain-prompt
// path (which worked before N8) is the safety net. parse(rawText) must return
// the finished result or throw on a bad shape.
async function genStructured(opts) {
  var attempts = [];
  if (opts.schema) attempts.push({ schema: opts.schema, label: 'schema' });
  attempts.push({ schema: null, label: 'plain' });
  var lastErr;
  for (var i = 0; i < attempts.length; i++) {
    var a = attempts[i];
    try {
      var raw;
      if (opts.stream) {
        raw = await streamGenerate(opts.sys, opts.user, opts.max, opts.onChunk || function() {}, a.schema);
      } else {
        raw = await callAI(opts.sys, opts.user, opts.max, opts.temp, a.schema, opts.task);
      }
      try {
        return opts.parse(raw);
      } catch (perr) {
        console.warn('[genStructured] ' + a.label + ' parse failed:', perr.message, '\nRaw response:', String(raw).slice(0, 800));
        lastErr = perr;
        // try next attempt (plain) on a shape/parse error
      }
    } catch (callErr) {
      if (callErr.name === 'AbortError') throw callErr;
      if (isFatal(callErr.message)) throw callErr;
      console.warn('[genStructured] ' + a.label + ' call failed:', callErr.message);
      lastErr = callErr;
    }
  }
  throw lastErr || new Error('Generation failed');
}

// ════════════════════════════════════════════
// STREAMING GRADING
// ════════════════════════════════════════════
async function _readSSE(response, extractDelta, onChunk) {
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let text = '', buffer = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim();
      if (data === '[DONE]') return text;
      try {
        const delta = extractDelta(JSON.parse(data));
        if (delta) { text += delta; onChunk(text); }
      } catch {}
    }
  }
  return text;
}

function extractStreamFeedback(partial) {
  const m = partial.match(/"feedback"\s*:\s*"((?:[^"\\]|\\.)*)"/);
  return m ? m[1].replace(/\\n/g, '\n').replace(/\\"/g, '"').replace(/\\\\/g, '\\') : '';
}

// Try exact/numeric match in JS before calling the LLM grader.
// Returns a grade result object if it can decide, otherwise null.
function _tryNumericGrade(q, answer) {
  if (!q.answer) return null;
  function normalizeNum(s) {
    s = String(s).trim().toLowerCase().replace(/,/g, '').replace(/\s+/g, '');
    var n = parseFloat(s);
    return isNaN(n) ? null : n;
  }
  var modelNum = normalizeNum(q.answer);
  var studentNum = normalizeNum(answer);
  if (modelNum === null || studentNum === null) return null;
  // Only auto-grade if question answer is a short numeric token
  if (String(q.answer).trim().split(/\s+/).length > 4) return null;
  // When model answer is zero, use absolute tolerance; otherwise relative.
  var correct = Math.abs(modelNum) < 1e-9
    ? Math.abs(studentNum) < 0.001
    : Math.abs(modelNum - studentNum) / Math.abs(modelNum) < 0.001;
  return {
    correct: correct,
    score: correct ? 3 : 0,
    feedback: correct ? 'Correct.' : 'Expected ' + q.answer + ', got ' + answer + '.',
    modelAnswer: q.answer,
    _autoGraded: true,
  };
}

// Look up the source section text for a question to ground the grader.
function _sourceTextForQuestion(q) {
  if (!q || !q.sourceSection) return '';
  var secs = studySections();
  var sec = secs.find(function(s) { return s.title === q.sourceSection || s.path === q.sourceSection; });
  if (!sec) return '';
  var txt = sec.content || '';
  return txt.slice(0, 2000); // keep it short to fit in grading context
}

function gradePayload(q, answer) {
  var srcText = _sourceTextForQuestion(q);
  var srcBlock = srcText
    ? '\n\nSource notes (authoritative — evaluate against these, not the model answer alone):\n"""\n' + srcText + '\n"""'
    : '';
  var rubric = '\nEvaluate each criterion independently:\n- Correctness: is the core claim right?\n- Completeness: are key points covered?\n- Accuracy: no false statements?\nSum to a score 0-3.';
  const sys = _personaSys() + 'You are an expert academic evaluator whose goal is to build the student\'s understanding and intuition, not just mark right/wrong.' + rubric + ' Reply ONLY with valid JSON — no prose:\n{"correct":true/false,"score":0-3,"feedback":"1-2 concise sentences on what was right or wrong, naming the specific error or the precise gap","keyIdea":"the single underlying principle or intuition that makes the correct answer correct, phrased so it transfers to similar problems (1-2 sentences, plain and memorable)","modelAnswer":"brief answer"}\nScoring: 3=fully correct, 2=mostly right, 1=partial, 0=wrong. Always fill keyIdea, even when the answer is correct, to deepen the mental model.';
  const user = 'Question: ' + q.question + '\nModel answer: ' + q.answer + '\nStudent answer: ' + answer + srcBlock;
  const max = 800;
  return { sys, user, max };
}

async function streamGrade(q, answer, onChunk) {
  const payload = gradePayload(q, answer);
  const sys = payload.sys;
  const user = payload.user;
  const max = payload.max;
  const model = getPreferredModel('grading');

  if (!hasKey(model.prov)) throw new Error('No API key configured for ' + model.name + '. Add one in Settings.');

  if (model.prov === 'google') {
    var raw = await callAI(sys, user, max, 0, undefined, 'grading');
    if (onChunk) onChunk(raw);
    return raw;
  }

  async function fallbackToCallAI(originalError) {
    if (originalError.name === 'AbortError') throw originalError;
    if (isFatal(originalError.message)) throw originalError;
    if (!S.cfg.autoFallback) throw originalError;
    var raw = await callAI(sys, user, max, 0, undefined, 'grading');
    if (onChunk) onChunk(raw);
    return raw;
  }

  try {
    let r;
    if (model.prov === 'anthropic') {
      r = await fetch('/proxy/anthropic', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: model.id, max_tokens: max, temperature: 0, stream: true,
          system: [{ type: 'text', text: sys, cache_control: { type: 'ephemeral' } }],
          messages: [{ role: 'user', content: [{ type: 'text', text: user, cache_control: { type: 'ephemeral' } }] }],
        }),
        signal: _sig(),
      });
      if (!r.ok) { const e = await r.json().catch(function() { return {}; }); throw new Error(extractErrMsg(e, r.status)); }
      return _readSSE(r, function(evt) { return evt.type === 'content_block_delta' && evt.delta?.text ? evt.delta.text : null; }, onChunk);
    }

    if (model.prov === 'openai') {
      r = await fetch('/proxy/openai', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: model.id, max_tokens: max, temperature: 0, stream: true, messages: [{ role: 'system', content: sys }, { role: 'user', content: user }] }),
        signal: _sig(),
      });
    } else {
      var base = String(S.cfg.openaiCompatibleBaseUrl || '').replace(/\/+$/, '');
      r = await fetch('/proxy/openai-compatible', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ _base_url: base, model: model.apiModel || model.id, max_tokens: max, temperature: 0, stream: true, messages: [{ role: 'system', content: sys }, { role: 'user', content: user }] }),
        signal: _sig(),
      });
    }
    if (!r.ok) { const e = await r.json().catch(function() { return {}; }); throw new Error(extractErrMsg(e, r.status)); }
    return _readSSE(r, function(evt) { return evt.choices?.[0]?.delta?.content ?? null; }, onChunk);
  } catch (e) {
    return fallbackToCallAI(e);
  }
}

// ── Streaming generation (like streamGrade but for quiz/card creation) ─────
async function streamGenerate(sys, user, max, onChunk, schema) {
  if (schema) return callAI(sys, user, max, 0.7, schema, 'generation');
  const model = getPreferredModel('generation');
  if (!hasKey(model.prov)) throw new Error('No API key configured. Add one in Settings.');
  if (model.prov === 'google') return callAI(sys, user, max, 0.7, undefined, 'generation');

  try {
    let r;
    if (model.prov === 'anthropic') {
      r = await fetch('/proxy/anthropic', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: model.id, max_tokens: max, temperature: 0.7, stream: true,
          system: [{ type: 'text', text: sys, cache_control: { type: 'ephemeral' } }],
          messages: [{ role: 'user', content: [{ type: 'text', text: user, cache_control: { type: 'ephemeral' } }] }] }),
        signal: _sig(),
      });
      if (!r.ok) { const e = await r.json().catch(function() { return {}; }); throw new Error(extractErrMsg(e, r.status)); }
      return _readSSE(r, function(evt) { return evt.type === 'content_block_delta' && evt.delta?.text ? evt.delta.text : null; }, onChunk);
    }

    if (model.prov === 'openai') {
      r = await fetch('/proxy/openai', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: model.id, max_tokens: max, temperature: 0.7, stream: true, messages: [{ role: 'system', content: sys }, { role: 'user', content: user }] }),
        signal: _sig(),
      });
    } else {
      var base = String(S.cfg.openaiCompatibleBaseUrl || '').replace(/\/+$/, '');
      r = await fetch('/proxy/openai-compatible', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ _base_url: base, model: model.apiModel || model.id, max_tokens: max, temperature: 0.7, stream: true, messages: [{ role: 'system', content: sys }, { role: 'user', content: user }] }),
        signal: _sig(),
      });
    }

    if (!r.ok) { const e = await r.json().catch(function() { return {}; }); throw new Error(extractErrMsg(e, r.status)); }
    return _readSSE(r, function(evt) { return evt.choices?.[0]?.delta?.content ?? null; }, onChunk);
  } catch (e) {
    if (e.name === 'AbortError') throw e;
    if (isFatal(e.message)) throw e;
    if (!S.cfg.autoFallback) throw e;
    var raw = await callAI(sys, user, max, 0.7, undefined, 'generation');
    if (onChunk) onChunk(raw);
    return raw;
  }
}

// ════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function jsEsc(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function pj(t) {
  if (t && typeof t !== 'string') return t;
  function clean(s) { return s.trim().replace(/^```(?:json)?[\r\n]*/i, '').replace(/[\r\n]*```\s*$/i, '').trim(); }
  function repair(s) {
    return s.replace(/,\s*([}\]])/g, '$1').replace(/}\s*{/g, '},{').replace(/]\s*\[/g, '],[');
  }
  function balanced(s) {
    var start = s.search(/[\[{]/);
    if (start < 0) return '';
    var open = s[start], close = open === '[' ? ']' : '}';
    var depth = 0, inStr = false, escd = false;
    for (var i = start; i < s.length; i++) {
      var ch = s[i];
      if (inStr) {
        if (escd) escd = false;
        else if (ch === '\\') escd = true;
        else if (ch === '"') inStr = false;
      } else if (ch === '"') inStr = true;
      else if (ch === open) depth++;
      else if (ch === close && --depth === 0) return s.slice(start, i + 1);
    }
    return s.slice(start);
  }

  var s = clean(t), variants = [s];
  var m = s.match(/```(?:json)?\s*([\s\S]*?)\s*```/i);
  if (m) variants.push(clean(m[1]));
  var b = balanced(s);
  if (b) variants.push(b);
  var tries = variants.concat(variants.map(repair));
  for (var i=0; i<tries.length; i++) {
    try { return JSON.parse(tries[i]); } catch {}
  }
  var objText = repair(b || s);
  var objs = objText.match(/\{[\s\S]*?\}(?=\s*,|\s*\]|\s*$)/g);
  if (objs && objs.length) {
    var parsed = objs.map(function(o) { try { return JSON.parse(repair(o)); } catch { return null; } }).filter(Boolean);
    if (parsed.length) return parsed;
  }
  throw new Error('Could not parse model response as JSON');
}

function unwrapStructuredOutput(obj) {
  if (Array.isArray(obj)) return obj;
  if (!obj || typeof obj !== 'object') return obj;
  // Concept-map shape: keep the {nodes,edges} object intact (checked before generic array unwrap)
  if (Array.isArray(obj.nodes) && Array.isArray(obj.edges)) return obj;
  if (Array.isArray(obj.items)) return obj.items;
  var keys = Object.keys(obj);
  // Any array-valued property → use the longest array (handles {questions:[...]}, {cards:[...]}, {data:[...]}, etc.)
  var arrKeys = keys.filter(function(k) { return Array.isArray(obj[k]); });
  if (arrKeys.length) {
    arrKeys.sort(function(a, b) { return obj[b].length - obj[a].length; });
    return obj[arrKeys[0]];
  }
  if (keys.length === 1) return unwrapStructuredOutput(obj[keys[0]]);
  for (var k = 0; k < keys.length; k++) {
    var child = obj[keys[k]];
    if (child && typeof child === 'object') {
      var unwrapped = unwrapStructuredOutput(child);
      if (Array.isArray(unwrapped)) return unwrapped;
      if (unwrapped && typeof unwrapped === 'object' && Array.isArray(unwrapped.nodes) && Array.isArray(unwrapped.edges)) return unwrapped;
    }
  }
  // A single record object (all values primitive) — wrap as a one-item array so generation still yields something
  if (keys.length && keys.every(function(k) { return obj[k] == null || typeof obj[k] !== 'object'; })) return [obj];
  return obj;
}

function validItems(items, fields, optFields) {
  items = unwrapStructuredOutput(items);
  if (!Array.isArray(items)) throw new Error('Model response was not a JSON array');
  var cleaned = items
    .filter(function(x) { return x && typeof x === 'object'; })
    .map(function(x) {
      var out = {};
      fields.forEach(function(f) { out[f] = String(x[f] || '').trim(); });
      (optFields || []).forEach(function(f) { var v = String(x[f] || '').trim(); if (v) out[f] = v; });
      return out;
    })
    .filter(function(x) { return fields.every(function(f) { return !!x[f]; }); });
  if (!cleaned.length) throw new Error('Model response did not contain usable items');
  return cleaned;
}

// Phase 3: send the whole scoped section to a long-context model;
// only truncate when the content genuinely exceeds the token budget.
const TOKEN_BUDGET = 24000; // ~96k chars at chars/4 ≈ tokens
function contextText(text) {
  var est = Math.round(text.length / 4);
  if (est <= TOKEN_BUDGET) return text;
  var limit = TOKEN_BUDGET * 4;
  return text.slice(0, limit)
    + '\n\n[Content truncated: ~' + est.toLocaleString() + ' estimated tokens exceeds '
    + TOKEN_BUDGET.toLocaleString() + '-token budget. Select a specific section scope for full coverage.]';
}

// ── Model validation ────────────────────────────────────────────────────────
var _liveModelIds = {};   // provider → Set of valid model IDs from live API
var _deadModels   = new Set(); // model IDs that are not in the live list

function isModelDead(m) { return _deadModels.has(m.id); }

async function validateModels() {
  var providers = ['anthropic', 'openai', 'google'];
  var changed = false;
  await Promise.all(providers.map(async function(prov) {
    if (!hasKey(prov)) return;
    try {
      var res = await fetch('/models/' + prov);
      if (!res.ok) return;
      var data = await res.json();
      if (Array.isArray(data.models) && data.models.length > 0) {
        _liveModelIds[prov] = new Set(data.models);
        changed = true;
      }
    } catch (e) {}
  }));
  if (!changed) return;
  _deadModels = new Set();
  MODELS.forEach(function(m) {
    var live = _liveModelIds[m.prov];
    if (live && !live.has(m.id)) _deadModels.add(m.id);
  });
  // Auto-switch away from a dead active model
  if (_deadModels.has(S.cfg.activeModel)) {
    var fallback = MODELS.find(function(m) { return hasKey(m.prov) && !_deadModels.has(m.id); });
    if (fallback) {
      S.cfg.activeModel = fallback.id;
      saveCfg();
      toast('Active model unavailable on provider — switched to ' + fallback.name);
    }
  }
  render();
}

// ════════════════════════════════════════════
// FSRS — scheduling engine
// ════════════════════════════════════════════
function fsrsLib() { return window._fsrsLib || null; }

function fsrsRetentionPct(fsrsCard) {
  if (!fsrsCard || !fsrsCard.stability || !fsrsCard.last_review) return null;
  var t = Math.max(0, (Date.now() - new Date(fsrsCard.last_review).getTime()) / 86400000);
  // FSRS power forgetting curve: R = (1 + 19/81 * t/S)^(-0.5); at t=S, R=0.9
  var R = Math.pow(1 + (19 / 81) * t / fsrsCard.stability, -0.5);
  return Math.round(Math.max(0, Math.min(1, R)) * 100);
}

function fsrsIsDue(fsrsCard) {
  return !!fsrsCard && new Date(fsrsCard.due) <= new Date();
}

function fsrsIsMastered(card) {
  if (!card.fsrs) return card.mastered || false;
  var ret = fsrsRetentionPct(card.fsrs);
  return card.fsrs.state === 2 && ret !== null && ret >= 90;
}

function fsrsAvgRetention() {
  var total = 0, n = 0;
  S.cards.forEach(function(c) {
    if (c.fsrs && c.fsrs.stability && c.fsrs.last_review) {
      var r = fsrsRetentionPct(c.fsrs);
      if (r !== null) { total += r; n++; }
    }
  });
  return n >= 5 ? Math.round(total / n) : null; // hide until sample ≥5
}

function fsrsNextDueLabel(fsrsCard) {
  if (!fsrsCard || !fsrsCard.due) return '';
  var diffMs = new Date(fsrsCard.due) - Date.now();
  if (diffMs < 0) return 'now';
  var mins = Math.round(diffMs / 60000);
  if (mins < 60) return mins + 'm';
  var hrs = Math.round(diffMs / 3600000);
  if (hrs < 24) return hrs + 'h';
  return Math.round(diffMs / 86400000) + 'd';
}

// Interleaved practice (Rohrer/Kornell): spread topics so consecutive items
// rarely share a topic. Stable round-robin across topic buckets — preserves the
// original (due-date) order within each topic. Pure function.
function _interleaveByTopic(list, keyFn) {
  var buckets = [], index = {};
  list.forEach(function(item) {
    var k = keyFn(item) || '';
    if (index[k] == null) { index[k] = buckets.length; buckets.push([]); }
    buckets[index[k]].push(item);
  });
  if (buckets.length <= 1) return list.slice();
  var out = [], remaining = list.length;
  while (remaining > 0) {
    for (var b = 0; b < buckets.length; b++) {
      if (buckets[b].length) { out.push(buckets[b].shift()); remaining--; }
    }
  }
  return out;
}

function fsrsComputeTodayQueue() {
  var plan = examSchedulePlan();
  var due = S.cards.filter(function(c) { return !isCardSuspended(c) && c.fsrs && fsrsIsDue(c.fsrs); });
  due.sort(function(a, b) { return new Date(a.fsrs.due) - new Date(b.fsrs.due); });
  // Interleave the due set by topic (research-backed); new/leech tail stays appended.
  due = _interleaveByTopic(due, function(c) { return (c.topic || '').toLowerCase(); });
  var neverReviewed = S.cards.filter(function(c) { return !isCardSuspended(c) && (!c.fsrs || !c.fsrs.reps); });
  // Deprioritize new cards that are flagged as leeches (they should be handled explicitly)
  var normalNew = neverReviewed.filter(function(c) { return !c.leech; });
  var leechNew = neverReviewed.filter(function(c) { return !!c.leech; });
  var cap = plan.cram && due.length ? 0 : plan.cap;
  return due.concat(normalNew.slice(0, cap)).concat(leechNew).map(function(c) { return c.id; });
}

async function rateCard(cardId, ratingNum) {
  var lib = fsrsLib();
  if (!lib) { toast('FSRS library not loaded yet — reload the page'); return; }
  var card = S.cards.find(function(c) { return c.id === cardId; });
  if (!card) return;
  try {
    var f = lib.fsrs(lib.generatorParameters());
    var fsrsCard = card.fsrs || lib.createEmptyCard();
    var ratingMap = [null, lib.Rating.Again, lib.Rating.Hard, lib.Rating.Good, lib.Rating.Easy];
    var out = f.next(fsrsCard, new Date(), ratingMap[ratingNum]);
    S.cards = S.cards.map(function(c) {
      var updated = c.id === cardId ? Object.assign({}, c, { fsrs: out.card }) : c;
      if (updated.id === cardId && fsrsLapses(updated) >= 4) updated.leech = true;
      return updated;
    });
    var review = {
      id: String(Date.now()) + String(Math.random()).slice(2),
      cardId: cardId, rating: ratingNum,
      ts: new Date().toISOString(), state: out.card.state,
    };
    await _dbAddReview(review);
    recordStreak();
    saveCards();
    if (S.todayActive && S.todayStats) {
      S.todayStats.cards++;
      var curItem = S.todayQ[S.todayIdx];
      if (ratingNum === 1 && curItem && !curItem.consolidation) {
        S.todayStats.again++;
        S.todayStats.missed.push({ type: 'card', consolidation: true, id: cardId });
      }
    }
    if (S.todayActive) { S.todayIdx++; S.todayFlipped = false; _todayMaybeConsolidate(); }
    render();
  } catch(e) {
    toast('Rating error: ' + e.message);
  }
}

function _todayBuildMixedQueue(cardItems, quizItems) {
  if (!quizItems.length) return cardItems;
  if (!cardItems.length) return quizItems;
  var result = [];
  var step = Math.max(2, Math.ceil(cardItems.length / (quizItems.length + 1)));
  var qi = 0;
  cardItems.forEach(function(item, i) {
    result.push(item);
    if ((i + 1) % step === 0 && qi < quizItems.length) result.push(quizItems[qi++]);
  });
  while (qi < quizItems.length) result.push(quizItems[qi++]);
  return result;
}

  var sectionTitles = ctx.sections ? ctx.sections.map(function(s) { return s.title; }).filter(function(t, i, a) { return a.indexOf(t) === i; }) : [];
  var topicConstraint = sectionTitles.length
    ? '\n\nFor the "topic" field, use ONLY one of these section headings (exact text): ' + sectionTitles.slice(0, 20).map(function(t) { return '"' + t + '"'; }).join(', ') + '.'
    : '';
  var count = N + 1;
  var items = _validateAndFixSections(await genStructured({
    sys: 'Generate exactly ' + count + ' quiz questions specifically targeting these weak topics: ' + topicStr + '. Reply ONLY with a valid JSON array:\n[{"question":"...","hint":"short nudge","answer":"model answer","topic":"one of the given topics","sourceSection":"exact section heading"}]' + topicConstraint,
    user: 'Study scope: ' + ctx.label + '\n\nStudy material:\n' + contextText(ctx.text),

// Focus-session sizes (total item cap). A bounded session prevents endless
// grinding and supports planning — both improve adherence and retention.
var FOCUS_SIZES = { quick: 8, standard: 16, deep: 30 };

async function startTodaySession(size) {
  size = FOCUS_SIZES[size] ? size : 'standard';
  var cap = FOCUS_SIZES[size];
  S.todayQ = []; S.todayIdx = 0; S.todayFlipped = false; S.todayActive = false;
  S.todayAns = ''; S.todayResult = null; S.todayGrading = null; S.todayBuilding = true;
  render();

  // Reserve ~1/3 of the budget for active-recall questions, the rest for spaced review.
  var qBudget = Math.max(1, Math.min(4, Math.round(cap / 5)));
  var cardItems = fsrsComputeTodayQueue().slice(0, cap).map(function(id) { return { type: 'card', id: id }; });
  var quizItems = [];
  var insights = getAnalyticsInsights();
  if (S.docs.length && hasKey(getActiveModel().prov)) {
    var N = insights.weakTopics.length ? Math.min(qBudget, insights.weakTopics.length) : 0;
    if (N) { try { quizItems = await _generateWeakTopicQs(N); } catch(e) {} }
  }
  // Keep the whole session within the chosen size.
  var room = Math.max(0, cap - quizItems.length);
  cardItems = cardItems.slice(0, room);
  var queue = quizItems.length ? _todayBuildMixedQueue(cardItems, quizItems) : cardItems;

  S.todayStats = {
    start: Date.now(), size: size, mainLen: queue.length,
    quiz: [], cards: 0, again: 0, missed: [], byTopic: {}, consolidationAdded: false,
  };
  S.todayQ = queue;
  S.todayBuilding = false;
  S.todayActive = true;
  render();
}

function endTodaySession() {
  S.todayActive = false; S.todayQ = []; S.todayIdx = 0; S.todayFlipped = false;
  S.todayAns = ''; S.todayResult = null; S.todayGrading = null; S.todayStats = null;
  render();
}

// When the main queue is exhausted, append a corrective re-test of everything

function _todayMaybeConsolidate() {
  var st = S.todayStats; if (!st) return;
  if (S.todayIdx < S.todayQ.length) return;
  if (st.consolidationAdded || !st.missed.length) return;
  st.consolidationAdded = true;
  S.todayQ = S.todayQ.concat(st.missed);
  S.todayAns = ''; S.todayResult = null; S.todayGrading = null; S.missedQOffer = null;
  toast('Consolidation round — retrying ' + st.missed.length + ' missed item' + (st.missed.length > 1 ? 's' : ''));
}

async function todaySubmitQ() {
  var ta = document.getElementById('today-q-ans');
  var a = ta ? ta.value.trim() : '';
  if (!a) return;
  S.todayAns = a;
  var item = S.todayQ[S.todayIdx];
  if (!item || item.type !== 'quiz') return;
  var q = item.q;
  // Fast JS path for cloze questions (no LLM needed)
  if (q.type === 'cloze') {
    var clozeResult = gradeCloze(q, a);
    S.todayGrading = null;
    S.todayResult = clozeResult;
    _recordQuizAttempt(q, a, clozeResult);
    _recordTodaySessionQuiz(q, clozeResult);
    var csc = clozeResult.score;
    if (csc === 0) { S.missedQOffer = null; _autoAddMissedCard(q, clozeResult); }
    else if (csc === 1) { S.missedQOffer = _buildMissedCardData(q, clozeResult); }
    else { S.missedQOffer = null; }
    render(); return;
  }
  // Fast JS path for numeric answers
  var autoResult = _tryNumericGrade(q, a);
  if (autoResult) {
    S.todayGrading = null;
    S.todayResult = autoResult;
    _recordQuizAttempt(q, a, autoResult);
    _recordTodaySessionQuiz(q, autoResult);
    var sc2 = autoResult.score;
    if (sc2 === 0) { S.missedQOffer = null; _autoAddMissedCard(q, autoResult); }
    else if (sc2 === 1) { S.missedQOffer = _buildMissedCardData(q, autoResult); }
    else { S.missedQOffer = null; }
    render(); return;
  }
  S.todayGrading = { text: '' };
  render();
  showSpin('Evaluating answer…');
  try {
    var raw = await streamGrade(q, a, function(full) {
      S.todayGrading.text = full;
      var el = document.getElementById('today-grade-stream');
      if (el) {
        el.innerHTML = esc(extractStreamFeedback(full) || '•••');
        clearTimeout(_mathStreamTimer);
        _mathStreamTimer = setTimeout(function() {
          if (window.renderMathInElement && el.parentNode) { try { renderMathInElement(el, _katexOpts); } catch(e) {} }
        }, 120);
      }
    });
    S.todayGrading = null;
    S.todayResult = pj(raw);
    _recordQuizAttempt(q, a, S.todayResult);
    _recordTodaySessionQuiz(q, S.todayResult);
    var sc = S.todayResult.score;
    if (sc === 0) { S.missedQOffer = null; _autoAddMissedCard(q, S.todayResult); }
    else if (sc === 1) { S.missedQOffer = _buildMissedCardData(q, S.todayResult); }
    else { S.missedQOffer = null; }
  } catch(e) {
    S.todayGrading = null;
    if (e.name === 'AbortError') {
      toast('Evaluation cancelled.');
      S.todayResult = null;
    } else {
      S.todayResult = { correct: false, score: 0, feedback: 'Evaluation error: ' + e.message, modelAnswer: q.answer };
    }
  } finally {
    hideSpin();
    render();
  }
}

function headingMatches(text) {
  var out = [], offset = 0;
  text.split('\n').forEach(function(raw) {
    var s = raw.trim(), m, level = 0, title = '';
    if ((m = s.match(/^(#{1,6})\s+(.+?)\s*#*$/))) { level = m[1].length; title = m[2]; }
    else if ((m = s.match(/^((?:\d+\.)+\d*|\d+)[.)]?\s+(.{3,100})$/))) { level = Math.min(4, m[1].split('.').filter(Boolean).length + 1); title = m[2]; }
    else if ((m = s.match(/^(chapter|section|unit|part)\s+\w+[:.)-]?\s+(.{3,100})$/i))) { level = /chapter|unit|part/i.test(m[1]) ? 1 : 2; title = m[0]; }
    else if (/^[A-Z][A-Z0-9 ,:;()/-]{4,80}$/.test(s) && s.split(/\s+/).length <= 10) { level = 2; title = s; }
    if (level && title) out.push({ index:offset, rawLen:raw.length, level:level, title:title.trim() });
    offset += raw.length + 1;
  });
  return out;
}

function quizQuestionCount(text) {
  var words = (text.match(/\b[\w'-]+\b/g) || []).length;
  var headings = (text.match(/^#{1,6}\s+|\n#{1,6}\s+/g) || []).length;
  var math = (text.match(/\$\$|\\\(|\\\[|\\begin\{|[∫∑√≈≤≥∞]/g) || []).length;
  var chars = text.length;
  var score = Math.floor(words / 650) + Math.floor(chars / 9000) + Math.floor(headings / 5) + Math.floor(math / 10) + Math.max(0, S.docs.length - 1);
  return Math.max(5, Math.min(16, 5 + score));
}

// ════════════════════════════════════════════
// FORCE LAYOUT
// ════════════════════════════════════════════
function forceLayout(nodes, edges, W, H) {
  W = W || 680; H = H || 460;
  nodes = nodes.map(function(n, i) {
    return Object.assign({}, n, {
      x: W/2 + 210 * Math.cos(2*Math.PI*i/nodes.length - Math.PI/2),
      y: H/2 + 155 * Math.sin(2*Math.PI*i/nodes.length - Math.PI/2),
    });
  });
  var k = Math.sqrt(W * H / Math.max(nodes.length, 1)) * 0.6;
  for (var it = 0; it < 90; it++) {
    var fx = nodes.map(function() { return 0; });
    var fy = nodes.map(function() { return 0; });
    for (var i = 0; i < nodes.length; i++) {
      for (var j = i+1; j < nodes.length; j++) {
        var dx = nodes[j].x - nodes[i].x || 0.1;
        var dy = nodes[j].y - nodes[i].y || 0.1;
        var d = Math.hypot(dx, dy);
        var f = k*k / (d*d);
        fx[i] -= f*dx; fy[i] -= f*dy;
        fx[j] += f*dx; fy[j] += f*dy;
      }
    }
    edges.forEach(function(e) {
      var si = nodes.findIndex(function(n) { return n.id === e.source; });
      var ti = nodes.findIndex(function(n) { return n.id === e.target; });
      if (si < 0 || ti < 0) return;
      var dx = nodes[ti].x - nodes[si].x;
      var dy = nodes[ti].y - nodes[si].y;
      var d = Math.hypot(dx, dy) || 1;
      var f = d / k * 0.25;
      fx[si] += f*dx/d; fy[si] += f*dy/d;
      fx[ti] -= f*dx/d; fy[ti] -= f*dy/d;
    });
    nodes.forEach(function(n, i) {
      n.x = Math.max(82, Math.min(W-82, n.x + fx[i]*0.55));
      n.y = Math.max(52, Math.min(H-52, n.y + fy[i]*0.55));
    });
  }
  return nodes;
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function updateMapSize() {
  var view = document.getElementById('view');
  if (!view) return;
  var width = clamp(view.clientWidth - 48, 560, 860);
  var height = clamp(Math.round(width * 0.68), 380, 560);
  S.mapSize = { w: width, h: height };
}
