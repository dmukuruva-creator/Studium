async function runDiagnostics() {
  S.diag = { running: true, checks: null }; render();
  var checks = [];
  function add(label, state, detail) { checks.push({ label: label, state: state, detail: detail || '' }); }

  // 1) Local helper / server reachable
  try {
    var r = await fetch('/keychain/status', { method: 'GET' });
    add('Local helper (server)', r.ok ? 'ok' : 'bad', r.ok ? 'reachable' : 'HTTP ' + r.status);
  } catch (e) { add('Local helper (server)', 'bad', 'unreachable — launch via Studium.command'); }

  // 2) API keys configured
  var provs = [['anthropic', 'Anthropic'], ['openai', 'OpenAI'], ['google', 'Google'], ['openai-compatible', 'OpenAI-compatible']];
  var keyed = provs.filter(function (p) { return hasKey(p[0]); });
  add('API keys configured', keyed.length ? 'ok' : 'warn',
      keyed.length ? keyed.map(function (p) { return p[1]; }).join(', ') : 'none — add one to generate/grade');

  // 3) Model IDs validated against the live provider lists
  try {
    await validateModels();
    var active = getActiveModel();
    var dead = isModelDead(active);
    add('Active model', dead ? 'warn' : 'ok', (active ? active.name : '—') + (dead ? ' — not in live list' : ''));
  } catch (e) { add('Active model', 'warn', 'could not validate (offline?)'); }

  // 4) Storage headroom
  try {
    if (navigator.storage && navigator.storage.estimate) {
      var est = await navigator.storage.estimate();
      var usedMB = (est.usage || 0) / 1048576, quotaMB = (est.quota || 0) / 1048576;
      var pct = quotaMB ? Math.round(usedMB / quotaMB * 100) : 0;
      add('Storage', pct > 90 ? 'warn' : 'ok', usedMB.toFixed(1) + ' MB used (' + pct + '% of quota)');
    } else { add('Storage', 'ok', 'usage API unavailable'); }
  } catch (e) { add('Storage', 'warn', 'estimate failed'); }

  // 5) Your data
  var due = S.cards.filter(function (c) { return !isCardSuspended(c) && c.fsrs && fsrsIsDue(c.fsrs); }).length;
  var bankQs = S.quantBanks.reduce(function (n, b) { return n + b.items.length; }, 0);
  add('Library', 'ok', S.docs.length + ' docs · ' + S.cards.length + ' cards (' + due + ' due) · ' + S.hist.length + ' history');
  add('Quant banks', 'ok', S.quantBanks.length + ' bank' + (S.quantBanks.length === 1 ? '' : 's') + ' · ' + bankQs + ' questions');

  // 6) Offline graders self-test (deterministic — the instant-feedback core)
  var gp = 0, gt = 0;
  function gtest(c) { gt++; if (c) gp++; }
  try {
    gtest(gradeCloze({ blank: 'x' }, ' X ').score === 3);
    gtest(_tryNumericGrade({ answer: '42' }, '42').score === 3);
    gtest(_tryNumericGrade({ answer: 'word' }, 'x') === null);
    gtest(gradeQuantAnswer({ a: '2491' }, '2491').correct === true);
    gtest(gradeQuantAnswer({ a: '1/6' }, '0.1667').correct === true);
    gtest(parseQuantBank('a | 1\nb | 2').length === 2);
    // structured metadata is preserved (Quant Prep Problem Bank schema) and tag-filtering works
    var _qm = parseQuantBank('[{"q":"x","a":"1","difficulty":"Hard","topic":"Probability","companies":["Jane Street"],"tracks":["trader"]}]');
    gtest(_qm.length === 1 && _qm[0].difficulty === 'Hard' && _qm[0].companies[0] === 'Jane Street');
    gtest(_itemMatchesFilter(_qm[0], { difficulty: 'Hard', firm: 'Jane Street' }) === true);
    gtest(_itemMatchesFilter(_qm[0], { difficulty: 'Easy' }) === false);
    gtest(parseQuantBank('[{"q":"x","a":"1"}]')[0].difficulty === undefined); // plain Q/A unchanged
    gtest(_interleaveByTopic([{ t: 'a' }, { t: 'a' }, { t: 'b' }], function (x) { return x.t; }).length === 3);
    // prep schedule overlay: 12 strictly-ordered weeks; _prepToday returns a valid state
    gtest(PREP_SCHEDULE.length === 12);
    gtest((function () { for (var i = 1; i < PREP_SCHEDULE.length; i++) { if (_prepMs(PREP_SCHEDULE[i].start) <= _prepMs(PREP_SCHEDULE[i - 1].start)) return false; } return true; })());
    gtest(['pre', 'active', 'post'].indexOf(_prepToday().state) >= 0);
    // prep assistant: perf aggregation + assessment return well-formed shapes without throwing
    gtest(typeof _prepPerf().sessions === 'number');
    gtest(Array.isArray(_prepAssess().recs) && Array.isArray(_prepAssess().pivots));
    // speed-gate targets ramp correctly; Figgie has no fixed target
    gtest(_speedTarget('zetamac', 4) === 40 && _speedTarget('optiver', 6) === 56 && _speedTarget('figgie', 1) === null);
    gtest(typeof _speedPerf() === 'object');
  } catch (e) { /* counted as failures below */ }
  add('Offline graders self-test', gp === gt ? 'ok' : 'bad', gp + '/' + gt + ' passing');

  S.diag = { running: false, ts: Date.now(), checks: checks };
  render();
}

// Pick the highest-impact session for the user's current state, with a plain
// reason grounded in learning science. Goal: comprehension, grades, and skill.
function recommendSession() {
  if (!S.docs.length) return null;
  var plan = examSchedulePlan();
  var due = S.cards.filter(function(c) { return !isCardSuspended(c) && c.fsrs && fsrsIsDue(c.fsrs); }).length;
  var insights = getAnalyticsInsights();
  var weak = insights.weakTopics || [];
  var readiness = (plan.days !== null) ? computeReadiness() : null;
  var secs = []; try { secs = studySections(); } catch (e) {}
  var cov = S.coverage || {};
  var untested = secs.filter(function(s) { var c = cov[s.title]; return !c || ((c.quizzed || 0) === 0 && (c.carded || 0) === 0); }).length;
  var dayWord = function(n) { return n + ' day' + (n === 1 ? '' : 's'); };

  // 1 — Exam imminent: test under real conditions, but clear a big spaced backlog first.
  if (plan.days !== null && plan.days <= 7) {
    if (due >= 15) return { id: 'review', reason: 'Your exam is in ' + dayWord(Math.max(0, plan.days)) + ' and ' + due + ' cards are due. Clear the spaced-review backlog first so nothing you already learned slips before the test.', cta: 'Start review' };
    return { id: 'exam', reason: 'Your exam is in ' + dayWord(Math.max(0, plan.days)) + (readiness ? ' and readiness is ' + readiness.pct + '%' : '') + '. A timed mock under real conditions is the most effective way to find and fix what will cost you marks — testing yourself beats re-reading (the testing effect).', cta: 'Start mock exam' };
  }
  // 2 — Due backlog: spaced retrieval is the highest-yield daily action.
  if (due >= 5) {
    return { id: 'review', reason: due + ' cards are due. Reviewing them right as you’re about to forget locks them in for the least effort — the spacing effect is the backbone of durable memory.', cta: 'Start review' };
  }
  // 3 — Un-studied material: comprehension must precede retrieval.
  if (untested >= 1 && due < 5) {
    return { id: 'learn', reason: 'You have ' + untested + ' section' + (untested === 1 ? '' : 's') + ' you haven’t worked through yet. Build understanding first with a grounded study guide — you can’t recall what you never encoded.', cta: 'Start learning' };
  }
  // 4 — One stubborn weak topic: self-explanation repairs deep gaps.
  if (weak.length && (weak.length === 1 || weak[0].accuracy < 40)) {
    return { id: 'explain', reason: 'You’re weakest on ' + esc(weak[0].topic) + ' (' + weak[0].accuracy + '%). Explaining it in your own words is the fastest way to expose and patch the gap — the Feynman technique.', cta: 'Explain it back' };
  }
  // 5 — Several weak topics: targeted retrieval practice builds breadth.
  if (weak.length >= 2) {
    return { id: 'drill', reason: 'You’re shaky on ' + weak.slice(0, 3).map(function(w) { return esc(w.topic); }).join(', ') + '. Pulling answers from memory (retrieval practice) turns weak topics solid far faster than re-reading.', cta: 'Start drilling' };
  }
  // 6 — Caught up: extend coverage, else keep retrieval sharp.
  if (untested >= 1) return { id: 'learn', reason: 'You’re caught up on review. Extend your coverage by working through new material while it’s fresh.', cta: 'Learn something new' };
  if (S.cards.length) return { id: 'exam', reason: 'You’re caught up. A quick timed test keeps retrieval sharp and proves you can perform under pressure, not just recognize the material.', cta: 'Test yourself' };
  return { id: 'review', reason: 'Generate a few flashcards in Library, then come back — daily spaced review is what makes it stick.', cta: 'Start review' };
}

// ════════════════════════════════════════════
// QUANT DRILL — rapid-fire practice over your own question banks
// True to Studium: grounded in YOUR bank, instant deterministic grading
// (no LLM, so it feels instant), bounded sessions, and weak items resurface
// in the FSRS review deck — the spaced-repetition edge over tradermath et al.
// ════════════════════════════════════════════
var _quantTimer = null;

function saveQuantBanks() { lsSet('sd_quantbanks', S.quantBanks); }

// Parse "answer-like" text to a number: integers, decimals, fractions (a/b),
// and percents (50% -> 0.5). Returns null for non-numeric input.
function _quantToNumber(s) {
  s = String(s == null ? '' : s).trim().replace(/,/g, '').replace(/\s+/g, '');
  if (!s) return null;
  var pct = false;
  if (s.charAt(s.length - 1) === '%') { pct = true; s = s.slice(0, -1); }
  var frac = s.match(/^([-+]?\d*\.?\d+)\/([-+]?\d*\.?\d+)$/);
  var n;
  if (frac) { var d = parseFloat(frac[2]); if (!d) return null; n = parseFloat(frac[1]) / d; }
  else if (/^[-+]?\d*\.?\d+$/.test(s)) { n = parseFloat(s); }
  else return null;
  if (isNaN(n)) return null;
  return pct ? n / 100 : n;
}

function _quantNumberCandidates(s) {
  s = String(s == null ? '' : s);
  var normalized = s
    // \frac/\tfrac/\dfrac -> a/b, accepting BOTH braced {a}{b} and TeX braceless
    // single-token shorthand (\tfrac13, \tfrac1{10}) — the bank uses both, and
    // leaving braceless forms unexpanded mangles the expected answer into a bogus
    // integer (\tfrac13 -> "13"), silently failing correct fraction answers.
    .replace(/\\(?:dfrac|tfrac|frac)\s*(?:\{([^{}]+)\}|(\d))\s*(?:\{([^{}]+)\}|(\d))/g,
      function(_m, b1, d1, b2, d2) { return (b1 || d1) + '/' + (b2 || d2); })
    .replace(/\\%/g, '%')
    .replace(/\$/g, ' ');
  var zones = [];
  var answerish = normalized.match(/(?:answer|ans\.?|therefore|thus|so|hence|fair price|break-even)[\s:.]*([\s\S]{0,220})/i);
  if (answerish) zones.push(answerish[1]);
  zones.push(normalized);
  var seen = {}, out = [];
  zones.forEach(function(zone) {
    var re = /[-+]?\d+(?:,\d{3})*(?:\.\d+)?\s*\/\s*[-+]?\d+(?:,\d{3})*(?:\.\d+)?|[-+]?\d+(?:,\d{3})*(?:\.\d+)?%?/g;
    var m;
    while ((m = re.exec(zone))) {
      var raw = m[0].replace(/\s+/g, '');
      if (!seen[raw]) { seen[raw] = 1; out.push(raw); }
    }
  });
  return out;
}

function _quantTextContainsAnswer(expected, answer) {
  var a = _normalizeCloze(answer);
  if (a.length < 2) return false;
  var e = _normalizeCloze(expected);
  if (a.length <= 3) return new RegExp('(^|\\s)' + a.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '(\\s|$)').test(e);
  return e.indexOf(a) >= 0;
}

// Grade a quant answer. Integers require an exact match (arithmetic); answers
// written with a decimal, fraction, or percent allow a small relative tolerance
// (rounding). Falls back to normalized string match for word answers.
function gradeQuantAnswer(item, answer) {
  var expected = item && item.a != null ? String(item.a) : '';
  var sn = _quantToNumber(answer), en = _quantToNumber(expected);
  if (sn != null && en != null) {
    var tolerant = /[.\/%]/.test(expected) || /[.\/%]/.test(String(answer));
    var ok = Math.abs(en) < 1e-9
      ? Math.abs(sn) < 1e-6
      : (tolerant ? Math.abs(sn - en) / Math.abs(en) < 0.005 : Math.abs(sn - en) < 1e-9);
    return { correct: ok, expected: expected };
  }
  if (sn != null && en == null) {
    var cands = _quantNumberCandidates(expected);
    for (var i = 0; i < cands.length; i++) {
      var cn = _quantToNumber(cands[i]);
      if (cn == null) continue;
      var tolerantCand = /[.\/%]/.test(cands[i]) || /[.\/%]/.test(String(answer));
      var okCand = Math.abs(cn) < 1e-9
        ? Math.abs(sn) < 1e-6
        : (tolerantCand ? Math.abs(sn - cn) / Math.abs(cn) < 0.005 : Math.abs(sn - cn) < 1e-9);
      if (okCand) return { correct: true, expected: expected, matched: cands[i] };
    }
  }
  var exact = _normalizeCloze(answer) === _normalizeCloze(expected);
  return { correct: exact || _quantTextContainsAnswer(expected, answer), expected: expected };
}

function _quantList(v) {
  if (Array.isArray(v)) return v.map(function(s) { return String(s).trim(); }).filter(Boolean);
  if (typeof v === 'string' && v.trim()) return v.split(',').map(function(s) { return s.trim(); }).filter(Boolean);
  return null;
}

function _quantItemFromObject(o) {
  if (o == null || typeof o !== 'object') return null;
  var q = o.q != null ? o.q : (o.question != null ? o.question : o.prompt);
  var a = o.a != null ? o.a : (o.answer != null ? o.answer : o.solution);
  if (q == null || a == null || String(a).trim() === '') return null;
  var it = { q: String(q).trim(), a: String(a).trim() };
  // Preserve structured metadata when present (Quant Prep Problem Bank schema)
  // so banks can be filtered in-app by difficulty / topic / firm / track.
  if (o.id != null) it.id = String(o.id).trim();
  if (o.topic != null && String(o.topic).trim()) it.topic = String(o.topic).trim();
  if (o.difficulty != null && String(o.difficulty).trim()) it.difficulty = String(o.difficulty).trim();
  if (o.source != null && String(o.source).trim()) it.source = String(o.source).trim();
  if (o.reference != null && String(o.reference).trim()) it.reference = String(o.reference).trim();
  if (o.solution != null && String(o.solution).trim()) it.solution = String(o.solution).trim();
  var comp = _quantList(o.companies); if (comp && comp.length) it.companies = comp;
  var trk = _quantList(o.tracks); if (trk && trk.length) it.tracks = trk;
  return it.q ? it : null;
}

function _parseQuantCsv(text) {
  var rows = [], row = [], cell = '', quoted = false;
  for (var i = 0; i < text.length; i++) {
    var ch = text[i], next = text[i + 1];
    if (quoted) {
      if (ch === '"' && next === '"') { cell += '"'; i++; }
      else if (ch === '"') quoted = false;
      else cell += ch;
    } else if (ch === '"') quoted = true;
    else if (ch === ',') { row.push(cell); cell = ''; }
    else if (ch === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
    else if (ch !== '\r') cell += ch;
  }
  row.push(cell); rows.push(row);
  if (!rows.length) return [];
  var header = rows.shift().map(function(h) { return String(h || '').trim().toLowerCase(); });
  if (header.indexOf('question') < 0 && header.indexOf('q') < 0) return [];
  return rows.map(function(r) {
    var o = {};
    header.forEach(function(h, i) { o[h] = r[i] == null ? '' : r[i]; });
    return _quantItemFromObject(o);
  }).filter(Boolean);
}

// Parse a pasted bank into [{q,a}]. Accepts JSON, "Q:/A:" blocks, or lines
// delimited by tab, |, ::, =>, or →. (Comma is intentionally NOT a delimiter —
// questions often contain commas.)
function parseQuantBank(text) {
  text = String(text || '').trim();
  if (!text) return [];
  if (text[0] === '[' || text[0] === '{') {
    try {
      var arr = JSON.parse(text);
      if (!Array.isArray(arr)) arr = [arr];
      var out = arr.map(_quantItemFromObject).filter(Boolean);
      if (out.length) return out;
    } catch (e) { /* fall through */ }
  }
  if (/^\s*\{/.test(text) && /\n\s*\{/.test(text)) {
    var jsonl = [];
    text.split(/\r?\n/).forEach(function(line) {
      line = line.trim();
      if (!line) return;
      try { var it = _quantItemFromObject(JSON.parse(line)); if (it) jsonl.push(it); } catch (e) {}
    });
    if (jsonl.length) return jsonl;
  }
  if (/^\s*(id|q|question|prompt)\s*,/i.test(text)) {
    var csv = _parseQuantCsv(text);
    if (csv.length) return csv;
  }
  if (/(^|\n)\s*Q[:.\)]/i.test(text) && /(^|\n)\s*A[:.\)]/i.test(text)) {
    var pairs = [], curQ = null;
    text.split(/\r?\n/).forEach(function(line) {
      var mq = line.match(/^\s*Q[:.\)]\s*(.*)$/i);
      var ma = line.match(/^\s*A[:.\)]\s*(.*)$/i);
      if (mq) curQ = mq[1].trim();
      else if (ma && curQ != null) { pairs.push({ q: curQ, a: ma[1].trim() }); curQ = null; }
    });
    pairs = pairs.filter(function(p) { return p.q && p.a !== ''; });
    if (pairs.length) return pairs;
  }
  var DELIMS = ['\t', '|', '::', '=>', '→'];
  var rows = [];
  text.split(/\r?\n/).forEach(function(line) {
    line = line.trim();
    if (!line) return;
    for (var i = 0; i < DELIMS.length; i++) {
      var idx = line.indexOf(DELIMS[i]);
      if (idx > 0) {
        var q = line.slice(0, idx).trim().replace(/^["']|["']$/g, '');
        var a = line.slice(idx + DELIMS[i].length).trim().replace(/^["']|["']$/g, '');
        if (q && a) rows.push({ q: q, a: a });
        return;
      }
    }
  });
  return rows;
}

// Weighted next-item pick. Two layers:
//   1. Show every item ONCE before repeating any — restrict the draw to items not
//      yet shown *this session* (st.sessionSeen) while any remain. This is what
//      stops "why am I seeing this again" mid-drill; only after the whole (filtered)
//      pool is exhausted does it recycle.
//   2. Within that set, weight by history: never-attempted (ever) first, missed
//      resurface more, mastered (2+ correct streak — carried across sessions via
//      seeded stats) fade out. Never repeat the immediately-previous item.
function _quantPickNext(sess) {
  var items = sess.items, n = items.length;
  if (n <= 1) return 0;
  var stats = sess.stats || {};
  var unseenPool = false;
  for (var k = 0; k < n; k++) { if (k !== sess.idx && !(stats[k] && stats[k].sessionSeen)) { unseenPool = true; break; } }
  var weights = items.map(function(_, i) {
    if (i === sess.idx) return 0;                                  // never immediately-previous
    var st = stats[i] || { seen: 0, wrong: 0, streak: 0 };
    if (unseenPool && st.sessionSeen) return 0;                    // hold seen-this-session until pool drains
    if (st.seen === 0) return 2.0;                                 // never attempted, ever — learn it
    if (st.streak >= 2) return 0.25;                               // mastered — fade out
    return 1 + (st.wrong || 0) * 1.5;                              // resurface missed more
  });
  var total = weights.reduce(function(a, b) { return a + b; }, 0);
  if (total <= 0) { return (sess.idx + 1) % n; }
  var r = Math.random() * total;
  for (var i = 0; i < n; i++) { r -= weights[i]; if (r <= 0) return i; }
  return n - 1;
}

// Stable identity for a bank item so per-question progress survives across drills
// and bank re-imports (id when the bank has one, else a normalized question stem).
function _quantItemKey(item) {
  if (item && item.id != null && String(item.id).trim()) return 'id:' + String(item.id).trim();
  return 'q:' + _normalizeCloze(String((item && item.q) || '')).slice(0, 80);
}
function saveQuantItemStats() { lsSet('sd_quantitemstats', S.quantItemStats); }
// Record one attempt into the persistent per-question memory. outcome: 'correct'
// | 'wrong' | 'skip'. Mastery streak grows on correct, breaks otherwise.
function _recordQuantItemStat(item, outcome) {
  if (!item) return;
  var m = S.quantItemStats || (S.quantItemStats = {});
  var key = _quantItemKey(item);
  var p = m[key] || (m[key] = { seen: 0, correct: 0, wrong: 0, streak: 0, lastTs: 0 });
  p.seen++; p.lastTs = Date.now();
  if (outcome === 'correct') { p.correct++; p.streak = (p.streak || 0) + 1; }
  else if (outcome === 'wrong') { p.wrong++; p.streak = 0; }
  else { p.streak = 0; }
  saveQuantItemStats();
}

function _fmtMMSS(sec) {
  sec = Math.max(0, Math.floor(sec));
  return Math.floor(sec / 60) + ':' + ('0' + (sec % 60)).slice(-2);
}

function _quantTopicHint(item) {
  var topic = String((item && item.topic) || '').toLowerCase();
  var src = String((item && item.source) || '').toLowerCase();
  if (/bayes|conditional/.test(topic)) return 'Name the conditioning event first, then write numerator over total probability. Keep base rates visible.';
  if (/expected|ev|lotus/.test(topic + ' ' + src)) return 'Look for linearity or tail-sum before doing casework. Define the random variable and compute expectation, not every outcome.';
  if (/combin|count|permutation|paths/.test(topic)) return 'Count the unconstrained space and the constrained space with the same unit. If order matters in one, it must matter in both.';
  if (/markov|state|random walk/.test(topic)) return 'Choose a small state variable, write first-step equations, and solve for the target state.';
  if (/game|market|poker|bet/.test(topic)) return 'Compare expected values under each action. Work backward if later choices depend on earlier ones.';
  if (/sequence|speed|iq/.test(topic + ' ' + src)) return 'Test simple differences, ratios, interleaving, powers, and letter positions before reaching for a complex pattern.';
  if (/statistics|inference|normal|binomial/.test(topic)) return 'Identify the distribution and parameter first. Then choose exact, approximation, or conditioning.';
  if (/option|greek|finance/.test(topic + ' ' + src)) return 'Translate the payoff into states, then reason with replication, no-arbitrage, or expected payoff under the stated measure.';
  return 'Clarify what is being asked, name the unknown, and try a smaller version or symmetry before calculating.';
}

function _quantConfidenceLabel(v) {
  return v === 'sure' ? 'Sure' : v === 'guess' ? 'Guess' : 'Unsure';
}

function _quantSkillScore(row) {
  if (!row || !row.seen) return 100;
  var acc = row.correct / row.seen;
  var avgSec = row.avgSec || 0;
  var unsureRate = row.unsure ? row.unsure / row.seen : 0;
  var skipRate = row.skips ? row.skips / Math.max(1, row.seen + row.skips) : 0;
  return Math.round(acc * 100 - Math.min(25, avgSec / 3) - unsureRate * 18 - skipRate * 12);
}

// Accuracy trajectory for one topic: later-half accuracy minus earlier-half, in
// points. Positive = improving, negative = slipping. Needs ≥2 sessions and a
// non-trivial sample so a single lucky/unlucky set can't masquerade as a trend.
function _quantTrend(hist) {
  if (!hist || hist.length < 2) return null;
  var totSeen = hist.reduce(function (n, h) { return n + (h.seen || 0); }, 0);
  if (totSeen < 6) return null;
  var half = Math.floor(hist.length / 2);
  var accOf = function (arr) {
    var s = 0, c = 0;
    arr.forEach(function (h) { s += h.seen || 0; c += h.correct || 0; });
    return s ? c / s * 100 : null;
  };
  var early = accOf(hist.slice(0, half)), late = accOf(hist.slice(half));
  if (early === null || late === null) return null;
  return Math.round(late - early);
}

// Single study-priority score per topic = IMPACT (distance from interview-ready)
// amplified by URGENCY (decay since last drill, a downward trend, and confident
// misses — the costliest failure mode under interview pressure). Returns the
// score, a one-line "why now", and an `urgent` flag for at-a-glance triage.
function _quantPriority(row) {
  if (!row || !row.seen) return { score: 0, reason: '', urgent: false };
  var skill = (row.skill == null) ? 100 : row.skill;
  var score = Math.max(0, 85 - skill); // impact: gap to interview-ready
  var factors = [], urgent = false;
  if (row.daysSince != null && row.daysSince >= 7) {
    score += Math.min(30, (row.daysSince - 3) * 2);
    factors.push('stale ' + row.daysSince + 'd');
    urgent = true;
  }
  if (row.trend != null && row.trend <= -8) {
    score += 18; factors.push('slipping ' + row.trend + ' pts'); urgent = true;
  } else if (row.trend != null && row.trend >= 10) {
    score = Math.max(0, score - 6); // improving — ease off
  }
  if (row.wrongSure) {
    score += Math.min(24, row.wrongSure * 8);
    factors.push(row.wrongSure + ' confident miss' + (row.wrongSure > 1 ? 'es' : ''));
    urgent = true;
  }
  if ((row.acc != null && row.acc < 60) || skill < 55) urgent = true;
  if (row.seen < 5) factors.push('thin sample');
  return { score: Math.round(score), reason: factors.join(' · '), urgent: urgent };
}

// Distinct, drillable topic tags across every loaded bank (excludes the
// catch-all buckets). This is the topic universe coverage is measured against.
function _quantBankTopics() {
  var set = {};
  (S.quantBanks || []).forEach(function(b) {
    (b.items || []).forEach(function(it) {
      var t = (it && it.topic) ? String(it.topic).trim() : '';
      if (t && t !== '(untagged)' && t !== '(mixed)') set[t] = 1;
    });
  });
  return Object.keys(set).sort();
}

// Coverage gap: bank topics with zero reps. These are the true blind spots —
// invisible in the accuracy table because no data exists for them yet.
function _quantCoverage(topicRows, bankTopics) {
  var drilled = {};
  (topicRows || []).forEach(function(r) { if (r.seen > 0) drilled[r.topic] = 1; });
  var untouched = (bankTopics || []).filter(function(t) { return !drilled[t]; });
  return { untouched: untouched, drilled: Object.keys(drilled).length, total: (bankTopics || []).length };
}

// Targeted further reading for a topic, drawn from the student's own Quant Prep
// library. Deterministic (no LLM call) so it can ride along in the dashboard.
function _quantReadingFor(topic) {
  var t = String(topic || '');
  var map = [
    { re: /count|combin|permut/i,                    text: 'Mosteller, "Fifty Challenging Problems in Probability"; Quant Club "Counting, Combinatorics, Probability"' },
    { re: /bayes|condition/i,                          text: 'Blitzstein & Hwang, "Introduction to Probability" (Stat 110) ch.2; MIT 18.05 notes' },
    { re: /markov|stochastic|random walk|state/i,      text: 'Norris, "Markov Chains" ch.1; "Stochastic Processes"' },
    { re: /martingale|stopping|fair game/i,            text: 'Green Book (Zhou) ch.5 stochastic processes; "Stochastic Processes"' },
    { re: /option|deriv|greek|volat|black.?scholes/i,  text: 'Hull, "Options, Futures and Other Derivatives" ch.9–19; Natenberg, "Option Pricing and Volatility"' },
    { re: /market.?mak|adverse|fair price|quot/i,      text: 'Green Book (Zhou) ch.4; Jane Street "Probability & Markets" primer' },
    { re: /game|nash|poker|bet/i,                       text: 'Prisner, "Game Theory Through Examples"; "The Mathematics of Poker"' },
    { re: /dice/i,                                      text: '"A Collection of Dice Problems"' },

// Is this topic already written up anywhere in the themes doc? Full-phrase,
// case-insensitive — the same rule the server uses to dedupe on insert.
function _quantThemeCovered(topic, text) {
  var t = String(topic || '').toLowerCase().replace(/\s+/g, ' ').trim();
  if (t.length < 3) return true; // too short to match reliably — don't nag
  return String(text || '').toLowerCase().indexOf(t) >= 0;
}

// Bank topics not yet captured in the themes doc and not already acknowledged.
function _quantNewThemes(bankTopics, text, acked) {
  var ack = {};
  (acked || []).forEach(function(k) { ack[String(k).toLowerCase()] = 1; });
  return (bankTopics || []).filter(function(t) {
    return !ack[String(t).toLowerCase()] && !_quantThemeCovered(t, text);

// Human theme names already present in the doc (\section{Theme N --- Name}),

function _parseThemeNames(text) {
  var out = [], re = /\\section\{([^}]*)\}/g, m;
  while ((m = re.exec(String(text || '')))) {
    var name = m[1].replace(/Theme\s+[IVXLCDM]+\s*-+\s*/i, '').replace(/\\[a-zA-Z]+/g, '').trim();
    if (name && !/^(how to use|foundations|metacognition)/i.test(name)) out.push(name);

  return out;
}

function _quantRawEntryCount(text) {
  text = String(text || '').trim();
  if (!text) return 0;
  try {
    if (text[0] === '[' || text[0] === '{') {
      var parsed = JSON.parse(text);
      return Array.isArray(parsed) ? parsed.length : 1;
    }
  } catch (e) {}
  if (/^\s*\{/.test(text) && /\n\s*\{/.test(text)) {
    return text.split(/\r?\n/).filter(function(line) { return line.trim(); }).length;
  }
  if (/^\s*(id|q|question|prompt)\s*,/i.test(text)) {
    return Math.max(0, text.split(/\r?\n/).filter(function(line) { return line.trim(); }).length - 1);
  }
  return text.split(/\r?\n/).filter(function(line) { return line.trim(); }).length;
}

async function importQuantProblemBank(file) {
  // Retrieval is driven by user input, not a hardcoded filename: when no explicit
  // file is passed (e.g. recommendation flows), read the bank-file field the user
  // typed, falling back to the conventional default. The server still sandboxes
  // this to the Quant Prep folder, so it stays a name/sub-path, never an arbitrary
  // absolute path.
  if (!file) {
    var fileEl = document.getElementById('quant-bank-file');
    file = (fileEl && fileEl.value.trim()) || 'problems.json';
  }
  try {
    var res = await fetch('/quant/problem-bank?file=' + encodeURIComponent(file));
    var data = await res.json();
    if (!res.ok || !data.ok) throw new Error((data && data.error) || 'Could not read problem bank');
    var items = parseQuantBank(data.text || '');
    if (!items.length) throw new Error('No drillable question/answer pairs found in ' + (data.name || file));
    var total = _quantRawEntryCount(data.text || '');
    var skipped = Math.max(0, total - items.length);
    var name = data.name === 'problems.json' ? 'Quant Prep Problem Bank' : 'Quant Prep · ' + data.name;
    var existing = S.quantBanks.find(function(b) { return b.sourcePath === data.path; });
    var bank = { id: existing ? existing.id : Date.now(), name: name, items: items, createdAt: existing ? existing.createdAt : Date.now(), updatedAt: Date.now(), sourcePath: data.path };
    if (existing) S.quantBanks = S.quantBanks.map(function(b) { return b.id === existing.id ? bank : b; });
    else S.quantBanks.push(bank);
    saveQuantBanks();
    toast((existing ? 'Refreshed' : 'Loaded') + ' ' + items.length + ' drillable item' + (items.length === 1 ? '' : 's') + (skipped ? ' (' + skipped + ' without answers skipped).' : '.'));
    render();
  } catch (e) {
    toast('Problem Bank import failed: ' + ((e && e.message) || 'unknown error'));
  }
}

  if (t.state === 'pre')

// Launch a drill scoped to this week's roadmap focus, reusing the tag filter.
function startPrepDrill() {
  if (!S.quantBanks.length) { toast('Import your problems.json bank below first — then this drills exactly this week’s focus.'); render(); return; }
  var bank = S.quantBanks.slice().sort(function (a, b) { return b.items.length - a.items.length; })[0];
  var w = _prepViewWeek(), flt = {};   // drills the SELECTED week (revisit past weeks), not just today's
  if (w) {
    if (w.difficulty) flt.difficulty = w.difficulty;
    var topicsInBank = _quantFacetValues(bank, { field: 'topic', list: false, key: 'topic' });
    var pick = (w.topics || []).filter(function (x) { return topicsInBank.indexOf(x) >= 0; });
    if (pick.length) flt.topic = pick[0];
  }
  S.quantFilters = S.quantFilters || {};
  S.quantFilters[bank.id] = flt;
  if (!Object.keys(flt).length) toast('No matching tag for this week in “' + bank.name + '” — drilling the full bank. Use the filter row to narrow.');
  startQuantDrill(bank.id, 'practice');
}

// ── Session ───────────────────────────────────────────────────────────────
function startQuantDrill(bankId, mode, durationSec) {
  var bank = S.quantBanks.find(function(b) { return b.id === bankId; });
  if (!bank || !bank.items.length) { toast('That bank is empty.'); return; }
  var items = _filterBankItems(bank);
  if (!items.length) { toast('No items match the current filter. Clear it or widen the selection.'); return; }
  if (_quantTimer) { clearInterval(_quantTimer); _quantTimer = null; }
  var m = mode === 'timed' ? 'timed' : mode === 'learn' ? 'learn' : 'practice';
  S.quant = {
    active: true, finished: false,
    bankId: bankId, bankName: bank.name,
    items: items.slice(),
    idx: 0, stats: {}, answered: 0, correct: 0, streakCur: 0, streakBest: 0,
    skipped: 0, attempts: [],
    missed: {}, showResult: false, lastResult: null, lastGiven: '', confidence: 'unsure', lastConfidence: 'unsure', aiExplain: null, showHint: false,
    timeUp: false,
    mode: m,
    startTime: Date.now(),
    itemStartedAt: Date.now(),
    endTime: mode === 'timed' ? Date.now() + (durationSec || 120) * 1000 : null,
  };
  // Seed per-item stats from persistent cross-session memory so mastery carries
  // over: previously stats reset every drill, so every question looked "unseen"
  // again and the picker could never fade out what you already know. sessionSeen
  // stays 0 (nothing shown YET this session), so each item still appears once.
  var pstats = S.quantItemStats || {};
  S.quant.items.forEach(function(it, i) {
    var p = pstats[_quantItemKey(it)];
    if (p) S.quant.stats[i] = { seen: p.seen || 0, correct: p.correct || 0, wrong: p.wrong || 0, streak: p.streak || 0, sessionSeen: 0 };
  });
  if (S.quant.mode === 'timed') _quantTimer = setInterval(_quantTick, 250);
  render();
}

function _quantTick() {
  var sess = S.quant;
  if (!sess || !sess.active || sess.mode !== 'timed') { clearInterval(_quantTimer); _quantTimer = null; return; }
  var rem = sess.endTime - Date.now();
  var el = document.getElementById('quant-timeleft');
  if (el) el.textContent = _fmtMMSS(rem / 1000);
  if (rem <= 0) { clearInterval(_quantTimer); _quantTimer = null; _quantTimeUp(); }
}

// Timed sprints end on a short "time's up" beat instead of jumping straight to
// the summary: lock input, show the banner, then score. Ending early via the
// End button while the beat is on-screen is still safe (endQuantDrill guards).
function _quantTimeUp() {
  var sess = S.quant;
  if (!sess || !sess.active || sess.timeUp) return;
  sess.timeUp = true;
  render();
  setTimeout(function() {
    var s2 = S.quant;
    if (s2 && s2.active && s2.timeUp) endQuantDrill();
  }, 1500);
}

function quantSubmit() {
  var sess = S.quant; if (!sess || !sess.active || sess.timeUp) return;
  var inp = document.getElementById('quant-input');
  var val = inp ? inp.value.trim() : '';
  if (!val) return;
  var confidence = sess.confidence || 'unsure';
  sess.confidence = 'unsure'; // reset to the default for the next question
  var item = sess.items[sess.idx];
  var res = gradeQuantAnswer(item, val);
  var st = sess.stats[sess.idx] || (sess.stats[sess.idx] = { seen: 0, wrong: 0, streak: 0 });
  var ms = Math.max(0, Date.now() - (sess.itemStartedAt || Date.now()));
  st.seen++;
  st.sessionSeen = (st.sessionSeen || 0) + 1; // shown this session → drop from the unseen pool
  st.totalMs = (st.totalMs || 0) + ms;
  st.conf = st.conf || { sure: 0, unsure: 0, guess: 0 };
  st.conf[confidence] = (st.conf[confidence] || 0) + 1;
  sess.answered++;
  sess.attempts.push({
    idx: sess.idx, id: item.id || '', topic: item.topic || '(untagged)', difficulty: item.difficulty || '',
    correct: !!res.correct, skipped: false, ms: ms, confidence: confidence, answer: val,
  });
  _recordQuantItemStat(item, res.correct ? 'correct' : 'wrong'); // persist across sessions
  if (res.correct) {
    st.correct = (st.correct || 0) + 1; // explicit correct count (skips must not count as correct)
    sess.correct++; st.streak++; sess.streakCur++;
    if (sess.streakCur > sess.streakBest) sess.streakBest = sess.streakCur;
    if (sess.mode === 'learn') {
      sess.showResult = true; sess.lastResult = res; sess.lastGiven = val; sess.lastConfidence = confidence; sess.aiExplain = null;
    } else {
      // Rapid flow: a correct answer advances immediately.
      sess.idx = _quantPickNext(sess);
      sess.itemStartedAt = Date.now();
      sess.showResult = false; sess.lastResult = null; sess.lastGiven = ''; sess.showHint = false;
    }
  } else {
    st.wrong++; st.streak = 0; sess.streakCur = 0;
    sess.missed[item.q] = item;
    sess.showResult = true; sess.lastResult = res; sess.lastGiven = val; sess.lastConfidence = confidence; sess.aiExplain = null;
  }
  render();
}

function quantNext() {
  var sess = S.quant; if (!sess || !sess.active || sess.timeUp) return;
  sess.idx = _quantPickNext(sess);
  sess.itemStartedAt = Date.now();
  sess.showResult = false; sess.lastResult = null; sess.lastGiven = ''; sess.aiExplain = null; sess.showHint = false;
  render();
}

function quantSkip() {
  var sess = S.quant; if (!sess || !sess.active || sess.timeUp) return;
  var item = sess.items[sess.idx];
  var st = sess.stats[sess.idx] || (sess.stats[sess.idx] = { seen: 0, wrong: 0, streak: 0 });
  var ms = Math.max(0, Date.now() - (sess.itemStartedAt || Date.now()));
  st.seen++; // count as seen so it rotates
  st.sessionSeen = (st.sessionSeen || 0) + 1; // shown this session → drop from the unseen pool
  st.skips = (st.skips || 0) + 1; st.streak = 0;
  _recordQuantItemStat(item, 'skip'); // persist across sessions
  sess.skipped = (sess.skipped || 0) + 1; sess.streakCur = 0;
  sess.confidence = 'unsure'; // reset to the default for the next question
  sess.attempts.push({
    idx: sess.idx, id: item.id || '', topic: item.topic || '(untagged)', difficulty: item.difficulty || '',
    correct: false, skipped: true, ms: ms, confidence: 'guess', answer: '',
  });
  sess.idx = _quantPickNext(sess);
  sess.itemStartedAt = Date.now();
  sess.showResult = false; sess.lastResult = null; sess.lastGiven = ''; sess.showHint = false;
  render();
}

function quantToggleHint() {
  var sess = S.quant; if (!sess || !sess.active || sess.timeUp) return;
  sess.showHint = !sess.showHint;
  render();
}

// Set the pending confidence for the current question. Updates the segmented
// buttons in place (no full render) so the answer the user is typing isn't wiped.
function setQuantConfidence(level) {
  var sess = S.quant; if (!sess || !sess.active) return;
  sess.confidence = (level === 'sure' || level === 'guess') ? level : 'unsure';
  var btns = document.querySelectorAll('.qc-btn');
  for (var i = 0; i < btns.length; i++) {
    var on = btns[i].getAttribute('data-conf') === sess.confidence;
    btns[i].className = 'btn ' + (on ? 'bp' : 'bg') + ' btn-sm qc-btn';
    btns[i].setAttribute('aria-pressed', on ? 'true' : 'false');
  }
}

function endQuantDrill() {
  var sess = S.quant; if (!sess) return;
  if (_quantTimer) { clearInterval(_quantTimer); _quantTimer = null; }
  sess.active = false; sess.finished = true;
  sess.elapsedSec = Math.max(1, Math.round((Date.now() - sess.startTime) / 1000));
  if ((sess.answered || 0) + (sess.skipped || 0) > 0) { try { recordStreak(); } catch (e) {} try { logQuantSession(sess); } catch (e) {} }
  render();
}

// Append a lean per-session summary to S.quantLog (capped). Per-topic accuracy
// (from the bank's tag metadata) is what powers the Prep Assistant's analytics.
function logQuantSession(sess) {
  var byTopic = {}, byDifficulty = {};
  (sess.attempts || []).forEach(function (a) {
    var it = (sess.items || [])[a.idx] || {};
    var tp = a.topic || it.topic || '(untagged)';
    var df = a.difficulty || it.difficulty || '(mixed)';
    var b = byTopic[tp] || (byTopic[tp] = { seen: 0, correct: 0, skips: 0, ms: 0, sure: 0, unsure: 0, guess: 0, wrongSure: 0 });
    if (a.skipped) b.skips++;
    else { b.seen++; if (a.correct) b.correct++; else if (a.confidence === 'sure') b.wrongSure++; }
    b.ms += a.ms || 0;
    b[a.confidence || 'unsure'] = (b[a.confidence || 'unsure'] || 0) + 1;
    var d = byDifficulty[df] || (byDifficulty[df] = { seen: 0, correct: 0 });
    if (!a.skipped) { d.seen++; if (a.correct) d.correct++; }
  });
  Object.keys(byTopic).forEach(function(tp) {
    var b = byTopic[tp];
    b.avgSec = b.seen ? Math.round(b.ms / b.seen / 100) / 10 : 0;
  });
  var flt = (S.quantFilters || {})[sess.bankId] || {};
  S.quantLog = S.quantLog || [];
  S.quantLog.push({
    ts: Date.now(),
    bank: sess.bankName || '',
    scope: { topic: flt.topic || '', difficulty: flt.difficulty || '', firm: flt.firm || '' },
    answered: sess.answered, correct: sess.correct, skipped: sess.skipped || 0,
    qpm: sess.elapsedSec ? Math.round(sess.answered / (sess.elapsedSec / 60)) : 0,
    avgSec: sess.answered ? Math.round((sess.attempts || []).filter(function(a) { return !a.skipped; }).reduce(function(n, a) { return n + (a.ms || 0); }, 0) / sess.answered / 100) / 10 : 0,
    byTopic: byTopic,
    byDifficulty: byDifficulty,
  });
  if (S.quantLog.length > 300) S.quantLog = S.quantLog.slice(-300);
  saveQuantLog();
}
function saveQuantLog() { lsSet('sd_quantlog', S.quantLog); }

// Wipe the drill analytics log — the accuracy/weak-topic/calibration history and
// every recommendation derived from it. Needed because a past grading bug logged
// correct answers as wrong, poisoning the analytics; there's no in-place repair,
// so a clean-slate reset is the honest fix. Banks and per-question progress stay.
function resetQuantLog() {
  var n = (S.quantLog || []).length;
  if (!n) { toast('No drill history to reset.'); return; }
  if (!confirm('Reset all quant drill analytics?\n\nThis clears ' + n + ' logged session' + (n === 1 ? '' : 's') + ' and the weak-topic, calibration, and recommendation history built on them.\n\nYour problem banks and per-question progress are kept. This cannot be undone.')) return;
  S.quantLog = [];
  saveQuantLog();
  toast('Quant analytics reset — recommendations will rebuild from your next drills.');
  render();
}

function _quantCoachSys() {
  return [
    'You are an elite quant-trading interview coach (Jane Street / SIG / Optiver / Citadel / HRT desks). A student is drilling a problem bank and wants to (1) confirm whether the stated answer is actually correct and (2) genuinely master the idea.',
    '',
    'REASON SILENTLY, THEN ANSWER. Do the full computation in your head FIRST — work it from scratch, never just trust the stated answer. Only AFTER you have settled on a single final result do you start writing. Your written reply is the finished conclusion, not your scratch work.',
    '',
    'DO TWO THINGS, IN THIS ORDER:',
    "1) VERDICT — State your conclusion in one decisive line: Correct, Incorrect, or Can't fully verify. If incorrect, give the right answer and name the exact error in one sentence. Then, in 2-4 tight lines, show the clean computation that proves it — the final argument only.",
    '2) INTUITION — Teach the intuitive method a strong trader uses under time pressure: the key insight / the trick first, then a 60-second line of reasoning they could reproduce, then a fast sanity check or estimate.',
    '',
    'GUARDRAILS (you build mastery, you do not feed answers):',
    '- COMMIT TO ONE VERDICT. Never give two verdicts, never reverse yourself mid-answer, never let the reader watch you change your mind. If you are unsure, resolve it before writing and say "Can\'t fully verify" — do not narrate the back-and-forth.',
    '- NO THINKING OUT LOUD. Never write "wait", "let me recount", "actually", "hold on", "let me be precise", or any self-correction. Those belong in your head, before you write — the reply contains only the settled result.',
    '- Intuition over arithmetic — the transferable pattern matters more than the specific number.',
    '- Be tight and interview-length. No rambling, no padding, no re-derivations.',
    '- Do not just restate the bank solution — add the mental model and the why.',
    '- Always actually verify; never hand-wave the check.',
    '- Recommend 1-3 resources to consolidate THIS concept, STRONGLY preferring the student\'s own library below. For EACH resource give the exact title AND the specific chapter number(s) (and section if you know it) — never a vague "chapter on X". Only if nothing in the library fits, suggest one well-known external resource and mark it "(not in your folder)".',
    '',
    'FORMAT — compact markdown, short labelled sections in this order: **Verdict**, **Intuition**, **Sanity check**, **Pattern to remember** (one line), **Study next**. Use $...$ / $$...$$ for math (KaTeX).',
    'STUDY NEXT must be a NUMBERED, ORDERED reading plan (study item 1 first, then 2, then 3) — not an unordered pile. Each line: "Exact Title" — Chapter N (or N.M) — then a 6-10 word reason. Order by what most closes THIS student\'s weak areas (see the weak-area line in the user message): put the single highest-leverage chapter at #1 so the loop closes on the weakest spot first.',
    '',

// Light markdown → HTML for the coach panel: bold + inline code, plus list /
// title / chapter emphasis so the ordered "Study next" plan reads as a focused
// checklist instead of flat prose. $...$ KaTeX delimiters survive untouched
// (white-space:pre-wrap keeps newlines).
function _quantMdLite(s) {
  var h = esc(s || '');
  h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Quoted resource titles → accented bold so each book/target stands out.
  h = h.replace(/&quot;([^&]{2,}?)&quot;/g, '<strong style="color:var(--acc)">$1</strong>');
  // Chapter / section references → highlighted so the exact target is unmissable.
  h = h.replace(/\b(Chapters?|Ch\.?|Sections?|Sec\.?|§)\s*([0-9]+(?:\.[0-9]+)?(?:\s*[-&]\s*[0-9]+(?:\.[0-9]+)?)?)/gi,
    '<strong style="color:var(--gold)">$1&nbsp;$2</strong>');
  // Ordered / bulleted list markers → accented, giving the plan real structure
  // and making the reading ORDER (1, 2, 3) the most prominent thing on the line.
  h = h.split('\n').map(function(line) {
    var m = line.match(/^(\s*)(\d+[.)]|[-*])(\s+)(.*)$/);
    if (!m) return line;
    var marker = /^\d/.test(m[2]) ? m[2].replace(/\)$/, '.') : '&bull;';
    return m[1] + '<strong style="color:var(--acc)">' + marker + '</strong>' + m[3] + m[4];
  }).join('\n');
  return h;
}

async function quantAIExplain() {
  var sess = S.quant; if (!sess || !sess.active) return;
  var item = sess.items[sess.idx]; if (!item) return;
  var model = getPreferredModel('generation');
  if (!hasKey(model.prov)) { toast('Add an API key in Settings to use AI Verify & Explain.'); return; }
  var atIdx = sess.idx;
  sess.aiExplain = { loading: true, text: '', error: '', forIdx: atIdx };
  render();

  var firms = Array.isArray(item.companies) && item.companies.length ? item.companies.join(', ') : '—';
  var stated = item.a || (sess.lastResult && sess.lastResult.expected) || '—';
  // Weakest topics (lowest skill first) so the coach can order Study next to target them.
  var weak = (_quantAnalytics().topics || []).filter(function(t) { return t.acc != null; }).slice(0, 3)
    .map(function(t) { return t.topic + ' (' + t.acc + '%)'; }).join(', ');
  var user = 'Problem: ' + item.q
    + '\n\nTopic: ' + (item.topic || '—') + ' | Difficulty: ' + (item.difficulty || '—') + ' | Firms: ' + firms
    + '\n\nStated answer (from the bank): ' + stated
    + '\n\nMy answer just now: ' + (sess.lastGiven || '(skipped / not answered)')
    + '\n\nMy weak areas (lowest accuracy first): ' + (weak || 'not enough drill data yet — order Study next by relevance to this problem')
    + '\n\nVerify the stated answer independently, then coach me on the intuition and an ordered Study next plan that targets my weak areas first.';

  var live = function() { return S.quant === sess && sess.aiExplain && sess.aiExplain.forIdx === atIdx; };
  try {
    var raw = await streamGenerate(_quantCoachSys(), user, 2000, function(full) {
      if (!live()) return; // user moved on — drop late chunks
      sess.aiExplain.text = full;
      var el = document.getElementById('quant-ai-out');
      if (el) {
        el.innerHTML = _quantMdLite(full);
        clearTimeout(_mathStreamTimer);
        _mathStreamTimer = setTimeout(function() {
          if (window.renderMathInElement && el.parentNode) { try { renderMathInElement(el, _katexOpts); } catch (e) {} }
        }, 120);
      }
    });
    if (live()) { sess.aiExplain.text = raw; sess.aiExplain.loading = false; render(); }
  } catch (e) {
    if (live()) { sess.aiExplain.loading = false; sess.aiExplain.error = (e && e.message) || 'AI request failed.'; render(); }
  }
}

// Panel rendered from sess.aiExplain inside the revealed-answer card.
function _quantAIPanel(sess) {
  var ai = sess.aiExplain;

    return '<button class="btn bg btn-sm" style="margin-top:14px" onclick="quantAIExplain()" title="Independently checks the answer, teaches the intuition, and points to a resource">&#10022; Verify &amp; explain (AI)</button>';
  }

  return wrap + head + out + foot + '</div>';

// ── Render ──────────────────────────────────────────────────────────────────
// Non-spoiler attribution/tag chips shown under a prompt (id · difficulty ·
// topic · firms · source). Returns '' for plain Q/A items with no metadata.
function _quantAttrib(item) {
  if (!item) return '';
  var chips = [];
  var chip = function(txt, col, bg) {
    return '<span style="font-family:var(--sans);font-size:10.5px;font-weight:600;color:' + (col || 'var(--mut)')
      + ';background:' + (bg || 'var(--card2)') + ';border:1px solid var(--brd);border-radius:10px;padding:2px 8px">' + esc(txt) + '</span>';
  };
  if (item.id) chips.push(chip(item.id, 'var(--dim)'));
  if (item.difficulty) {
    var dc = item.difficulty === 'Easy' ? '#49c47e' : item.difficulty === 'Hard' ? '#d05555' : '#c49a3a';
    chips.push(chip(item.difficulty, dc));
  }
  if (item.topic) chips.push(chip(item.topic, 'var(--acc)'));
  if (Array.isArray(item.companies)) item.companies.slice(0, 4).forEach(function(c) { chips.push(chip(c, 'var(--mut)')); });
  if (item.source) chips.push(chip(item.source, 'var(--dim)'));
  if (!chips.length) return '';
  return '<div class="row" style="gap:5px;flex-wrap:wrap;margin-top:11px">' + chips.join('') + '</div>';
}
// Source/reference attribution shown alongside a revealed answer (may spoil, so
// only used after a miss). Renders a clickable link when reference is a URL.
function _quantReference(item) {
  if (!item || (!item.reference && !item.source)) return '';
  var bits = [];
  if (item.source) bits.push(esc(item.source));
  if (item.reference) {
    bits.push(/^https?:\/\//i.test(item.reference)
      ? '<a href="' + esc(item.reference) + '" target="_blank" rel="noopener" style="color:var(--acc)">' + esc(item.reference) + '</a>'
      : esc(item.reference));
  }
  return '<p style="font-family:var(--sans);font-size:11px;color:var(--dim);margin-top:10px">Source: ' + bits.join(' · ') + '</p>';
}

function renderQuantSummary() {
  var sess = S.quant;
  var acc = sess.answered ? Math.round(sess.correct / sess.answered * 100) : 0;
  var accCol = acc >= 80 ? '#49c47e' : acc >= 50 ? '#c49a3a' : '#d05555';
  var qpm = sess.elapsedSec ? (sess.answered / (sess.elapsedSec / 60)).toFixed(1) : '0';
  var avgSec = sess.answered ? ((sess.attempts || []).filter(function(a) { return !a.skipped; }).reduce(function(n, a) { return n + (a.ms || 0); }, 0) / sess.answered / 1000).toFixed(1) : '0';
  var missedKeys = Object.keys(sess.missed || {});

  var bigStat = function(val, lbl, col) {
    return '<div style="text-align:center;flex:1"><p style="font-family:var(--sans);font-size:30px;font-weight:700;color:' + col + ';line-height:1">' + val + '</p>'
      + '<p style="font-family:var(--sans);font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-top:5px">' + lbl + '</p></div>';
  };
  var head = '<div class="card" style="margin-bottom:14px">'
    + '<p class="sh" style="margin-bottom:14px">' + esc(sess.bankName || 'Quant Drill') + ' · ' + (sess.mode === 'timed' ? 'sprint' : 'practice') + '</p>'
    + '<div class="row" style="gap:8px">'
    + bigStat(sess.correct + '/' + sess.answered, 'Correct', 'var(--tx)')
    + bigStat(acc + '%', 'Accuracy', accCol)
    + bigStat(qpm, 'Q/min', 'var(--mut)')
    + bigStat(avgSec + 's', 'Avg time', 'var(--mut)')
    + bigStat(String(sess.streakBest), 'Best streak', '#f4a24a')
    + '</div></div>';

  // Per-topic + calibration breakdown for THIS session, straight from the
  // attempts log — the same data that powers the dashboard, surfaced at the
  // moment of reflection so the next move is obvious without leaving the screen.
  var bd = _quantSessionBreakdown(sess.attempts), byTopic = bd.topics, sureWrong = bd.sureWrong, sureTotal = bd.sureTotal;
  var calib = '';
  if (sureTotal > 0) {
    var cpct = Math.round(sureWrong / sureTotal * 100);
    var ccol = sureWrong === 0 ? '#49c47e' : cpct >= 30 ? '#d05555' : '#c49a3a';
    calib = '<div class="card" style="margin-bottom:14px;border-left:3px solid ' + ccol + '">'
      + '<p style="font-family:var(--sans);font-size:13px;color:var(--tx);line-height:1.55">'
      + '<b style="color:' + ccol + '">Calibration:</b> of ' + sureTotal + ' answer' + (sureTotal === 1 ? '' : 's') + ' you marked <b>Sure</b>, '
      + (sureWrong === 0
          ? 'every one was correct — well calibrated.'
          : sureWrong + ' ' + (sureWrong === 1 ? 'was' : 'were') + ' wrong (' + cpct + '%). Confident misses are the costliest failure mode in a live interview — slow down to verify before committing.')
      + '</p></div>';
  }
  var breakdown = '';
  var topicKeys = Object.keys(byTopic).sort(function(x, y) {

  });
  var meaningful = topicKeys.filter(function(t) { return t !== '(untagged)'; });
  if (meaningful.length >= 1 && (topicKeys.length > 1 || meaningful.length === topicKeys.length)) {
    var trows = topicKeys.map(function(tp) {
      var r = byTopic[tp], pct = r.seen ? Math.round(r.correct / r.seen * 100) : 0;
      var col = pct >= 75 ? '#49c47e' : pct >= 50 ? '#c49a3a' : '#d05555';
      var bar = '<span style="display:block;height:7px;background:var(--brd);border-radius:4px;overflow:hidden">'
        + '<span style="display:block;height:100%;width:' + pct + '%;background:' + col + '"></span></span>';
      var act = (tp !== '(untagged)')
        ? '<button class="btn bg btn-sm" style="padding:3px 9px;font-size:11px;color:' + col + ';border-color:var(--brd)" title="Drill this topic in Learn mode" onclick="exitQuant();startQuantWeakTopic(' + esc(JSON.stringify(tp)) + ')">Drill</button>'
        : '<span></span>';

        + '<span style="color:var(--tx);font-weight:600;overflow:hidden;text-overflow:ellipsis" title="' + esc(tp) + '">' + esc(tp) + '</span>'
        + '<span style="color:var(--mut)">' + r.correct + '/' + r.seen + '</span>'
        + bar
        + '<span style="color:' + col + ';font-weight:700;text-align:right">' + pct + '%</span>'

    breakdown = '<div class="card" style="margin-bottom:14px">'
      + '<p class="sh" style="margin-bottom:3px">By topic — weakest first</p>'
      + '<p style="font-family:var(--sans);font-size:11px;color:var(--mut);margin-bottom:4px">Where this session landed. Repair the reds first.</p>'
      + trows + '</div>';
